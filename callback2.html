<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0a0200">
<title>RezurXLab | Verifying LootLabs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --orange: #ff8c00; --orange-bright: #ffaa33; --orange-deep: #aa4400;
  --orange-glow: rgba(255, 140, 0, 0.45); --orange-soft: rgba(255, 140, 0, 0.12);
  --gold: #ffd700; --gold-bright: #ffea70; --gold-glow: rgba(255, 215, 0, 0.6);
  --green: #00ff88; --green-glow: rgba(0, 255, 136, 0.45);
  --purple: #a070ff; --purple-glow: rgba(160, 112, 255, 0.4);
  --purple-bright: #c4a8ff;
  --red: #ff4455; --red-glow: rgba(255, 68, 85, 0.45);
  --bg: #050100; --panel: rgba(8, 3, 0, 0.93); --panel-bright: rgba(14, 6, 1, 0.95);
  --muted: #3a3028; --dim: #6a5848;
  --border: rgba(255, 140, 0, 0.22); --border-bright: rgba(255, 140, 0, 0.4);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }

body {
  background: var(--bg); color: #fff;
  font-family: 'JetBrains Mono', 'Courier New', monospace;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  min-height: 100vh; min-height: 100dvh;
  overflow-x: hidden; overflow-y: auto;
  -webkit-font-smoothing: antialiased;
  padding: 20px;
}

/* ── ATMOSPHERE ── */
#lava-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.atmos {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background:
    radial-gradient(ellipse 95% 55% at 50% -5%, rgba(140, 50, 255, 0.22) 0%, transparent 60%),
    radial-gradient(ellipse 75% 45% at 50% 105%, rgba(100, 20, 180, 0.18) 0%, transparent 60%),
    radial-gradient(ellipse 100% 100% at 50% 50%, transparent 30%, rgba(0, 0, 0, 0.84) 100%);
  animation: atmosShift 20s ease-in-out infinite alternate;
}
@keyframes atmosShift {
  0% { filter: hue-rotate(0deg) brightness(1); }
  100% { filter: hue-rotate(12deg) brightness(1.06); }
}
.scanlines {
  position: fixed; inset: 0; z-index: 2; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.05) 3px, rgba(0,0,0,0.05) 4px);
}
.vignette {
  position: fixed; inset: 0; z-index: 3; pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.55) 100%);
}

/* ── PANEL ── */
.panel {
  position: relative; z-index: 10;
  background: linear-gradient(180deg, var(--panel-bright) 0%, var(--panel) 100%);
  border: 1px solid rgba(160, 112, 255, 0.28); border-radius: 12px;
  padding: 48px 42px 38px; width: 100%; max-width: 540px;
  text-align: center;
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.95),
    0 24px 70px rgba(0,0,0,0.92),
    0 0 120px rgba(120, 60, 255, 0.16),
    inset 0 1px 0 rgba(180, 140, 255, 0.12);
  backdrop-filter: blur(8px);
  animation: panelIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
}
@keyframes panelIn {
  from { opacity: 0; transform: translateY(24px) scale(0.97); }
  to { opacity: 1; transform: none; }
}
@media (max-width: 520px) { .panel { padding: 32px 20px 28px; } }

.panel::before {
  content: ""; position: absolute; inset: -1px; border-radius: 12px; pointer-events: none;
  background: linear-gradient(135deg, rgba(160, 112, 255, 0.45) 0%, transparent 30%, transparent 70%, rgba(140, 80, 255, 0.28) 100%);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude; padding: 1px;
}

.c { position: absolute; width: 16px; height: 16px; pointer-events: none; z-index: 1; }
.c-tl { top:-1px; left:-1px; border-top:2px solid var(--purple); border-left:2px solid var(--purple); border-radius:4px 0 0 0; filter: drop-shadow(0 0 5px var(--purple-glow)); }
.c-tr { top:-1px; right:-1px; border-top:2px solid var(--purple); border-right:2px solid var(--purple); border-radius:0 4px 0 0; filter: drop-shadow(0 0 5px var(--purple-glow)); }
.c-bl { bottom:-1px; left:-1px; border-bottom:2px solid var(--purple); border-left:2px solid var(--purple); border-radius:0 0 0 4px; filter: drop-shadow(0 0 5px var(--purple-glow)); }
.c-br { bottom:-1px; right:-1px; border-bottom:2px solid var(--purple); border-right:2px solid var(--purple); border-radius:0 0 4px 0; filter: drop-shadow(0 0 5px var(--purple-glow)); }

.logo-eyebrow { font-size: 0.55rem; letter-spacing: 5px; color: #6040aa; text-transform: uppercase; margin-bottom: 10px; font-weight: 500; }

h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: 2.0rem; font-weight: 900; letter-spacing: 6px;
  background: linear-gradient(180deg, #fff0c0 0%, #c4a8ff 35%, #a070ff 70%, #6030cc 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 0 22px rgba(160, 112, 255, 0.6));
  line-height: 1.05;
  animation: logoBreath 4s ease-in-out infinite;
}
@keyframes logoBreath {
  0%,100% { filter: drop-shadow(0 0 22px rgba(160,112,255,0.5)); }
  50%      { filter: drop-shadow(0 0 38px rgba(180,140,255,0.9)); }
}

.logo-sub { font-size: 0.52rem; letter-spacing: 7px; color: var(--muted); text-transform: uppercase; margin-top: 10px; margin-bottom: 28px; }

.divider {
  width: 100%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(160,112,255,0.35) 30%, rgba(160,112,255,0.55) 50%, rgba(160,112,255,0.35) 70%, transparent);
  margin-bottom: 28px; position: relative;
}
.divider::after {
  content: ""; position: absolute; top:50%; left:50%; transform: translate(-50%,-50%);
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--purple); box-shadow: 0 0 12px var(--purple-glow);
  animation: divPulse 2.5s ease-in-out infinite;
}
@keyframes divPulse {
  0%,100% { transform: translate(-50%,-50%) scale(1); opacity:1; }
  50%      { transform: translate(-50%,-50%) scale(1.2); opacity:0.7; }
}

/* ── VERIFY STEPS ── */
.steps { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; text-align: left; }

.step {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 16px; border-radius: 7px;
  border: 1px solid rgba(160, 112, 255, 0.12);
  background: rgba(0,0,0,0.3);
  font-size: 0.65rem; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--dim); font-weight: 500;
  transition: all 0.4s ease;
}
.step.active {
  border-color: rgba(160, 112, 255, 0.4);
  background: rgba(120, 60, 255, 0.08);
  color: var(--purple-bright);
}
.step.done {
  border-color: rgba(0, 255, 136, 0.25);
  background: rgba(0, 255, 136, 0.05);
  color: var(--green);
}
.step.error {
  border-color: rgba(255, 68, 85, 0.35);
  background: rgba(255, 68, 85, 0.06);
  color: var(--red);
}

.step-icon {
  font-size: 1rem; flex-shrink: 0; width: 20px; text-align: center;
}
.step-spinner {
  width: 14px; height: 14px; flex-shrink: 0;
  border: 2px solid rgba(160, 112, 255, 0.2);
  border-top-color: var(--purple);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }
.step.active .step-spinner { display: block; }
.step.active .step-icon { display: none; }
.step.done .step-spinner, .step.error .step-spinner { display: none; }
.step.done .step-icon, .step.error .step-icon { display: block; }

/* ── KEY RESULT BOX ── */
#key-box {
  display: none;
  background: linear-gradient(180deg, rgba(0,20,0,0.85) 0%, rgba(0,10,0,0.7) 100%);
  border: 1px solid rgba(0, 255, 136, 0.35); border-radius: 9px;
  padding: 22px; margin-bottom: 20px;
  animation: keyReveal 0.6s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes keyReveal {
  from { opacity:0; transform:scale(0.95) translateY(8px); }
  to   { opacity:1; transform:none; }
}
#key-box.show { display: block; }

.key-label { font-size: 0.52rem; letter-spacing: 3px; color: var(--green); text-transform: uppercase; margin-bottom: 10px; opacity: 0.7; }

.key-string {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.05rem; font-weight: 800; letter-spacing: 4px;
  color: var(--green); word-break: break-all;
  text-shadow: 0 0 20px var(--green-glow);
  margin-bottom: 12px;
  animation: keyGlow 2s ease-in-out infinite;
}
@keyframes keyGlow {
  0%,100% { text-shadow: 0 0 20px var(--green-glow); }
  50%      { text-shadow: 0 0 36px rgba(0,255,136,0.8), 0 0 60px rgba(0,255,136,0.3); }
}

.key-meta {
  display: flex; justify-content: center; gap: 18px; flex-wrap: wrap;
  font-size: 0.56rem; letter-spacing: 1.5px; color: var(--dim); text-transform: uppercase;
}
.key-meta span { display: flex; align-items: center; gap: 5px; }
.key-meta .val { color: var(--green); font-weight: 600; }

/* Copy button */
#copy-btn {
  margin-top: 14px; width: 100%;
  padding: 12px; border-radius: 6px; cursor: pointer;
  background: linear-gradient(180deg, rgba(0,255,136,0.18) 0%, rgba(0,255,136,0.08) 100%);
  border: 1px solid rgba(0,255,136,0.3);
  color: var(--green); font-family: 'Orbitron', sans-serif;
  font-size: 0.6rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  transition: all 0.25s;
}
#copy-btn:hover { background: rgba(0,255,136,0.22); border-color: rgba(0,255,136,0.5); box-shadow: 0 4px 18px rgba(0,255,136,0.2); }
#copy-btn:active { transform: scale(0.98); }

/* Bonus row */
#bonus-row {
  display: none; margin-bottom: 16px;
  padding: 12px 16px; border-radius: 7px;
  background: rgba(255, 215, 0, 0.07); border: 1px solid rgba(255,215,0,0.2);
  font-size: 0.6rem; letter-spacing: 1.5px; color: var(--gold); text-transform: uppercase;
  animation: bonusIn 0.5s 0.3s both;
}
@keyframes bonusIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
#bonus-row.show { display: block; }

/* Milestone badge */
#milestone-badge {
  display: none; margin-bottom: 16px;
  padding: 14px 18px; border-radius: 9px;
  background: linear-gradient(135deg, rgba(255,215,0,0.15) 0%, rgba(255,140,0,0.08) 100%);
  border: 1px solid rgba(255,215,0,0.35);
  font-size: 0.62rem; letter-spacing: 1.8px; text-transform: uppercase;
  animation: bonusIn 0.5s 0.5s both;
}
#milestone-badge.show { display: block; }
.milestone-icon { font-size: 1.4rem; margin-bottom: 6px; }
.milestone-text { color: var(--gold); font-weight: 600; }

/* Error box */
#error-box {
  display: none; margin-bottom: 18px;
  padding: 16px; border-radius: 7px;
  background: rgba(255,68,85,0.07); border: 1px solid rgba(255,68,85,0.28);
  font-size: 0.62rem; letter-spacing: 1.5px; color: var(--red); text-transform: uppercase;
  line-height: 1.8;
}
#error-box.show { display: block; }

/* Action buttons */
.action-btn {
  width: 100%; padding: 15px; border-radius: 7px; cursor: pointer;
  font-family: 'Orbitron', sans-serif; font-size: 0.7rem;
  font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase;
  border: 1px solid; transition: all 0.25s; display: block; margin-bottom: 10px;
}
#retry-btn {
  background: linear-gradient(180deg, rgba(160,112,255,0.22) 0%, rgba(120,60,255,0.12) 100%);
  border-color: rgba(160,112,255,0.35); color: var(--purple-bright);
  display: none;
}
#retry-btn:hover { box-shadow: 0 6px 20px rgba(120,60,255,0.3); }
#retry-btn.show { display: block; }

#home-btn {
  background: rgba(0,0,0,0.35); border-color: rgba(255,140,0,0.22);
  color: var(--dim); font-size: 0.58rem;
}
#home-btn:hover { border-color: rgba(255,140,0,0.45); color: var(--orange-bright); }

#status {
  font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase;
  color: var(--dim); margin-bottom: 20px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  min-height: 1.1em; transition: color 0.3s;
}
.sdot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: pulse 2s ease-in-out infinite; flex-shrink: 0; }
@keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.3; transform:scale(0.85); } }
#status.green .sdot { background: var(--green); box-shadow: 0 0 12px var(--green-glow); }
#status.green { color: var(--green); }
#status.red .sdot { background: var(--red); box-shadow: 0 0 12px var(--red-glow); animation:none; }
#status.red { color: var(--red); }
#status.amber .sdot { background: var(--orange); box-shadow: 0 0 12px var(--orange-glow); }
#status.amber { color: var(--orange-bright); }
#status.purple .sdot { background: var(--purple); box-shadow: 0 0 12px var(--purple-glow); }
#status.purple { color: var(--purple-bright); }

.footer {
  margin-top: 24px; display: flex; justify-content: center; align-items: center; gap: 12px;
  padding-top: 18px; border-top: 1px solid rgba(160,112,255,0.10); flex-wrap: wrap;
}
.fi { font-size: 0.46rem; letter-spacing: 2.2px; color: #1a0e06; text-transform: uppercase; font-weight: 600; }
.fd { width: 2.5px; height: 2.5px; border-radius: 50%; background: #1a0e06; }
</style>
</head>
<body>

<canvas id="lava-canvas" aria-hidden="true"></canvas>
<div class="atmos" aria-hidden="true"></div>
<div class="scanlines" aria-hidden="true"></div>
<div class="vignette" aria-hidden="true"></div>

<div class="panel" role="main">
  <div class="c c-tl"></div><div class="c c-tr"></div>
  <div class="c c-bl"></div><div class="c c-br"></div>

  <div class="logo-eyebrow">◆ LootLabs Verification ◆</div>
  <h1>REZURXLAB</h1>
  <div class="logo-sub">Verifying Your Ad Completion</div>
  <div class="divider"></div>

  <div id="status" class="purple">
    <span class="sdot"></span>
    <span id="status-txt">Reading session data...</span>
  </div>

  <div class="steps">
    <div class="step active" id="step-session">
      <div class="step-spinner"></div>
      <div class="step-icon">⬡</div>
      <span>Loading Session</span>
    </div>
    <div class="step" id="step-token">
      <div class="step-spinner"></div>

    </div>
    <div class="step" id="step-verify">
      <div class="step-spinner"></div>
      <div class="step-icon">⬡</div>
      <span>Verifying with Server</span>
    </div>
    <div class="step" id="step-key">
      <div class="step-spinner"></div>
      <div class="step-icon">⬡</div>
      <span>Generating Key</span>
    </div>
  </div>

  <div id="milestone-badge">
    <div class="milestone-icon">🏆</div>
    <div class="milestone-text" id="milestone-text">Milestone Reached!</div>

      <span>Streak: <span class="val" id="key-streak">—</span></span>

  <div id="error-box"></div>

  <button id="retry-btn" class="action-btn" type="button">↺ Try Again</button>
  <button id="home-btn" class="action-btn" type="button">← Back to Portal</button>

  <div class="footer">
    <span class="fi">AES-256</span><div class="fd"></div>
    <span class="fi">LootLabs</span><div class="fd"></div>
    <span class="fi">v4.1.1</span>
  </div>
</div>

<script>
(() => {
'use strict';

/* ── CONFIG — must match index.html ── */
const CONFIG = {
  API:          'https://rezurx-backend.onrender.com',
  HOME:         'https://rezurxshinn.github.io/RezurX-site/start.html',
  SESSION_KEY:  'rzx_session_v5',
  CSRF_KEY:     'rzx_csrf_v5',
  SBLOB_KEY:    'rzx_sblob_v5',
  TOTP_KEY:     'rzx_totp_v5',
  FETCH_TIMEOUT: 20000,
};

/* Frame bust */
if (top !== self) { try { top.location = self.location; } catch (_) { document.body.innerHTML = ''; } }

/* ── DOM ── */
const statusEl   = document.getElementById('status');
const statusTxt  = document.getElementById('status-txt');
const stepSession= document.getElementById('step-session');
const stepToken  = document.getElementById('step-token');
const stepVerify = document.getElementById('step-verify');
const stepKey    = document.getElementById('step-key');
const keyBox     = document.getElementById('key-box');
const keyString  = document.getElementById('key-string');
const keyDuration= document.getElementById('key-duration');
const keyExpires = document.getElementById('key-expires');
const keyStreak  = document.getElementById('key-streak');
const copyBtn    = document.getElementById('copy-btn');
const errorBox   = document.getElementById('error-box');
const retryBtn   = document.getElementById('retry-btn');
const homeBtn    = document.getElementById('home-btn');
const bonusRow   = document.getElementById('bonus-row');
const milestoneBadge = document.getElementById('milestone-badge');
const milestoneText  = document.getElementById('milestone-text');

/* ── HELPERS ── */
function setStatus(msg, tone='') {
  statusTxt.textContent = msg;
  statusEl.className = tone;
}

function stepDone(el) {
  el.classList.remove('active');
  el.classList.add('done');
  el.querySelector('.step-icon').textContent = '✓';
}

function stepActive(el) {
  el.classList.remove('done','error');
  el.classList.add('active');
  el.querySelector('.step-icon').textContent = '⬡';
}

function stepError(el) {
  el.classList.remove('active','done');
  el.classList.add('error');
  el.querySelector('.step-icon').textContent = '✗';
}

function showError(msg) {
  errorBox.innerHTML = msg;
  errorBox.classList.add('show');
  retryBtn.classList.add('show');
  setStatus('● Verification failed', 'red');
}

async function fetchT(url, opts={}, ms=CONFIG.FETCH_TIMEOUT) {
  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), ms);
  try {
    return await fetch(url, {
      ...opts, signal: ctrl.signal,
      mode: 'cors', credentials: 'omit', cache: 'no-store',
      headers: { 'Accept': 'application/json', 'Accept-Language': 'en-US,en;q=0.9', ...(opts.headers||{}) },
    });
  } finally { clearTimeout(tid); }
}

function formatExpiry(dateStr) {
  try {
    const d = new Date(dateStr);
    return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  } catch { return dateStr; }
}

/* ── FINGERPRINT (matches index.html logic) ── */
async function getFingerprint() {
  const BIND_SECRET = 'rzx_fp_bind_9x2_fortress';
  const nav = navigator, scr = screen;
  let canvasHash = 'nc';
  try {
    const cv = document.createElement('canvas');
    cv.width = 200; cv.height = 50;
    const cx = cv.getContext('2d');
    cx.textBaseline = 'top'; cx.font = '14px Arial';
    cx.fillStyle = '#ff8c00'; cx.fillText('RezurX🔥Fortress', 2, 20);
    cx.fillStyle = 'rgba(0,200,100,0.7)'; cx.fillRect(8,30,70,10);
    cx.strokeStyle = 'rgba(255,0,0,0.5)'; cx.beginPath(); cx.arc(100,25,12,0,Math.PI*2); cx.stroke();
    canvasHash = cv.toDataURL().slice(-64);
  } catch(_) {}

  let webglVendor = 'nw';
  try {
    const cv = document.createElement('canvas');
    const gl = cv.getContext('webgl') || cv.getContext('experimental-webgl');
    if (gl) {
      const ext = gl.getExtension('WEBGL_debug_renderer_info');
      if (ext) webglVendor = gl.getParameter(ext.UNMASKED_VENDOR_WEBGL) + '|' + gl.getParameter(ext.UNMASKED_RENDERER_WEBGL);
    }
  } catch(_) {}

  const components = [
    nav.userAgent||'', nav.language||'', (nav.languages||[]).join(','),
    nav.hardwareConcurrency||0, nav.maxTouchPoints||0, nav.deviceMemory||0,
    scr.colorDepth||0, scr.pixelDepth||0, scr.width+'x'+scr.height,
    scr.availWidth+'x'+scr.availHeight,
    Intl.DateTimeFormat().resolvedOptions().timeZone||'',
    new Date().getTimezoneOffset(), nav.platform||'', nav.vendor||'',
    nav.cookieEnabled?'1':'0', 'ontouchstart' in window?'1':'0',
    canvasHash, webglVendor, BIND_SECRET,
  ].join('|');

  const buf = new TextEncoder().encode(components);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ── MAIN VERIFY FLOW ── */
async function verify() {
  try {
    /* STEP 1 — Load session from localStorage */
    stepActive(stepSession);
    setStatus('● Loading session...', 'purple');

    const sessionRaw = localStorage.getItem(CONFIG.SESSION_KEY);
    const csrf       = localStorage.getItem(CONFIG.CSRF_KEY);
    const sblob      = localStorage.getItem(CONFIG.SBLOB_KEY);
    const totpRaw    = localStorage.getItem(CONFIG.TOTP_KEY);

    if (!sessionRaw || !csrf || !sblob) {
      stepError(stepSession);
      return showError(
        '✗ Session not found.<br><br>' +
        'Your session may have expired or was never created.<br>' +
        'Please go back to the portal and try again.'
      );
    }

    let session;
    try { session = JSON.parse(sessionRaw); } catch(_) { session = {}; }

    const token = session?.token;
    if (!token) {
      stepError(stepSession);
      return showError('✗ Invalid session token. Please restart from the portal.');
    }

    // Check session age (max 30 min)
    const sessionAge = Date.now() - (session.ts || 0);
    if (sessionAge > 30 * 60 * 1000) {
      stepError(stepSession);
      return showError(
        '✗ Session expired.<br><br>' +
        'Sessions are valid for 30 minutes. Please go back and start again.'
      );
    }

    // Confirm this session was for LootLabs
    if (session.provider && session.provider !== 'lootlabs') {
      stepError(stepSession);
      return showError(
        '✗ Wrong provider session.<br><br>' +
        `This session was created for <strong>${session.provider}</strong>, not LootLabs.<br>` +
        'Please use the correct verification page.'
      );
    }

    let totp = null;
    try {
      const totpData = JSON.parse(totpRaw || '{}');
      // TOTP is valid for ~2 minutes, server accepts ±1 window
      if (totpData.totp && (Date.now() - totpData.ts) < 2 * 60 * 1000) {
        totp = totpData.totp;
      }
    } catch(_) {}

    stepDone(stepSession);

    /* STEP 2 — Extract lltoken from URL */
    stepActive(stepToken);
    setStatus('● Reading LootLabs token...', 'purple');

    // LootLabs appends the completion token as a URL query param.
    // They may use different param names — try all known ones.
    const params = new URLSearchParams(location.search);
    const lltoken = params.get('token')
                 || params.get('lltoken')
                 || params.get('access_token')
                 || params.get('key')
                 || params.get('t')
                 || null;

    if (lltoken) {
      stepDone(stepToken);
    } else {
      // LootLabs didn't append a token — this can happen if:
      // 1. User navigated here directly without completing the ad
      // 2. LootLabs link settings don't pass a token (some plans don't)
      // Backend accepts missing lltoken via trust mode, so we continue.
      stepDone(stepToken);
      // We'll still proceed — backend will trust the session
    }

    /* STEP 3 — Get fingerprint + call verify API */
    stepActive(stepVerify);
    setStatus('● Verifying with server...', 'purple');

    const fp = await getFingerprint();

    const headers = {
      'Content-Type': 'application/json',
      'x-csrf-token': csrf,
      'x-rzx-session': sblob,
    };
    if (totp) headers['x-rzx-totp'] = totp;

    const body = { token, fp };
    if (lltoken) body.lltoken = lltoken;

    const r = await fetchT(`${CONFIG.API}/api/verify-lootlabs`, {
      method: 'POST',
      headers,
      body: JSON.stringify(body),
    });

    const data = await r.json().catch(() => ({}));

    if (!r.ok) {
      stepError(stepVerify);
      // Special handling for common errors
      if (r.status === 409) {
        return showError(
          '✗ This ad completion was already used.<br><br>' +
          'Each ad completion can only generate one key.<br>' +
          'Go back to the portal to complete a new ad.'
        );
      }
      if (r.status === 403) {
        const msg = data?.error || 'Verification failed';
        return showError(`✗ ${msg}<br><br>Please go back and try again.`);
      }
      return showError(`✗ Server error (${r.status}): ${data?.error || 'Unknown error'}<br><br>Please try again.`);
    }

    stepDone(stepVerify);

    /* STEP 4 — Display key */
    stepActive(stepKey);
    setStatus('● Generating your key...', 'purple');

    await new Promise(r => setTimeout(r, 400)); // brief theatrical pause

    const key = data.key;
    if (!key) {
      stepError(stepKey);
      return showError('✗ Server did not return a key. Please contact support.');
    }

    stepDone(stepKey);

    // Clear session from storage (single use)
    try {
      localStorage.removeItem(CONFIG.SESSION_KEY);
      localStorage.removeItem(CONFIG.CSRF_KEY);
      localStorage.removeItem(CONFIG.SBLOB_KEY);
      localStorage.removeItem(CONFIG.TOTP_KEY);
    } catch(_) {}

    // Show milestone if earned
    if (data.milestone) {
      milestoneBadge.classList.add('show');
      milestoneText.textContent = `🏆 Milestone: ${data.milestone.count} ads completed! +${data.milestone.ms ? Math.round(data.milestone.ms/3600000) + 'h' : 'bonus'} added`;
    }

    // Show bonuses
    if (data.bonuses && data.bonuses.length > 0) {
      bonusRow.textContent = '✦ Bonuses: ' + data.bonuses.join(' · ');
      bonusRow.classList.add('show');
    }

    // Show bonus offer
    if (data.bonusOffer) {
      bonusRow.innerHTML = `⚡ <strong>Bonus offer available!</strong> Complete one more ad for a ${data.bonusOffer.durationHours}h key!`;
      bonusRow.classList.add('show');
    }

    // Populate key display
    keyString.textContent = key;
    keyDuration.textContent = data.durationHuman || (data.durationHours ? data.durationHours.toFixed(1) + 'h' : '—');
    keyExpires.textContent = data.expiresAt ? formatExpiry(data.expiresAt) : '—';
    keyStreak.textContent = data.streak ? `${data.streak} day${data.streak !== 1 ? 's' : ''}` : '—';
    keyBox.classList.add('show');

    setStatus('● Key generated successfully!', 'green');

  } catch (err) {
    console.error('[VERIFY-LL]', err);
    stepError(stepVerify);
    if (err.name === 'AbortError') {
      showError('✗ Request timed out. The server may be waking up — please try again.');
    } else {
      showError(`✗ Unexpected error: ${err.message || 'Unknown'}<br><br>Please try again or contact support.`);
    }
  }
}

/* ── COPY ── */
copyBtn.addEventListener('click', async () => {
  const txt = keyString.textContent;
  if (!txt || txt === '—') return;
  try {
    await navigator.clipboard.writeText(txt);
    copyBtn.textContent = '✓ Copied!';
    setTimeout(() => { copyBtn.textContent = '📋 Copy Key'; }, 2000);
  } catch(_) {
    // Fallback for browsers that block clipboard
    const ta = document.createElement('textarea');
    ta.value = txt; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); copyBtn.textContent = '✓ Copied!'; setTimeout(() => { copyBtn.textContent = '📋 Copy Key'; }, 2000); }
    catch(_) { copyBtn.textContent = '✗ Copy failed'; }
    document.body.removeChild(ta);
  }
});

/* ── NAV ── */
retryBtn.addEventListener('click', () => { location.href = CONFIG.HOME; });
homeBtn.addEventListener('click', () => { location.href = CONFIG.HOME; });

/* ── LAVA CANVAS (matches index.html) ── */
(function lavaEngine() {
  const cv = document.getElementById('lava-canvas');
  const ctx = cv.getContext('2d', { alpha: true });
  let dpr = Math.min(window.devicePixelRatio || 1, 2);
  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    cv.width = innerWidth * dpr; cv.height = innerHeight * dpr;
    cv.style.width = innerWidth+'px'; cv.style.height = innerHeight+'px';
    ctx.scale(dpr, dpr);
  }
  resize(); window.addEventListener('resize', resize);

  // Purple-tinted palette for LootLabs theme
  const palette = [
    [120,60,255],[160,80,255],[100,40,220],[140,80,255],
    [180,100,255],[90,30,200],[200,140,255],[80,20,180],[160,100,255],
  ];
  const rnd = (a,b) => a + Math.random()*(b-a);

  function makeDrop(spread) {
    const c = palette[Math.floor(Math.random()*palette.length)];
    const w = innerWidth*0.32;
    return {
      x: innerWidth*0.5+rnd(-w,w), y: spread ? rnd(-innerHeight,0) : rnd(-100,0),
      vy: rnd(1.2,3.5), vx: rnd(-0.7,0.7),
      radius: rnd(3,13), tail: [], maxTail: Math.floor(rnd(14,30)),
      r: c[0], g: c[1], b: c[2], alpha: rnd(0.5,0.9),
      wobble: rnd(0,Math.PI*2), wobbleSpd: rnd(0.008,0.05), wobbleAmp: rnd(0.3,1.8),
      heat: rnd(0.6,1.0), flickerPhase: rnd(0,Math.PI*2), flickerSpd: rnd(0.04,0.13),
    };
  }

  const DROP_COUNT = innerWidth < 600 ? 55 : 85;
  const drops = [];
  for (let i=0;i<DROP_COUNT;i++) drops.push(makeDrop(true));

  function drawDrop(d) {
    const {x,y,radius:rd,r,g,b,alpha,tail} = d;
    for (let i=0;i<tail.length;i++) {
      const t=tail[i], pct=i/tail.length, a=alpha*pct*0.45*d.heat, rad=rd*pct*0.7;
      if (rad<0.5||a<0.01) continue;
      ctx.beginPath(); ctx.arc(t.x,t.y,rad,0,Math.PI*2);
      ctx.fillStyle=`rgba(${r},${g},${b},${a})`; ctx.fill();
    }
    const gr=ctx.createRadialGradient(x,y,0,x,y,rd*5);
    gr.addColorStop(0,`rgba(${r},${g},${b},${alpha*0.45*d.heat})`);
    gr.addColorStop(0.5,`rgba(${r},${g},${b},${alpha*0.18*d.heat})`);
    gr.addColorStop(1,`rgba(${r},${g},${b},0)`);
    ctx.beginPath(); ctx.arc(x,y,rd*5,0,Math.PI*2); ctx.fillStyle=gr; ctx.fill();
    const fl=0.92+Math.sin(d.flickerPhase)*0.08;
    const gm=ctx.createRadialGradient(x-rd*0.3,y-rd*0.38,0,x,y,rd);
    gm.addColorStop(0,`rgba(220,200,255,${alpha*0.9*fl})`);
    gm.addColorStop(0.35,`rgba(${r},${g},${b},${alpha*fl})`);
    gm.addColorStop(1,`rgba(${Math.max(r-50,0)},${Math.max(g-50,0)},${Math.max(b-50,0)},${alpha})`);
    ctx.beginPath(); ctx.arc(x,y,rd*fl,0,Math.PI*2); ctx.fillStyle=gm; ctx.fill();
  }

  let lastFrame=0; const FPS=60, FI=1000/FPS;
  let hidden=false;
  document.addEventListener('visibilitychange',()=>{hidden=document.hidden;});

  function animate(now) {
    if (hidden) { setTimeout(()=>requestAnimationFrame(animate),200); return; }
    if (now-lastFrame<FI) { requestAnimationFrame(animate); return; }
    lastFrame=now;
    ctx.clearRect(0,0,cv.width,cv.height);
    for (const d of drops) {
      d.wobble+=d.wobbleSpd; d.flickerPhase+=d.flickerSpd;
      d.x+=Math.sin(d.wobble)*d.wobbleAmp+d.vx; d.y+=d.vy;
      d.tail.push({x:d.x,y:d.y});
      if (d.tail.length>d.maxTail) d.tail.shift();
      drawDrop(d);
      if (d.y-d.radius>innerHeight+30) { Object.assign(d,makeDrop(false)); d.tail=[]; }
    }
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
})();

/* ── START ── */
verify();

})();
</script>
