<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#060100">
    <title>RezurXLab | Complete Ad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange:      #ff8c00;
            --orange-dim:  #cc6600;
            --orange-glow: rgba(255,140,0,0.45);
            --green:       #00ff88;
            --red:         #ff4455;
            --bg:          #060100;
            --panel:       rgba(8,3,0,0.93);
            --muted:       #3a3028;
            --dim:         #6a5848;
        }
        *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
        html,body { height:100%; }
        body {
            background:var(--bg); color:#fff;
            font-family:'JetBrains Mono',monospace;
            display:flex; flex-direction:column;
            justify-content:center; align-items:center;
            min-height:100vh; overflow-x:hidden; position:relative;
            -webkit-font-smoothing:antialiased; padding:20px;
        }

        #lava-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }
        .atmos       { position:fixed; inset:0; z-index:1; pointer-events:none;
            background:radial-gradient(ellipse 80% 45% at 50% 0%, rgba(255,90,0,0.20) 0%, transparent 60%),
                       radial-gradient(ellipse 100% 100% at 50% 50%, transparent 35%, rgba(0,0,0,0.75) 100%); }
        .scanlines   { position:fixed; inset:0; z-index:2; pointer-events:none;
            background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px); }

        .panel {
            position:relative; z-index:10;
            background:var(--panel);
            border:1px solid rgba(255,140,0,0.20); border-radius:8px;
            padding:38px 32px 30px; width:100%; max-width:560px; text-align:center;
            box-shadow:0 0 0 1px rgba(0,0,0,0.9),0 8px 40px rgba(0,0,0,0.85),0 0 100px rgba(255,80,0,0.12);
            backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
            animation:panelIn .55s cubic-bezier(.22,1,.36,1) both;
        }
        @keyframes panelIn { from{opacity:0;transform:translateY(18px) scale(.97)} to{opacity:1;transform:none} }

        .c { position:absolute; width:14px; height:14px; }
        .c-tl { top:-1px; left:-1px;   border-top:2px solid var(--orange); border-left:2px solid var(--orange);  border-radius:3px 0 0 0; }
        .c-tr { top:-1px; right:-1px;  border-top:2px solid var(--orange); border-right:2px solid var(--orange); border-radius:0 3px 0 0; }
        .c-bl { bottom:-1px; left:-1px;  border-bottom:2px solid var(--orange); border-left:2px solid var(--orange);  border-radius:0 0 0 3px; }
        .c-br { bottom:-1px; right:-1px; border-bottom:2px solid var(--orange); border-right:2px solid var(--orange); border-radius:0 0 3px 0; }

        .logo-eyebrow { font-size:.5rem; letter-spacing:4px; color:var(--muted); text-transform:uppercase; margin-bottom:10px; }
        h1 {
            font-family:'Orbitron',sans-serif; font-size:1.6rem; font-weight:900; letter-spacing:5px;
            background:linear-gradient(180deg,#ffd080 0%,#ff9c20 35%,#ff6600 70%,#cc4400 100%);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
            filter:drop-shadow(0 0 18px rgba(255,140,0,0.5)); line-height:1.1;
        }
        .logo-sub { font-size:.5rem; letter-spacing:5px; color:var(--muted); text-transform:uppercase; margin-top:8px; margin-bottom:24px; }
        .divider  { width:100%; height:1px; background:linear-gradient(90deg,transparent,rgba(255,140,0,0.25),transparent); margin-bottom:22px; }

        .info-box {
            background:rgba(255,140,0,0.05);
            border:1px solid rgba(255,140,0,0.15);
            border-radius:4px; padding:14px;
            font-size:.6rem; letter-spacing:1.5px; color:var(--dim);
            text-transform:uppercase; line-height:1.7; margin-bottom:20px;
        }
        .info-box strong { color:var(--orange); font-weight:500; }

        #status { font-size:.65rem; letter-spacing:2px; text-transform:uppercase;
            color:var(--dim); margin-bottom:16px; display:flex; align-items:center;
            justify-content:center; gap:8px; min-height:1em; }
        .sdot { width:5px; height:5px; border-radius:50%; background:var(--muted);
            animation:pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
        #status.green .sdot { background:var(--green); box-shadow:0 0 8px rgba(0,255,136,0.4); }
        #status.green       { color:var(--green); }
        #status.red   .sdot { background:var(--red); box-shadow:0 0 8px rgba(255,68,85,0.4); animation:none; }
        #status.red         { color:var(--red); }
        #status.amber .sdot { background:var(--orange); box-shadow:0 0 8px var(--orange-glow); }
        #status.amber       { color:var(--orange); }

        #ad-container {
            min-height:80px; padding:10px;
            background:rgba(0,0,0,0.3);
            border:1px dashed rgba(255,140,0,0.15);
            border-radius:4px; margin-bottom:16px;
        }

        #error-box { display:none; }
        #error-box.show { display:block; animation:slideUp .4s ease both; }
        @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
        .err-msg { font-size:.65rem; color:rgba(255,140,150,0.95); letter-spacing:.5px;
            line-height:1.7; white-space:pre-line; padding:14px;
            background:rgba(255,68,85,0.08); border:1px solid rgba(255,68,85,0.22);
            border-radius:4px; text-align:left; margin-bottom:12px; }
        .err-cta { display:block; background:transparent;
            border:1px solid rgba(255,140,0,0.3); color:rgba(255,140,0,0.7);
            padding:10px; font-family:'Orbitron',sans-serif;
            font-size:.6rem; letter-spacing:2.5px; text-transform:uppercase;
            font-weight:600; cursor:pointer; border-radius:3px; width:100%;
            text-decoration:none; text-align:center; transition:all .25s; }
        .err-cta:hover { background:rgba(255,140,0,0.08); color:var(--orange); border-color:rgba(255,140,0,0.55); }

        .footer { margin-top:22px; display:flex; justify-content:center; align-items:center; gap:10px; }
        .fi { font-size:.45rem; letter-spacing:1.5px; color:#1a0e06; text-transform:uppercase; }
        .fd { width:2px; height:2px; border-radius:50%; background:#1a0e06; }
    </style>
</head>
<body>

<canvas id="lava-canvas"></canvas>
<div class="atmos"></div>
<div class="scanlines"></div>

<div class="panel">
    <div class="c c-tl"></div><div class="c c-tr"></div>
    <div class="c c-bl"></div><div class="c c-br"></div>

    <div class="logo-eyebrow">◆ Ad Verification ◆</div>
    <h1>REZURXLAB</h1>
    <div class="logo-sub">Complete Below To Continue</div>
    <div class="divider"></div>

    <div class="info-box">
        Click the <strong>Linkvertise button</strong> below.<br>
        Complete the <strong>1 short ad</strong>.<br>
        You'll be <strong>redirected automatically</strong>.
    </div>

    <div id="status"><span class="sdot"></span><span id="status-txt">Loading ad...</span></div>

    <div id="ad-container">
        <a id="lv-link" href="https://link-center.net/5011888/q763gg8u5DCT" target="_blank" rel="noopener">
            Click here to start the ad
        </a>
    </div>

    <div id="error-box">
        <div class="err-msg" id="err-msg"></div>
        <a href="https://rezurxshinn.github.io/RezurX-site/start.html" class="err-cta">[ ◂ Return to Start ]</a>
    </div>

    <div class="footer">
        <span class="fi">AES-256</span><div class="fd"></div>
        <span class="fi">HWID Lock</span><div class="fd"></div>
        <span class="fi">V4.2</span>
    </div>
</div>

<script>
(() => {
    'use strict';

    const SESSION_KEY = 'rzx_session_v3';
    const TOKEN_RE    = /^[a-f0-9]{16,128}$/i;
    const REDIRECT_BASE = 'https://rezurxshinn.github.io/RezurX-site/index.html';

    const statusEl = document.getElementById('status');
    const statusTx = document.getElementById('status-txt');
    const errorBox = document.getElementById('error-box');
    const errMsg   = document.getElementById('err-msg');
    const lvLink   = document.getElementById('lv-link');

    function setStatus(msg, type = '') { statusTx.textContent = msg; statusEl.className = type; }
    function showError(msg) {
        errMsg.textContent = msg;
        errorBox.classList.add('show');
        setStatus('ERROR', 'red');
    }

    /* ── Token retrieval ── */
    function getToken() {
        // 1. URL query parameter (primary, from start.html)
        const params = new URLSearchParams(window.location.search);
        const fromUrl = params.get('token');
        if (fromUrl && TOKEN_RE.test(fromUrl)) return fromUrl;

        // 2. URL fragment fallback
        const hash = window.location.hash;
        if (hash) {
            const m = hash.match(/token=([a-f0-9]{16,128})/i);
            if (m) return m[1];
        }

        // 3. localStorage fallback
        try {
            const raw = localStorage.getItem(SESSION_KEY);
            if (raw) {
                const data = JSON.parse(raw);
                if (data.token && TOKEN_RE.test(data.token)) return data.token;
            }
        } catch (_) {}

        return null;
    }

    /* ── MAIN ── */
    const token = getToken();

    if (!token) {
        showError('NO SESSION TOKEN FOUND\n\nPlease return to the start page and click the Linkvertise button to begin.');
    } else {
        // Re-store in localStorage as a safety net
        try {
            const existing = localStorage.getItem(SESSION_KEY);
            if (!existing) {
                // Store minimal session if not already stored
                localStorage.setItem(SESSION_KEY, JSON.stringify({
                    token, fp: '', ts: Date.now(), provider: 'linkvertise'
                }));
            }
        } catch (_) {}

        // Build redirect URL – MUST be bare; Linkvertise appends ?hash= itself
        const redirectUrl = REDIRECT_BASE;

        // Try to load the official Linkvertise embed
        const script = document.createElement('script');
        script.src = 'https://publisher.linkvertise.com/cdn/linkvertise.js';
        script.async = true;
        script.onload = () => {
            try {
                if (typeof linkvertise === 'function') {
                    linkvertise(5011888, {
                        whitelist: [],
                        blacklist: [],
                        redirect: redirectUrl,
                    });
                    setStatus('● Click the ad above to continue', 'green');
                } else {
                    fallbackLink();
                }
            } catch (e) {
                console.error('[RezurX] Linkvertise embed error:', e);
                fallbackLink();
            }
        };
        script.onerror = () => {
            console.warn('[RezurX] Linkvertise script blocked or failed');
            fallbackLink();
        };
        document.head.appendChild(script);

        function fallbackLink() {
            // If embed fails, use a direct link with token in fragment
            lvLink.href = 'https://link-center.net/5011888/q763gg8u5DCT';
            lvLink.style.cssText = 'display:inline-block;padding:14px 28px;background:linear-gradient(180deg,#ff9920,#ff6600);color:#1a0800;font-family:Orbitron,sans-serif;font-weight:700;letter-spacing:2px;text-transform:uppercase;text-decoration:none;border-radius:3px;font-size:.7rem;box-shadow:0 4px 18px rgba(255,100,0,0.35);';
            lvLink.textContent = '▸ Start Linkvertise Ad';
            setStatus('● Click the button to begin', 'amber');
        }

        // Safety: also expose token in URL fragment of THIS page so a manual return preserves it
        if (!window.location.hash.includes('token=')) {
            history.replaceState(null, '', window.location.pathname + '#token=' + encodeURIComponent(token));
        }
    }

    /* ── Lava background ── */
    (function () {
        const cv  = document.getElementById('lava-canvas');
        const ctx = cv.getContext('2d');
        function resize() { cv.width = innerWidth; cv.height = innerHeight; }
        resize(); window.addEventListener('resize', resize);
        const pal = [[255,80,0],[255,120,10],[255,60,0],[220,40,0],[255,155,20],[180,30,0],[255,140,0],[200,50,0]];
        const rnd = (a,b) => a+Math.random()*(b-a);
        function mk(init) {
            const c=pal[Math.floor(Math.random()*pal.length)],sp=cv.width*.25;
            return {x:cv.width*.5+rnd(-sp,sp),y:init?rnd(-cv.height,0):rnd(-80,0),vy:rnd(1.5,3.5),vx:rnd(-.7,.7),radius:rnd(4,12),tail:[],maxTail:Math.floor(rnd(12,28)),r:c[0],g:c[1],b:c[2],alpha:rnd(.5,.9),wobble:rnd(0,Math.PI*2),wobbleSpd:rnd(.008,.04),wobbleAmp:rnd(.3,1.5)};
        }
        const drops=[]; for(let i=0;i<80;i++) drops.push(mk(true));
        function drawDrop(d) {
            const {x,y,radius:rd,r,g,b,alpha,tail}=d;
            for(let i=0;i<tail.length;i++){const t=tail[i],pct=i/tail.length,a=alpha*pct*.4,rad=rd*pct*.6;if(rad<.5||a<.01)continue;ctx.beginPath();ctx.arc(t.x,t.y,rad,0,Math.PI*2);ctx.fillStyle=`rgba(${r},${g},${b},${a})`;ctx.fill();}
            const gr=ctx.createRadialGradient(x,y,0,x,y,rd*4.5);gr.addColorStop(0,`rgba(${r},${g},${b},${alpha*.4})`);gr.addColorStop(1,`rgba(${r},${g},${b},0)`);ctx.beginPath();ctx.arc(x,y,rd*4.5,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
            const gm=ctx.createRadialGradient(x-rd*.3,y-rd*.35,0,x,y,rd);gm.addColorStop(0,`rgba(255,220,140,${alpha*.85})`);gm.addColorStop(.35,`rgba(${r},${g},${b},${alpha})`);gm.addColorStop(1,`rgba(${Math.max(r-70,0)},${Math.max(g-50,0)},0,${alpha})`);ctx.beginPath();ctx.arc(x,y,rd,0,Math.PI*2);ctx.fillStyle=gm;ctx.fill();
        }
        function animate() {
            ctx.clearRect(0,0,cv.width,cv.height);
            for(const d of drops){d.wobble+=d.wobbleSpd;d.x+=Math.sin(d.wobble)*d.wobbleAmp+d.vx;d.y+=d.vy;d.tail.push({x:d.x,y:d.y});if(d.tail.length>d.maxTail)d.tail.shift();drawDrop(d);if(d.y-d.radius>cv.height+20){Object.assign(d,mk(false));d.tail=[];}}
            requestAnimationFrame(animate);
        }
        animate();
    })();
})();
</script>
</body>
</html>
