<head>

<style>
:root{--orange:#ff8c00;--orange-bright:#ffaa33;--orange-dim:#cc6600;--orange-glow:rgba(255,140,0,.45);
  --green:#00ff88;--red:#ff4455;--bg:#070100;--panel:rgba(8,3,0,.93);
  --muted:#3a3028;--dim:#6a5848;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{background:var(--bg);color:#fff;font-family:'JetBrains Mono',monospace;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  min-height:100vh;overflow-x:hidden;position:relative;
  -webkit-font-smoothing:antialiased;padding:20px;}

#lava-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.atmos{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse 85% 50% at 50% 0%,rgba(255,90,0,.22) 0%,transparent 60%),
             radial-gradient(ellipse 100% 100% at 50% 50%,transparent 35%,rgba(0,0,0,.78) 100%);}
.scanlines{position:fixed;inset:0;z-index:2;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px);}
.embers{position:fixed;inset:0;z-index:2;pointer-events:none;
  background-image:
    radial-gradient(2px 2px at 20% 88%,rgba(255,180,50,.65) 0%,transparent 100%),
    radial-gradient(3px 3px at 75% 90%,rgba(255,140,0,.55) 0%,transparent 100%),
    radial-gradient(1px 1px at 55% 82%,rgba(255,200,80,.45) 0%,transparent 100%);
  background-size:200% 200%;animation:embersFloat 9s ease-in-out infinite alternate;}
@keyframes embersFloat{0%{transform:translateY(0)}100%{transform:translateY(-15px)}}

.panel{position:relative;z-index:10;background:var(--panel);
  border:1px solid rgba(255,140,0,.22);border-radius:10px;
  padding:40px 34px 32px;width:100%;max-width:580px;text-align:center;
  box-shadow:0 0 0 1px rgba(0,0,0,.92),0 10px 45px rgba(0,0,0,.88),0 0 110px rgba(255,80,0,.14);
  backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);
  animation:panelIn .55s cubic-bezier(.22,1,.36,1) both;}
@keyframes panelIn{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:none}}
.panel::before{content:"";position:absolute;inset:-1px;border-radius:10px;pointer-events:none;
  background:linear-gradient(135deg,rgba(255,150,30,.45) 0%,transparent 30%,transparent 70%,rgba(255,140,0,.28) 100%);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;padding:1px;opacity:.85;}

.c{position:absolute;width:14px;height:14px;}
.c-tl{top:-1px;left:-1px;border-top:2px solid var(--orange-bright);border-left:2px solid var(--orange-bright);border-radius:4px 0 0 0;filter:drop-shadow(0 0 5px var(--orange-glow));}
.c-tr{top:-1px;right:-1px;border-top:2px solid var(--orange-bright);border-right:2px solid var(--orange-bright);border-radius:0 4px 0 0;filter:drop-shadow(0 0 5px var(--orange-glow));}
.c-bl{bottom:-1px;left:-1px;border-bottom:2px solid var(--orange-bright);border-left:2px solid var(--orange-bright);border-radius:0 0 0 4px;filter:drop-shadow(0 0 5px var(--orange-glow));}
.c-br{bottom:-1px;right:-1px;border-bottom:2px solid var(--orange-bright);border-right:2px solid var(--orange-bright);border-radius:0 0 4px 0;filter:drop-shadow(0 0 5px var(--orange-glow));}

.logo-eyebrow{font-size:.5rem;letter-spacing:4px;color:var(--orange-dim);text-transform:uppercase;margin-bottom:10px;}
h1{font-family:'Orbitron',sans-serif;font-size:1.75rem;font-weight:900;letter-spacing:6px;
   background:linear-gradient(180deg,#ffe0a0 0%,#ffaa33 35%,#ff6600 70%,#aa3300 100%);
   -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
   filter:drop-shadow(0 0 20px rgba(255,140,0,.55));line-height:1.1;
   animation:logoBreath 4s ease-in-out infinite;}
@keyframes logoBreath{0%,100%{filter:drop-shadow(0 0 20px rgba(255,140,0,.55))}50%{filter:drop-shadow(0 0 32px rgba(255,170,50,.85))}}
.logo-sub{font-size:.5rem;letter-spacing:6px;color:var(--muted);text-transform:uppercase;margin-top:9px;margin-bottom:24px;}
.divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,140,0,.35),transparent);margin-bottom:22px;position:relative;}
.divider::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:6px;height:6px;border-radius:50%;background:var(--orange);box-shadow:0 0 10px var(--orange-glow);}

.info-box{background:linear-gradient(180deg,rgba(255,140,0,.07) 0%,rgba(255,140,0,.02) 100%);
  border:1px solid rgba(255,140,0,.18);border-radius:5px;padding:14px;
  font-size:.6rem;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;
  line-height:1.75;margin-bottom:18px;}
.info-box strong{color:var(--orange);font-weight:500;}

.timer-row{display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(180deg,rgba(0,0,0,.4) 0%,rgba(0,0,0,.2) 100%);
  border:1px solid rgba(255,140,0,.18);
  border-radius:5px;padding:12px 16px;margin-bottom:16px;
  font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--dim);}
.timer-row .lbl{color:var(--muted);font-weight:500;}
.timer-row .val{color:var(--orange-bright);font-weight:700;font-family:'Orbitron',sans-serif;
  text-shadow:0 0 8px var(--orange-glow);font-size:.75rem;letter-spacing:3px;}
.timer-row.warn .val{color:#ff7a44;}
.timer-row.crit .val{color:var(--red);text-shadow:0 0 8px var(--red);animation:critPulse 1s ease-in-out infinite;}
@keyframes critPulse{0%,100%{opacity:1}50%{opacity:.5}}

#status{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--dim);margin-bottom:14px;display:flex;align-items:center;
  justify-content:center;gap:8px;min-height:1em;font-weight:500;}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--muted);
  animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
#status.green .sdot{background:var(--green);box-shadow:0 0 10px rgba(0,255,136,.5);}
#status.green{color:var(--green);}
#status.red .sdot{background:var(--red);box-shadow:0 0 10px rgba(255,68,85,.5);animation:none;}
#status.red{color:var(--red);}
#status.amber .sdot{background:var(--orange);box-shadow:0 0 10px var(--orange-glow);}
#status.amber{color:var(--orange-bright);}

#ad-container{min-height:80px;padding:12px;background:rgba(0,0,0,.35);
  border:1px dashed rgba(255,140,0,.18);border-radius:5px;margin-bottom:14px;
  transition:border-color .3s;}
#ad-container:hover{border-color:rgba(255,140,0,.4);}

#error-box{display:none;}
#error-box.show{display:block;animation:slideUp .4s ease both;}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.err-msg{font-size:.65rem;color:rgba(255,140,150,.95);letter-spacing:.5px;
  line-height:1.7;white-space:pre-line;padding:14px;
  background:rgba(255,68,85,.08);border:1px solid rgba(255,68,85,.22);
  border-radius:5px;text-align:left;margin-bottom:12px;}
.err-cta{display:block;background:transparent;border:1px solid rgba(255,140,0,.32);
  color:rgba(255,140,0,.75);padding:11px;font-family:'Orbitron',sans-serif;
  font-size:.6rem;letter-spacing:2.5px;text-transform:uppercase;
  font-weight:600;cursor:pointer;border-radius:4px;width:100%;
  text-decoration:none;text-align:center;transition:all .25s;}
.err-cta:hover{background:rgba(255,140,0,.1);color:var(--orange);border-color:rgba(255,140,0,.6);}

.footer{margin-top:22px;display:flex;justify-content:center;align-items:center;gap:11px;padding-top:16px;border-top:1px solid rgba(255,140,0,.08);}
.fi{font-size:.45rem;letter-spacing:1.8px;color:#1a0e06;text-transform:uppercase;}
.fd{width:2px;height:2px;border-radius:50%;background:#1a0e06;}
</style>
</head>

<script>
(() => {
'use strict';

const SESSION_KEY   = 'rzx_session_v5';
const CSRF_KEY      = 'rzx_csrf_v5';
const SBLOB_KEY     = 'rzx_sblob_v5';
const TOKEN_RE      = /^[a-f0-9]{16,128}$/i;
const REDIRECT_BASE = 'https://rezurxshinn.github.io/RezurX-site/index.html';
const IDLE_LIMIT_MS = 10 * 60 * 1000;

if (top !== self) { try { top.location = self.location; } catch(_) { document.body.innerHTML=''; } }

const statusEl = document.getElementById('status');
const statusTx = document.getElementById('status-txt');
const errorBox = document.getElementById('error-box');
const errMsg   = document.getElementById('err-msg');
const lvLink   = document.getElementById('lv-link');
const timerEl  = document.getElementById('timer');
const timerRow = document.getElementById('timer-row');

function setStatus(m,t=''){statusTx.textContent=m;statusEl.className=t;}
function showError(m){errMsg.textContent=m;errorBox.classList.add('show');setStatus('ERROR','red');}

function getToken(){
  const p=new URLSearchParams(location.search);
  const u=p.get('token');
  if(u && TOKEN_RE.test(u)) return u;
  const h=location.hash;
  if(h){const m=h.match(/token=([a-f0-9]{16,128})/i);if(m) return m[1];}
  try{const raw=localStorage.getItem(SESSION_KEY);if(raw){const d=JSON.parse(raw);if(d.token && TOKEN_RE.test(d.token)) return d.token;}}catch(_){}
  return null;
}

const token=getToken();

if(!token){
  showError('NO SESSION TOKEN FOUND\n\nReturn to the start page and begin again.');
  timerEl.textContent='--:--';
} else {
  const startTs=Date.now();
  function tick(){
    const left=Math.max(0,IDLE_LIMIT_MS-(Date.now()-startTs));
    const m=Math.floor(left/60000),s=Math.floor((left%60000)/1000);
    timerEl.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    timerRow.classList.toggle('warn', left < 3*60*1000 && left >= 60*1000);
    timerRow.classList.toggle('crit', left < 60*1000);
    if(left<=0){
      try{localStorage.removeItem(SESSION_KEY);localStorage.removeItem(CSRF_KEY);localStorage.removeItem(SBLOB_KEY);}catch(_){}
      location.href='start.html?expired=1';
      return;
    }
    requestAnimationFrame(()=>setTimeout(tick,250));
  }
  tick();

  const redirectUrl=REDIRECT_BASE;

  const script=document.createElement('script');
  script.src='https://publisher.linkvertise.com/cdn/linkvertise.js';
  script.async=true;
  script.onload=()=>{
    try{
      if(typeof linkvertise==='function'){
        linkvertise(5011888,{whitelist:[],blacklist:[],redirect:redirectUrl});
        setStatus('● Click the ad above to continue','green');
      } else fallbackLink();
    }catch(e){console.error(e);fallbackLink();}
  };
  script.onerror=()=>fallbackLink();
  document.head.appendChild(script);

  function fallbackLink(){
    lvLink.href='https://link-center.net/5011888/q763gg8u5DCT';
    lvLink.style.cssText='display:inline-block;padding:14px 28px;background:linear-gradient(180deg,#ff9920,#ff6600);color:#1a0800;font-family:Orbitron,sans-serif;font-weight:700;letter-spacing:2px;text-transform:uppercase;text-decoration:none;border-radius:4px;font-size:.7rem;box-shadow:0 4px 18px rgba(255,100,0,.4);';
    lvLink.textContent='▸ Start Linkvertise Ad';
    setStatus('● Click the button to begin','amber');
  }

  if(!location.hash.includes('token=')){
    history.replaceState(null,'',location.pathname+'#token='+encodeURIComponent(token));
  }
}

/* Lava */
(function(){
  const cv=document.getElementById('lava-canvas');const ctx=cv.getContext('2d');
  function resize(){cv.width=innerWidth;cv.height=innerHeight;}
  resize();addEventListener('resize',resize);
  const pal=[[255,80,0],[255,120,10],[255,60,0],[220,40,0],[255,155,20],[180,30,0],[255,140,0],[200,50,0]];
  const rnd=(a,b)=>a+Math.random()*(b-a);
  function mk(init){
    const c=pal[Math.floor(Math.random()*pal.length)],sp=cv.width*.27;
    return{x:cv.width*.5+rnd(-sp,sp),y:init?rnd(-cv.height,0):rnd(-80,0),
           vy:rnd(1.5,3.6),vx:rnd(-.7,.7),radius:rnd(4,13),tail:[],
           maxTail:Math.floor(rnd(13,30)),r:c[0],g:c[1],b:c[2],
           alpha:rnd(.5,.92),wobble:rnd(0,Math.PI*2),
           wobbleSpd:rnd(.008,.045),wobbleAmp:rnd(.3,1.6)};
  }
  const drops=[];for(let i=0;i<90;i++)drops.push(mk(true));
  function drawDrop(d){
    const{x,y,radius:rd,r,g,b,alpha,tail}=d;
    for(let i=0;i<tail.length;i++){
      const t=tail[i],pct=i/tail.length,a=alpha*pct*.42,rad=rd*pct*.65;
      if(rad<.5||a<.01)continue;
      ctx.beginPath();ctx.arc(t.x,t.y,rad,0,Math.PI*2);
      ctx.fillStyle=`rgba(${r},${g},${b},${a})`;ctx.fill();
    }
    const gr=ctx.createRadialGradient(x,y,0,x,y,rd*5);
    gr.addColorStop(0,`rgba(${r},${g},${b},${alpha*.45})`);
    gr.addColorStop(1,`rgba(${r},${g},${b},0)`);
    ctx.beginPath();ctx.arc(x,y,rd*5,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
    const gm=ctx.createRadialGradient(x-rd*.3,y-rd*.35,0,x,y,rd);
    gm.addColorStop(0,`rgba(255,225,150,${alpha*.9})`);
    gm.addColorStop(.35,`rgba(${r},${g},${b},${alpha})`);
    gm.addColorStop(1,`rgba(${Math.max(r-70,0)},${Math.max(g-50,0)},0,${alpha})`);
    ctx.beginPath();ctx.arc(x,y,rd,0,Math.PI*2);ctx.fillStyle=gm;ctx.fill();
  }
  function animate(){
    ctx.clearRect(0,0,cv.width,cv.height);
    for(const d of drops){
      d.wobble+=d.wobbleSpd;
      d.x+=Math.sin(d.wobble)*d.wobbleAmp+d.vx;
      d.y+=d.vy;d.tail.push({x:d.x,y:d.y});
      if(d.tail.length>d.maxTail)d.tail.shift();
      drawDrop(d);
      if(d.y-d.radius>cv.height+20){Object.assign(d,mk(false));d.tail=[];}
    }
    requestAnimationFrame(animate);
  }
  animate();
})();
})();
</script>
</body>
