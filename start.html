<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0a0200">
    <title>RezurXLab | Get Key</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange:      #ff8c00;
            --orange-dim:  #cc6600;
            --orange-glow: rgba(255,140,0,0.45);
            --green:       #00ff88;
            --green-glow:  rgba(0,255,136,0.35);
            --red:         #ff4455;
            --red-soft:    rgba(255,68,85,0.08);
            --bg:          #0a0200;
            --panel:       rgba(10,4,0,0.93);
            --muted:       #3a3028;
            --dim:         #6a5848;
        }
        *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
        html,body { height:100%; }
        body {
            background:var(--bg); color:#fff;
            font-family:'JetBrains Mono',monospace;
            display:flex; flex-direction:column;
            justify-content:center; align-items:center;
            min-height:100vh; overflow:hidden; position:relative;
            -webkit-font-smoothing:antialiased;
        }

        #lava-canvas { position:fixed; inset:0; width:100%; height:100%; z-index:0; pointer-events:none; }
        .atmos {
            position:fixed; inset:0; z-index:1; pointer-events:none;
            background:
                radial-gradient(ellipse 90% 50% at 50% 0%, rgba(255,90,0,0.20) 0%, transparent 65%),
                radial-gradient(ellipse 100% 100% at 50% 50%, transparent 35%, rgba(0,0,0,0.72) 100%);
        }
        .scanlines {
            position:fixed; inset:0; z-index:2; pointer-events:none;
            background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.045) 3px,rgba(0,0,0,0.045) 4px);
        }

        .panel {
            position:relative; z-index:10;
            background:var(--panel);
            border:1px solid rgba(255,140,0,0.22);
            border-radius:6px; padding:42px 38px 34px;
            width:92%; max-width:480px; text-align:center;
            box-shadow:
                0 0 0 1px rgba(0,0,0,0.9),
                0 8px 40px rgba(0,0,0,0.85),
                0 0 100px rgba(255,80,0,0.10),
                inset 0 1px 0 rgba(255,180,80,0.09);
            backdrop-filter:blur(3px);
            animation:panelIn .55s cubic-bezier(0.22,1,0.36,1) both;
        }
        @keyframes panelIn { from{opacity:0;transform:translateY(18px) scale(0.97);} to{opacity:1;transform:none;} }

        .c { position:absolute; width:14px; height:14px; }
        .c-tl { top:-1px; left:-1px;  border-top:2px solid var(--orange); border-left:2px solid var(--orange);  border-radius:3px 0 0 0; }
        .c-tr { top:-1px; right:-1px; border-top:2px solid var(--orange); border-right:2px solid var(--orange); border-radius:0 3px 0 0; }
        .c-bl { bottom:-1px; left:-1px;  border-bottom:2px solid var(--orange); border-left:2px solid var(--orange);  border-radius:0 0 0 3px; }
        .c-br { bottom:-1px; right:-1px; border-bottom:2px solid var(--orange); border-right:2px solid var(--orange); border-radius:0 0 3px 0; }

        .logo-eyebrow { font-size:.52rem; letter-spacing:4px; color:var(--muted); text-transform:uppercase; margin-bottom:10px; }
        h1 {
            font-family:'Orbitron',sans-serif; font-size:1.75rem; font-weight:900; letter-spacing:5px;
            background:linear-gradient(180deg,#ffd080 0%,#ff9c20 35%,#ff6600 70%,#cc4400 100%);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
            filter:drop-shadow(0 0 20px rgba(255,140,0,0.55)); line-height:1.1;
            animation:logoBreath 4s ease-in-out infinite;
        }
        @keyframes logoBreath { 0%,100%{filter:drop-shadow(0 0 20px rgba(255,140,0,0.55));} 50%{filter:drop-shadow(0 0 32px rgba(255,140,0,0.85));} }
        .logo-sub { font-size:.5rem; letter-spacing:5px; color:var(--muted); text-transform:uppercase; margin-top:9px; margin-bottom:28px; }
        .divider   { width:100%; height:1px; background:linear-gradient(90deg,transparent,rgba(255,140,0,0.22),transparent); margin-bottom:22px; }

        /* Steps */
        .steps { display:flex; align-items:center; justify-content:center; margin-bottom:26px; }
        .step  { display:flex; flex-direction:column; align-items:center; gap:5px; }
        .step-num {
            width:26px; height:26px; border-radius:50%;
            border:1px solid rgba(255,140,0,0.25);
            display:flex; align-items:center; justify-content:center;
            font-size:.58rem; color:rgba(255,140,0,0.4);
            transition:all .3s;
        }
        .step-num.active { border-color:var(--orange); color:var(--orange); box-shadow:0 0 10px var(--orange-glow); }
        .step-num.done   { border-color:var(--green);  color:var(--green);  box-shadow:0 0 8px var(--green-glow); }
        .step-label { font-size:.46rem; letter-spacing:1px; color:var(--muted); text-transform:uppercase; }
        .step-line  { width:36px; height:1px; background:rgba(255,140,0,0.12); margin:0 4px 20px; }

        /* Spinner */
        .spin-row { display:none; align-items:center; justify-content:center; gap:12px; margin-bottom:16px; }
        .spin-row.on { display:flex; }
        .spinner { width:18px; height:18px; border:2px solid rgba(255,140,0,0.15); border-top-color:var(--orange); border-radius:50%; animation:spin .8s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg);} }
        .spin-txt { font-size:.65rem; color:var(--dim); letter-spacing:2px; text-transform:uppercase; }

        /* Status */
        #status {
            font-size:.68rem; letter-spacing:2px; text-transform:uppercase;
            color:var(--dim); margin-bottom:20px;
            display:flex; align-items:center; justify-content:center; gap:8px;
            transition:color .3s; min-height:1.1em;
        }
        .sdot { width:5px; height:5px; border-radius:50%; background:var(--muted); flex-shrink:0; animation:pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
        #status.green { color:var(--green); }
        #status.green .sdot { background:var(--green); box-shadow:0 0 6px var(--green-glow); }
        #status.red   { color:var(--red); }
        #status.red   .sdot { background:var(--red); animation:none; }
        #status.amber { color:var(--orange); }
        #status.amber .sdot { background:var(--orange); box-shadow:0 0 6px var(--orange-glow); }

        /* Main button */
        #start-btn {
            position:relative; overflow:hidden; background:transparent;
            border:1px solid var(--orange); color:var(--orange);
            font-family:'Orbitron',sans-serif; font-size:.78rem; font-weight:700;
            padding:18px 24px; width:100%; cursor:pointer;
            letter-spacing:3px; text-transform:uppercase; border-radius:3px;
            transition:color .25s,background .25s,box-shadow .25s,opacity .25s;
        }
        #start-btn::after {
            content:""; position:absolute; top:0; left:-120%; width:60%; height:100%;
            background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);
            animation:shimmer 2.8s ease-in-out infinite;
        }
        @keyframes shimmer { 0%{left:-120%} 55%,100%{left:160%} }
        #start-btn:hover:not(:disabled) { background:var(--orange); color:#000; box-shadow:0 0 30px var(--orange-glow); }
        #start-btn:active:not(:disabled) { transform:scale(.98); }
        #start-btn:disabled { opacity:.28; cursor:not-allowed; }

        /* Cooldown box */
        #cooldown-box {
            display:none;
            background:rgba(255,140,0,0.04);
            border:1px solid rgba(255,140,0,0.18);
            border-radius:4px; padding:20px 16px;
            margin-bottom:16px;
        }
        #cooldown-box.show { display:block; animation:slideUp .35s ease both; }
        @keyframes slideUp { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:none;} }
        .cd-label { font-size:.52rem; letter-spacing:3px; color:rgba(255,140,0,0.5); text-transform:uppercase; margin-bottom:10px; }
        #cd-timer {
            font-family:'Orbitron',sans-serif; font-size:1.6rem; font-weight:700;
            color:var(--orange); letter-spacing:4px;
            text-shadow:0 0 20px var(--orange-glow);
            margin-bottom:8px; font-variant-numeric:tabular-nums;
        }
        #cd-msg { font-size:.55rem; color:var(--dim); letter-spacing:1px; line-height:1.7; }

        /* Error */
        #error-box { display:none; margin-top:14px; background:var(--red-soft); border:1px solid rgba(255,68,85,0.25); border-radius:4px; padding:14px; }
        #error-box.show { display:block; animation:slideUp .3s ease both; }
        #error-msg { font-size:.65rem; color:var(--red); letter-spacing:.5px; line-height:1.55; margin-bottom:10px; white-space:pre-line; }
        #retry-btn {
            background:transparent; border:1px solid rgba(255,68,85,0.3); color:var(--red);
            font-family:'JetBrains Mono',monospace; font-size:.62rem; padding:9px; width:100%;
            cursor:pointer; letter-spacing:1px; border-radius:2px; transition:all .2s; text-transform:uppercase;
        }
        #retry-btn:hover { background:rgba(255,68,85,0.08); }

        .footer { margin-top:24px; display:flex; justify-content:center; align-items:center; gap:10px; }
        .fi { font-size:.45rem; letter-spacing:1.5px; color:#1a0e06; text-transform:uppercase; }
        .fd { width:2px; height:2px; border-radius:50%; background:#1a0e06; }
    </style>
</head>
<body>

<canvas id="lava-canvas"></canvas>
<div class="atmos"></div>
<div class="scanlines"></div>

<div class="panel">
    <div class="c c-tl"></div><div class="c c-tr"></div>
    <div class="c c-bl"></div><div class="c c-br"></div>

    <div class="logo-eyebrow">Access Portal</div>
    <h1>REZURXLAB</h1>
    <div class="logo-sub">Key Generation System</div>
    <div class="divider"></div>

    <div class="steps">
        <div class="step">
            <div class="step-num active" id="sn1">01</div>
            <div class="step-label">Start</div>
        </div>
        <div class="step-line"></div>
        <div class="step">
            <div class="step-num" id="sn2">02</div>
            <div class="step-label">Complete Ad</div>
        </div>
        <div class="step-line"></div>
        <div class="step">
            <div class="step-num" id="sn3">03</div>
            <div class="step-label">Get Key</div>
        </div>
    </div>

    <!-- Cooldown: shown when they've recently gotten a key -->
    <div id="cooldown-box">
        <div class="cd-label">⏱ Next Key Available In</div>
        <div id="cd-timer">--:--:--</div>
        <div id="cd-msg">You already received a key recently.<br>Keys are valid for 10 hours. Please wait before requesting another.</div>
    </div>

    <div class="spin-row" id="spin-row">
        <div class="spinner"></div>
        <div class="spin-txt" id="spin-txt">Processing...</div>
    </div>

    <div id="status"><span class="sdot"></span><span id="status-txt">SYSTEM: READY</span></div>

    <button id="start-btn" type="button">⚡ Go to Ad &amp; Get Key</button>

    <div id="error-box">
        <div id="error-msg"></div>
        <button id="retry-btn" type="button">↩ Try Again</button>
    </div>

    <div class="footer">
        <span class="fi">AES-256</span><div class="fd"></div>
        <span class="fi">HWID Lock</span><div class="fd"></div>
        <span class="fi">V4.2</span>
    </div>
</div>

<script>
(() => {
    'use strict';

    /* ═══════════════════════════════════════
       CONFIG
    ═══════════════════════════════════════ */
    const API          = "https://rezurx-backend.onrender.com";
    const LINKVERTISE  = "https://link-center.net/5011888/q763gg8u5DCT";
    // Session-only key — dies when tab closes, cannot be copied to another tab
    const SESSION_KEY  = 'rzx_session_v3';
    // Cooldown tracking — stored in localStorage so it persists across sessions
    const COOLDOWN_KEY = 'rzx_cooldown_v3';
    // How long before they can get another key (10 hours in ms)
    const COOLDOWN_MS  = 10 * 60 * 60 * 1000;
    // Internal fingerprint binding secret
    const BIND_SECRET  = 'rzx_fp_bind_9x2';

    /* ═══════════════════════════════════════
       DOM
    ═══════════════════════════════════════ */
    const startBtn    = document.getElementById('start-btn');
    const spinRow     = document.getElementById('spin-row');
    const spinTxt     = document.getElementById('spin-txt');
    const statusEl    = document.getElementById('status');
    const statusTxt   = document.getElementById('status-txt');
    const errorBox    = document.getElementById('error-box');
    const errorMsg    = document.getElementById('error-msg');
    const cooldownBox = document.getElementById('cooldown-box');
    const cdTimer     = document.getElementById('cd-timer');

    /* ═══════════════════════════════════════
       BROWSER FINGERPRINT
       Used to bind the session token so it
       can't be copy-pasted into another browser.
    ═══════════════════════════════════════ */
    async function getFingerprint() {
        const nav = navigator;
        const scr = screen;
        let canvasHash = 'nc';
        try {
            const cv = document.createElement('canvas');
            cv.width = 180; cv.height = 40;
            const cx = cv.getContext('2d');
            cx.font = '13px Arial';
            cx.fillStyle = '#ff8c00';
            cx.fillText('RezurX🔥fp', 2, 20);
            cx.fillStyle = 'rgba(0,200,100,0.7)';
            cx.fillRect(8, 26, 60, 8);
            canvasHash = cv.toDataURL().slice(-48);
        } catch (_) {}

        const raw = [
            nav.userAgent,
            nav.language,
            nav.hardwareConcurrency || 0,
            nav.maxTouchPoints || 0,
            scr.colorDepth,
            scr.width + 'x' + scr.height,
            Intl.DateTimeFormat().resolvedOptions().timeZone,
            nav.platform || '',
            canvasHash,
            BIND_SECRET,
        ].join('|');

        const buf  = new TextEncoder().encode(raw);
        const hash = await crypto.subtle.digest('SHA-256', buf);
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    /* ═══════════════════════════════════════
       HELPERS
    ═══════════════════════════════════════ */
    function setStatus(msg, type = '') {
        statusTxt.textContent = msg;
        statusEl.className    = type;
    }
    function showSpinner(msg) { spinTxt.textContent = msg; spinRow.classList.add('on'); }
    function hideSpinner()    { spinRow.classList.remove('on'); }

    function showError(msg) {
        errorMsg.textContent = msg;
        errorBox.classList.add('show');
        setStatus('ERROR', 'red');
        hideSpinner();
        startBtn.disabled = false;
    }

    function setStep(n) {
        ['sn1','sn2','sn3'].forEach((id, i) => {
            const el = document.getElementById(id);
            el.classList.remove('active','done');
            if (i + 1 < n)  el.classList.add('done');
            if (i + 1 === n) el.classList.add('active');
        });
    }

    async function fetchT(url, opts = {}, ms = 15000) {
        const ctrl = new AbortController();
        const tid  = setTimeout(() => ctrl.abort(), ms);
        try {
            return await fetch(url, { ...opts, signal: ctrl.signal, mode: 'cors', credentials: 'omit' });
        } finally { clearTimeout(tid); }
    }

    /* ═══════════════════════════════════════
       COOLDOWN CHECK
       Reads localStorage to see if this
       browser got a key recently.
    ═══════════════════════════════════════ */
    function getCooldownRemaining() {
        try {
            const raw = localStorage.getItem(COOLDOWN_KEY);
            if (!raw) return 0;
            const { ts } = JSON.parse(raw);
            const elapsed = Date.now() - ts;
            return Math.max(0, COOLDOWN_MS - elapsed);
        } catch (_) { return 0; }
    }

    function setCooldown() {
        try { localStorage.setItem(COOLDOWN_KEY, JSON.stringify({ ts: Date.now() })); } catch (_) {}
    }

    function formatTime(ms) {
        const s = Math.floor(ms / 1000);
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
    }

    function startCooldownUI(remainingMs) {
        startBtn.style.display = 'none';
        cooldownBox.classList.add('show');
        setStatus('KEY ALREADY ISSUED', 'amber');

        let remaining = remainingMs;
        cdTimer.textContent = formatTime(remaining);

        const tick = setInterval(() => {
            remaining -= 1000;
            if (remaining <= 0) {
                clearInterval(tick);
                cdTimer.textContent = '00:00:00';
                cooldownBox.classList.remove('show');
                startBtn.style.display = 'block';
                setStatus('SYSTEM: READY', '');
            } else {
                cdTimer.textContent = formatTime(remaining);
            }
        }, 1000);
    }

    /* ═══════════════════════════════════════
       MAIN FLOW
    ═══════════════════════════════════════ */
    async function startFlow() {
        // Check cooldown first
        const remaining = getCooldownRemaining();
        if (remaining > 0) {
            startCooldownUI(remaining);
            return;
        }

        startBtn.disabled = true;
        errorBox.classList.remove('show');
        setStep(1);
        showSpinner('WAKING SERVER...');
        setStatus('WAKING SERVER...', 'amber');

        // Step 1: Warmup ping
        try {
            await fetchT(API + '/health', { method: 'GET', cache: 'no-store' }, 30000);
        } catch (err) {
            if (err.name === 'AbortError') {
                showError('Server took too long to wake up.\nPlease wait 30 seconds and try again.');
                return;
            }
        }

        // Step 2: Get session token
        showSpinner('GENERATING SESSION...');
        setStatus('GENERATING SESSION...', 'amber');

        let token;
        for (let attempt = 1; attempt <= 3; attempt++) {
            try {
                const res = await fetchT(
                    API + '/api/initiate-session',
                    { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' },
                    15000
                );
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                if (!data.token) throw new Error('No token in response');
                token = data.token;
                break;
            } catch (err) {
                if (attempt === 3) {
                    showError('Could not reach the server after 3 attempts.\n' + (err.message || '') + '\n\nPlease wait a moment and try again.');
                    return;
                }
                await new Promise(r => setTimeout(r, 1500));
                showSpinner('RETRYING (' + (attempt + 1) + '/3)...');
            }
        }

        // Step 3: Get fingerprint and bind it to the token
        // The fingerprint is stored alongside the token in sessionStorage.
        // index.html will recompute the fingerprint and reject if it doesn't match.
        let fp;
        try { fp = await getFingerprint(); } catch (_) { fp = 'fp-err'; }

        // Store in sessionStorage ONLY — no localStorage backup.
        // sessionStorage is tab-isolated: a new tab, incognito copy, or
        // different browser will not have this value.
        try {
            sessionStorage.setItem(SESSION_KEY, JSON.stringify({ token, fp }));
        } catch (_) {
            showError('Your browser blocked session storage.\nPlease allow cookies/storage for this site.');
            startBtn.disabled = false;
            hideSpinner();
            return;
        }

        // Step 4: Redirect
        setStep(2);
        setStatus('REDIRECTING TO AD...', 'amber');
        showSpinner('REDIRECTING...');
        await new Promise(r => setTimeout(r, 350));
        window.location.href = LINKVERTISE;
    }

    /* ═══════════════════════════════════════
       INIT
    ═══════════════════════════════════════ */
    window.addEventListener('load', () => {
        // Check if already on cooldown
        const remaining = getCooldownRemaining();
        if (remaining > 0) {
            startCooldownUI(remaining);
        }

        startBtn.addEventListener('click', startFlow);
        document.getElementById('retry-btn').addEventListener('click', () => {
            errorBox.classList.remove('show');
            setStatus('SYSTEM: READY', '');
            startBtn.disabled = false;
        });
    });

    /* ═══════════════════════════════════════
       EXPOSE setCooldown so index.html can
       call it via BroadcastChannel when a
       key is successfully issued.
       (index.html runs in a different page
       context but same origin, so we use
       BroadcastChannel to signal back.)
    ═══════════════════════════════════════ */
    const bc = new BroadcastChannel('rzx_channel');
    bc.onmessage = (e) => {
        if (e.data === 'key_issued') setCooldown();
    };

    /* ═══════════════════════════════════════
       LAVA BACKGROUND
    ═══════════════════════════════════════ */
    (function () {
        const cv  = document.getElementById('lava-canvas');
        const ctx = cv.getContext('2d');
        function resize() { cv.width = innerWidth; cv.height = innerHeight; }
        resize(); window.addEventListener('resize', resize);
        const pal = [[255,80,0],[255,120,10],[255,60,0],[220,40,0],[255,155,20],[180,30,0],[255,140,0],[200,50,0]];
        const rnd = (a,b) => a + Math.random()*(b-a);
        function mk(init) {
            const c = pal[Math.floor(Math.random()*pal.length)], sp = cv.width*.25;
            return { x:cv.width*.5+rnd(-sp,sp), y:init?rnd(-cv.height,0):rnd(-80,0),
                vy:rnd(1.5,3.8), vx:rnd(-.8,.8), radius:rnd(4,14), tail:[], maxTail:Math.floor(rnd(14,32)),
                r:c[0],g:c[1],b:c[2], alpha:rnd(.5,.95), wobble:rnd(0,Math.PI*2), wobbleSpd:rnd(.008,.05), wobbleAmp:rnd(.3,1.8) };
        }
        const drops = []; for(let i=0;i<100;i++) drops.push(mk(true));
        function drawDrop(d) {
            const{x,y,radius:rd,r,g,b,alpha,tail}=d;
            for(let i=0;i<tail.length;i++){const t=tail[i],pct=i/tail.length,a=alpha*pct*.4,rad=rd*pct*.65;if(rad<.5||a<.01)continue;ctx.beginPath();ctx.arc(t.x,t.y,rad,0,Math.PI*2);ctx.fillStyle=`rgba(${r},${g},${b},${a})`;ctx.fill();}
            const gr=ctx.createRadialGradient(x,y,0,x,y,rd*5);gr.addColorStop(0,`rgba(${r},${g},${b},${alpha*.45})`);gr.addColorStop(1,`rgba(${r},${g},${b},0)`);ctx.beginPath();ctx.arc(x,y,rd*5,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
            const gm=ctx.createRadialGradient(x-rd*.3,y-rd*.35,0,x,y,rd);gm.addColorStop(0,`rgba(255,220,140,${alpha*.9})`);gm.addColorStop(.35,`rgba(${r},${g},${b},${alpha})`);gm.addColorStop(1,`rgba(${Math.max(r-70,0)},${Math.max(g-50,0)},0,${alpha})`);ctx.beginPath();ctx.arc(x,y,rd,0,Math.PI*2);ctx.fillStyle=gm;ctx.fill();
            ctx.beginPath();ctx.arc(x-rd*.3,y-rd*.32,rd*.25,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,240,${alpha*.7})`;ctx.fill();
        }
        function animate() {
            ctx.clearRect(0,0,cv.width,cv.height);
            for(const d of drops){d.wobble+=d.wobbleSpd;d.x+=Math.sin(d.wobble)*d.wobbleAmp+d.vx;d.y+=d.vy;d.tail.push({x:d.x,y:d.y});if(d.tail.length>d.maxTail)d.tail.shift();drawDrop(d);if(d.y-d.radius>cv.height+20){Object.assign(d,mk(false));d.tail=[];}}
            requestAnimationFrame(animate);
        }
        animate();
    })();
})();
