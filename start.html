<script>
(() => {

// Frame-bust

const goBtnLv  = document.getElementById('go-btn-lv');
const goBtnLl  = document.getElementById('go-btn-ll');

const statusEl = document.getElementById('status');

const powRow   = document.getElementById('pow-row');

let powSolution     = null;
let behaviorPayload = null;

/* ── FINGERPRINTING (unchanged) ── */
async function getFingerprint() {
  // ... same as before ...
  const nav = navigator, scr = screen;
  let canvasHash = 'nc';
  try {
    const cv = document.createElement('canvas'); cv.width=200; cv.height=50;
    const cx = cv.getContext('2d');
    cx.textBaseline='top'; cx.font='14px Arial'; cx.fillStyle='#ff8c00';
    cx.fillText('RezurXFortress',2,20);
    cx.fillStyle='rgba(0,200,100,0.7)'; cx.fillRect(8,30,70,10);
    cx.strokeStyle='rgba(255,0,0,0.5)'; cx.beginPath(); cx.arc(100,25,12,0,Math.PI*2); cx.stroke();
    canvasHash=cv.toDataURL().slice(-64);
  }catch(_){}
  let webglVendor='nw';
  try{
    const cv=document.createElement('canvas');
    const gl=cv.getContext('webgl')||cv.getContext('experimental-webgl');
    if(gl){const ext=gl.getExtension('WEBGL_debug_renderer_info'); if(ext) webglVendor=gl.getParameter(ext.UNMASKED_VENDOR_WEBGL)+'|'+gl.getParameter(ext.UNMASKED_RENDERER_WEBGL);}
  }catch(_){}
  const comp=[nav.userAgent||'', nav.language||'', nav.languages?.join(',')||'', nav.hardwareConcurrency||0, nav.maxTouchPoints||0, nav.deviceMemory||0, scr.colorDepth||0, scr.pixelDepth||0, scr.width+'x'+scr.height, scr.availWidth+'x'+scr.availHeight, Intl.DateTimeFormat().resolvedOptions().timeZone||'', new Date().getTimezoneOffset(), nav.platform||'', nav.vendor||'', nav.cookieEnabled?'1':'0', 'ontouchstart' in window?'1':'0', canvasHash, webglVendor, CONFIG.BIND_SECRET].join('|');
  const buf=new TextEncoder().encode(comp);
  const hash=await crypto.subtle.digest('SHA-256',buf);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ── BEHAVIOUR CAPTURE (unchanged) ── */
function captureBehavior() {
  const track = { mouse:0, key:0, scroll:0, focusTime:0, start:Date.now() };
  const onMouse = ()=>{ track.mouse++; };
  const onKey = ()=>{ track.key++; };
  const onScroll = ()=>{ track.scroll++; };
  window.addEventListener('mousemove', onMouse,{passive:true});
  window.addEventListener('mousedown', onMouse,{passive:true});
  window.addEventListener('touchstart',onMouse,{passive:true});
  window.addEventListener('keydown',   onKey,  {passive:true});
  window.addEventListener('scroll',   onScroll,{passive:true});
  return ()=>{
    window.removeEventListener('mousemove',onMouse);
    window.removeEventListener('mousedown',onMouse);
    window.removeEventListener('touchstart',onMouse);
    window.removeEventListener('keydown',   onKey);
    window.removeEventListener('scroll',   onScroll);
    track.focusTime = Date.now() - track.start;
    const payload = JSON.stringify({ mouseEvents:track.mouse, keyEvents:track.key, scrollEvents:track.scroll, focusTime:track.focusTime });
    return btoa(payload).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  };
}
const getBehaviorPayload = captureBehavior();

/* ── STORAGE HELPERS (unchanged) ── */
function saveSession(token, fp, provider, csrf, sblob, totp, abVariant) {
  try {
    localStorage.setItem(CONFIG.SESSION_KEY, JSON.stringify({token, fp, ts:Date.now(), provider, ab:abVariant||null}));
    localStorage.setItem(CONFIG.CSRF_KEY, csrf);
    localStorage.setItem(CONFIG.SBLOB_KEY, sblob);
    localStorage.setItem(CONFIG.TOTP_KEY, JSON.stringify({totp, ts:Date.now()}));
    if(abVariant) localStorage.setItem(CONFIG.AB_KEY, abVariant);
  }catch(e){console.error('[STORAGE]',e);}
}

/* ── UI HELPERS (unchanged) ── */
function setStatus(msg,tone=''){ statusTx.textContent=msg; statusEl.className=tone; }
function setBtns(disabled){ goBtnLv.disabled=goBtnLl.disabled=goBtnWi.disabled=disabled; }

/* ── FETCH WITH BROWSER HEADERS (unchanged) ── */
async function fetchT(url, opts={}, ms=CONFIG.FETCH_TIMEOUT) {
  const ctrl = new AbortController();
  const tid = setTimeout(()=>ctrl.abort(), ms);
  try {
    return await fetch(url, {
      ...opts,
      signal: ctrl.signal,
      mode: 'cors',
      credentials: 'omit',
      cache: 'no-store',
      headers: {
        'Accept': 'application/json',
        'Accept-Language': 'en-US,en;q=0.9',
        ...(opts.headers||{}),
      },
    });
  } finally { clearTimeout(tid); }
}

/* ── POW SOLVER (FIXED: nonce padded to 16+ hex chars) ── */
async function solvePow() {
  const r = await fetchT(CONFIG.API+'/api/pow-challenge',{method:'GET'},20000);
  if(!r.ok) throw new Error('Challenge download failed');
  const ch = await r.json();
  const target = ch.bits;
  const enc = new TextEncoder();
  let nonce = 0;
  powStartTime = Date.now();

  while(true){
    // Pad nonce to at least 16 hex characters (required by backend)
    let nStr = nonce.toString(16);
    while (nStr.length < 16) nStr = '0' + nStr;

    const buf = await crypto.subtle.digest('SHA-256', enc.encode(`${ch.challenge}:${nStr}`));
    const arr = new Uint8Array(buf);
    let zeros=0, found=false;
    outer: for(let i=0;i<arr.length;i++){
      const b=arr[i];
      if(b===0){ zeros+=8; continue; }
      for(let j=7;j>=0;j--){
        if((b>>j)&1){ found=true; break outer; }
        zeros++;
      }
      break;
    }
    if(zeros>=target) return { ...ch, nonce: nStr };

    nonce++;
    if(nonce%5000===0){
      powVal.textContent = nonce.toLocaleString() + ' tries';
      await new Promise(r=>setTimeout(r,0));
      if(Date.now()-powStartTime>CONFIG.POW_TIMEOUT) throw new Error('PoW timeout');
    }
  }
}

/* ── INIT (unchanged) ── */
async function init(){
  setStatus('Waking server...','amber'); setBtns(true);
  try {
    await fetchT(CONFIG.API+'/health',{method:'GET'},30000);
    setStatus('● Solving security challenge','amber');
    powRow.classList.add('show');
    powSolution = await solvePow();
    powVal.textContent = '✓ '+(Date.now()-powStartTime)+'ms';
    behaviorPayload = getBehaviorPayload();  // stop tracking & capture
    setStatus('● System Online — Choose Provider','green');
    setBtns(false);
  } catch(e){
    console.error('[INIT]',e);
    setStatus('● Connection issue — Refresh to retry','red');
    powVal.textContent='✗ Failed';
  }
}

/* ── CLICK HANDLER (unchanged) ── */
async function handleClick(provider){
  if(sessionInFlight) return;
  sessionInFlight = true;
  setStatus('Generating session...','amber');
  setBtns(true);
  try {
    const fp = await getFingerprint();
    const r = await fetchT(CONFIG.API+'/api/initiate-session', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ fp, pow:powSolution, behavior:behaviorPayload, abVariant:provider }),
    },20000);
    const data = await r.json().catch(()=>({}));
    if(!r.ok||!data.token||!data.csrf||!data.session){
      throw new Error(data.error||'Session creation failed');
    }
    saveSession(data.token, fp, provider, data.csrf, data.session, data.totp, data.abVariant);
    setStatus('● Redirecting...','green');
    if(provider==='linkvertise'){
      setTimeout(()=>{ location.href='ad.html?token='+encodeURIComponent(data.token); },500);
    } else if(provider==='lootlabs'){
      try{
        const enc = await fetchT(CONFIG.API+'/api/lootlabs/encrypt', {
          method:'POST',
          headers:{ 'Content-Type':'application/json', 'x-csrf-token':data.csrf },
          body: JSON.stringify({ url:CONFIG.REDIRECT_URL }),
        },10000);
        const ed = await enc.json().catch(()=>({}));
        if(enc.ok&&ed.encrypted){
          location.href=CONFIG.LOOTLABS_URL+(CONFIG.LOOTLABS_URL.includes('?')?'&':'?')+'data='+encodeURIComponent(ed.encrypted);
          return;
        }
      } catch(_){}
      location.href=CONFIG.LOOTLABS_URL;
    } else if(provider==='workink'){
      setTimeout(()=>{ location.href=CONFIG.WORKINK_URL; },500);
    }
  } catch(err){
    console.error('[CLICK]',err);
    setStatus('● '+(err.message||'Error occurred'),'red');
    setBtns(false);
    sessionInFlight = false;
  }
}

goBtnLv.addEventListener('click',()=>handleClick('linkvertise'));

/* ── LAVA ENGINE (unchanged) ── */
(function lavaEngine(){
  const cv=document.getElementById('lava-canvas'), ctx=cv.getContext('2d',{alpha:true});
  let dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){
    dpr=Math.min(window.devicePixelRatio||1,2);
    cv.width=innerWidth*dpr; cv.height=innerHeight*dpr;
    cv.style.width=innerWidth+'px'; cv.style.height=innerHeight+'px';
    ctx.scale(dpr,dpr);
  }
  resize(); window.addEventListener('resize',resize);

  const palette=[[255,80,0],[255,120,10],[255,60,0],[220,40,0],[255,155,20],[180,30,0],[255,140,0],[200,50,0],[255,100,5],[240,90,10],[255,165,30],[210,55,0]];
  const rnd=(a,b)=>a+Math.random()*(b-a);
  function makeDrop(spread){
    const c=palette[Math.floor(Math.random()*palette.length)];
    const sw=innerWidth*0.32;
    return {
      x: innerWidth*0.5+rnd(-sw,sw), y: spread?rnd(-innerHeight,0):rnd(-100,0),
      vy: rnd(1.4,4.0), vx: rnd(-0.85,0.85), radius: rnd(4,16),
      tail:[], maxTail:Math.floor(rnd(16,36)), r:c[0],g:c[1],b:c[2],
      alpha: rnd(0.55,0.95), wobble: rnd(0,Math.PI*2), wobbleSpd: rnd(0.008,0.052),
      wobbleAmp: rnd(0.3,1.9), heat: rnd(0.7,1.0),
      flickerPhase: rnd(0,Math.PI*2), flickerSpd: rnd(0.05,0.15), life:1.0
    };
  }
  const TARGET=innerWidth<600?80:130;
  const drops=[]; for(let i=0;i<TARGET;i++) drops.push(makeDrop(true));
  function draw(d){
    const {x,y,radius:rd,r,g,b,alpha,tail}=d;
    for(let i=0;i<tail.length;i++){
      const t=tail[i], pct=i/tail.length, a=alpha*pct*0.48*d.heat, rad=rd*pct*0.72;
      if(rad<0.5||a<0.01) continue;
      ctx.beginPath(); ctx.arc(t.x,t.y,rad,0,Math.PI*2);
      ctx.fillStyle=`rgba(${r},${g},${b},${a})`; ctx.fill();
    }
    const gr=ctx.createRadialGradient(x,y,0,x,y,rd*6);
    gr.addColorStop(0,`rgba(${r},${g},${b},${alpha*0.5*d.heat})`);
    gr.addColorStop(0.5,`rgba(${r},${g},${b},${alpha*0.2*d.heat})`);
    gr.addColorStop(1,`rgba(${r},${g},${b},0)`);
    ctx.beginPath(); ctx.arc(x,y,rd*6,0,Math.PI*2); ctx.fillStyle=gr; ctx.fill();
    const f=0.92+Math.sin(d.flickerPhase)*0.08;
    const gm=ctx.createRadialGradient(x-rd*0.35,y-rd*0.4,0,x,y,rd);
    gm.addColorStop(0,`rgba(255,235,170,${alpha*0.95*f})`);
    gm.addColorStop(0.35,`rgba(${r},${g},${b},${alpha*f})`);
    gm.addColorStop(1,`rgba(${Math.max(r-70,0)},${Math.max(g-50,0)},0,${alpha})`);
    ctx.beginPath(); ctx.arc(x,y,rd*f,0,Math.PI*2); ctx.fillStyle=gm; ctx.fill();
    ctx.beginPath(); ctx.arc(x-rd*0.3,y-rd*0.32,rd*0.28,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,250,${alpha*0.8*f})`; ctx.fill();
  }
  let last=0;
  function tick(now){
    const delta=now-last;
    if(delta<16.67){ requestAnimationFrame(tick); return; }
    last=now;
    ctx.clearRect(0,0,cv.width,cv.height);
    for(const d of drops){
      d.wobble+=d.wobbleSpd; d.flickerPhase+=d.flickerSpd;
      d.x+=Math.sin(d.wobble)*d.wobbleAmp+d.vx; d.y+=d.vy;
      d.tail.push({x:d.x,y:d.y}); if(d.tail.length>d.maxTail) d.tail.shift();
      draw(d);
      if(d.y-d.radius>innerHeight+30){ Object.assign(d,makeDrop(false)); d.tail=[]; }
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();

init();

})();
</script>
