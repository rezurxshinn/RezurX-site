<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050505">
    <title>RezurX | Key Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange:      #ff8c00;
            --orange-glow: rgba(255,140,0,0.4);
            --green:       #00ff88;
            --green-glow:  rgba(0,255,136,0.2);
            --red:         #ff4444;
            --bg:          #050505;
            --panel:       rgba(15,15,15,0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 40%, #1a1000, #050505 70%);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* CRT scanlines */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 1px,
                rgba(0,0,0,0.15) 1px,
                rgba(0,0,0,0.15) 2px
            );
            pointer-events: none;
            z-index: 100;
        }

        .panel {
            background: var(--panel);
            border: 1px solid rgba(255,140,0,0.25);
            border-radius: 4px;
            padding: 40px 35px;
            width: 90%;
            max-width: 460px;
            text-align: center;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.95), 0 0 0 1px rgba(255,140,0,0.05);
        }

        /* Corner accents */
        .panel::before, .panel::after {
            content: "";
            position: absolute;
            width: 18px; height: 18px;
        }
        .panel::before {
            top: -1px; left: -1px;
            border-top: 2px solid var(--orange);
            border-left: 2px solid var(--orange);
        }
        .panel::after {
            bottom: -1px; right: -1px;
            border-bottom: 2px solid var(--orange);
            border-right: 2px solid var(--orange);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 6px;
            font-size: 1.6rem;
            color: var(--orange);
            text-shadow: 0 0 12px var(--orange-glow);
            margin-bottom: 30px;
        }

        /* ── SPINNER ── */
        .spinner {
            width: 48px; height: 48px;
            border: 3px solid rgba(255,140,0,0.15);
            border-top-color: var(--orange);
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── STATUS ── */
        #status {
            font-size: 0.78rem;
            color: #666;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 20px;
            min-height: 1.2em;
            transition: color 0.3s;
        }

        /* ── KEY BOX ── */
        #key-box {
            display: none;
            margin-top: 20px;
            padding: 20px 16px 16px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--green);
            box-shadow: 0 0 20px var(--green-glow);
            border-radius: 2px;
        }

        .key-label {
            font-size: 0.62rem;
            color: rgba(0,255,136,0.5);
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        #key-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--green);
            letter-spacing: 3px;
            word-break: break-all;
            text-shadow: 0 0 8px var(--green-glow);
        }

        /* ── COPY BUTTON ── */
        #copy-btn {
            margin-top: 14px;
            background: transparent;
            border: 1px solid rgba(0,255,136,0.3);
            color: rgba(0,255,136,0.6);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem;
            padding: 8px 16px;
            cursor: pointer;
            width: 100%;
            letter-spacing: 1px;
            transition: all 0.2s;
            border-radius: 2px;
        }
        #copy-btn:hover {
            background: rgba(0,255,136,0.08);
            border-color: var(--green);
            color: var(--green);
        }
        #copy-btn.copied {
            border-color: var(--green);
            color: var(--green);
            background: rgba(0,255,136,0.1);
        }

        /* ── COUNTDOWN BAR ── */
        #countdown-wrap {
            display: none;
            margin-top: 16px;
        }
        #countdown-label {
            font-size: 0.62rem;
            color: #444;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        #countdown-bar-bg {
            height: 3px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            overflow: hidden;
        }
        #countdown-bar {
            height: 100%;
            width: 100%;
            background: var(--orange);
            transition: width 1s linear, background 1s;
        }

        /* ── PAUSE BUTTON ── */
        #pause-btn {
            margin-top: 8px;
            background: transparent;
            border: none;
            color: #444;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.62rem;
            cursor: pointer;
            letter-spacing: 1px;
            transition: color 0.2s;
        }
        #pause-btn:hover { color: #888; }

        /* ── ERROR STATE ── */
        #retry-btn {
            display: none;
            margin-top: 20px;
            background: transparent;
            border: 1px solid var(--red);
            color: var(--red);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
            border-radius: 2px;
        }
        #retry-btn:hover {
            background: rgba(255,68,68,0.08);
        }

        .footer {
            margin-top: 28px;
            font-size: 0.58rem;
            color: #2a2a2a;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
<div class="panel">
    <h1>REZURX</h1>

    <div class="spinner" id="spinner"></div>
    <div id="status">INITIATING DECRYPTION...</div>

    <div id="key-box">
        <div class="key-label">ACCESS KEY GENERATED</div>
        <div id="key-value"></div>
        <button id="copy-btn" onclick="copyKey()">[ CLICK TO COPY ]</button>
    </div>

    <div id="countdown-wrap">
        <div id="countdown-label">RETURNING TO GATE IN 10s</div>
        <div id="countdown-bar-bg">
            <div id="countdown-bar"></div>
        </div>
        <button id="pause-btn" onclick="togglePause()">[ PAUSE REDIRECT ]</button>
    </div>

    <button id="retry-btn" onclick="goBack()">↩ RETURN TO START</button>

    <div class="footer">ENCRYPTION: AES-256 &nbsp;|&nbsp; HWID_LOCK: ON &nbsp;|&nbsp; V4.1</div>
</div>

<script>
    const API_BASE = "https://rezurx-backend.onrender.com";

    const spinner      = document.getElementById('spinner');
    const statusEl     = document.getElementById('status');
    const keyBox       = document.getElementById('key-box');
    const keyValue     = document.getElementById('key-value');
    const copyBtn      = document.getElementById('copy-btn');
    const countdownWrap = document.getElementById('countdown-wrap');
    const countdownLabel = document.getElementById('countdown-label');
    const countdownBar = document.getElementById('countdown-bar');
    const pauseBtn     = document.getElementById('pause-btn');
    const retryBtn     = document.getElementById('retry-btn');

    const COUNTDOWN_SECONDS = 15; // Give user enough time to copy
    let countdownTimer = null;
    let isPaused = false;
    let secondsLeft = COUNTDOWN_SECONDS;
    let keyToCopy = "";

    // ── BOOT ──────────────────────────────────────
    window.onload = async function () {
        const params = new URLSearchParams(window.location.search);
        const token  = params.get('token');
        const hash   = params.get('hash');

        if (!token || !hash) {
            showError("INVALID HANDSHAKE — NO TOKEN OR HASH FOUND");
            return;
        }

        try {
            const res = await fetch(`${API_BASE}/api/verify-linkvertise`, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ token, hash })
            });

            // Handle non-OK HTTP before trying to parse JSON
            if (!res.ok) {
                const msg = res.status === 403 ? "AD NOT COMPLETED"
                          : res.status === 400 ? "TOKEN ALREADY USED"
                          : res.status === 404 ? "SESSION EXPIRED"
                          : `SERVER ERROR (${res.status})`;
                showError(msg);
                return;
            }

            const data = await res.json();

            if (data.key) {
                showSuccess(data.key);
            } else {
                showError(data.error ? data.error.toUpperCase() : "VERIFICATION FAILED");
            }

        } catch {
            // Network failure — don't expose raw error
            showError("CONNECTION LOST — CHECK YOUR NETWORK");
        }
    };

    // ── SUCCESS STATE ──────────────────────────────
    function showSuccess(key) {
        keyToCopy = key;

        spinner.style.display = "none";
        statusEl.innerText    = "DECRYPTION COMPLETE";
        statusEl.style.color  = "var(--green)";

        keyValue.innerText    = key;
        keyBox.style.display  = "block";

        // Clean URL so token/hash aren't visible or bookmarkable
        window.history.replaceState({}, '', window.location.pathname);

        startCountdown();
    }

    // ── ERROR STATE ────────────────────────────────
    function showError(message) {
        spinner.style.display   = "none";
        statusEl.innerText      = "ERROR: " + message;
        statusEl.style.color    = "var(--red)";
        retryBtn.style.display  = "block";
    }

    // ── COUNTDOWN ──────────────────────────────────
    function startCountdown() {
        secondsLeft = COUNTDOWN_SECONDS;
        countdownWrap.style.display = "block";
        updateCountdownUI();

        countdownTimer = setInterval(() => {
            if (isPaused) return;
            secondsLeft--;
            updateCountdownUI();
            if (secondsLeft <= 0) {
                clearInterval(countdownTimer);
                window.location.href = "start.html";
            }
        }, 1000);
    }

    function updateCountdownUI() {
        const pct = (secondsLeft / COUNTDOWN_SECONDS) * 100;
        countdownBar.style.width = pct + "%";
        // Bar turns red in last 5 seconds
        countdownBar.style.background = secondsLeft <= 5 ? "var(--red)" : "var(--orange)";
        countdownLabel.innerText = isPaused
            ? "REDIRECT PAUSED"
            : `RETURNING TO GATE IN ${secondsLeft}s`;
    }

    function togglePause() {
        isPaused = !isPaused;
        pauseBtn.innerText = isPaused ? "[ RESUME REDIRECT ]" : "[ PAUSE REDIRECT ]";
        updateCountdownUI();
    }

    // ── COPY KEY ───────────────────────────────────
    function copyKey() {
        if (!keyToCopy) return;

        // Modern clipboard API with fallback for older mobile browsers
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(keyToCopy).then(flashCopied).catch(fallbackCopy);
        } else {
            fallbackCopy();
        }
    }

    function fallbackCopy() {
        // execCommand fallback for browsers without clipboard API
        const ta = document.createElement('textarea');
        ta.value = keyToCopy;
        ta.style.cssText = "position:fixed;opacity:0;";
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        try {
            document.execCommand('copy');
            flashCopied();
        } catch {
            copyBtn.innerText = "[ COPY FAILED — COPY MANUALLY ]";
        }
        document.body.removeChild(ta);
    }

    function flashCopied() {
        copyBtn.innerText = "[ ✓ COPIED! ]";
        copyBtn.classList.add('copied');
        // Pause countdown so user isn't rushed
        isPaused = true;
        pauseBtn.innerText = "[ RESUME REDIRECT ]";
        updateCountdownUI();

        setTimeout(() => {
            copyBtn.innerText = "[ CLICK TO COPY ]";
            copyBtn.classList.remove('copied');
        }, 2500);
    }

    // ── RETRY ──────────────────────────────────────
    function goBack() {
        window.location.href = "start.html";
    }
</script>
</body>
</html>
