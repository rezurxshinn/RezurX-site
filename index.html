<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RezurX – Key Generation Test</title>
    <style>
        body { background:#0a0200; color:#fff; font-family:monospace; padding:2rem; text-align:center; }
        input, button { padding:10px; margin:10px; font-size:1rem; width:80%; max-width:400px; }
        button { background:#ff8c00; color:#000; border:none; cursor:pointer; font-weight:bold; }
        #output { margin-top:20px; background:#111; padding:15px; border-radius:5px; word-break:break-all; }
    </style>
</head>
<body>
    <h1>🔑 Test Key Generation</h1>
    <p>Enter your <code>ADMIN_SECRET</code> (set in Render environment) and click Generate.</p>
    <input type="password" id="adminSecret" placeholder="Admin Secret (e.g., Avdi973088)">
    <button onclick="testGenerateKey()">Generate Key</button>
    <div id="output"></div>

    <script>
        const API_BASE = "https://rezurx-backend.onrender.com";

        async function testGenerateKey() {
            const secret = document.getElementById('adminSecret').value.trim();
            const out = document.getElementById('output');

            if (!secret) {
                out.innerHTML = '<span style="color:#ff4455;">Please enter the admin secret.</span>';
                return;
            }

            out.innerHTML = 'Requesting...';

            try {
                const res = await fetch(`${API_BASE}/api/generate-key`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-admin-token': secret
                    }
                });

                const data = await res.json();

                if (res.ok && data.key) {
                    out.innerHTML = `<span style="color:#00ff88;">✅ Key generated:</span><br><b>${data.key}</b>`;
                } else {
                    out.innerHTML = `<span style="color:#ff4455;">❌ Error:</span> ${data.error || 'Unknown error'}`;
                }
            } catch (err) {
                out.innerHTML = `<span style="color:#ff4455;">❌ Network error:</span> ${err.message}`;
            }
        }
    </script>
</body>
</html>
