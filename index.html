<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#060100">
    <title>RezurXLab | Access Granted</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange:        #ff8c00;
            --orange-bright: #ffaa33;
            --orange-deep:   #aa4400;
            --orange-glow:   rgba(255,140,0,0.45);
            --gold:          #ffd700;
            --green:         #00ff88;
            --green-glow:    rgba(0,255,136,0.45);
            --red:           #ff4455;
            --red-glow:      rgba(255,68,85,0.45);
            --bg:            #060100;
            --panel:         rgba(8,3,0,0.92);
            --muted:         #3a3028;
            --dim:           #6a5848;
        }
        *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
        html,body { height:100%; }
        body {
            background:var(--bg); color:#fff;
            font-family:'JetBrains Mono',monospace;
            display:flex; flex-direction:column;
            justify-content:center; align-items:center;
            min-height:100vh; overflow:hidden; position:relative;
            -webkit-font-smoothing:antialiased;
        }

        #lava-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }
        .atmos {
            position:fixed; inset:0; z-index:1; pointer-events:none;
            background:
                radial-gradient(ellipse 80% 45% at 50% 0%,   rgba(255,90,0,0.22) 0%, transparent 60%),
                radial-gradient(ellipse 70% 40% at 50% 100%, rgba(180,30,0,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 100% 100% at 50% 50%, transparent 30%, rgba(0,0,0,0.78) 100%);
        }
        .vignette  { position:fixed; inset:0; z-index:2; pointer-events:none; background:radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%); }
        .lava-river{ position:fixed; bottom:0; left:0; right:0; height:30vh; z-index:1; pointer-events:none; background:linear-gradient(0deg,rgba(255,70,0,0.15) 0%,rgba(255,100,0,0.05) 40%,transparent 100%); animation:riverGlow 4s ease-in-out infinite; }
        @keyframes riverGlow { 0%,100%{opacity:.7} 50%{opacity:1} }
        .embers {
            position:fixed; inset:0; z-index:2; pointer-events:none;
            background-image:
                radial-gradient(2px 2px at 15% 85%, rgba(255,180,50,0.7) 0%, transparent 100%),
                radial-gradient(3px 3px at 25% 90%, rgba(255,140,0,0.6)  0%, transparent 100%),
                radial-gradient(1px 1px at 35% 80%, rgba(255,200,80,0.5) 0%, transparent 100%),
                radial-gradient(2px 2px at 70% 88%, rgba(255,160,40,0.6) 0%, transparent 100%),
                radial-gradient(3px 3px at 85% 82%, rgba(255,120,20,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 55% 92%, rgba(255,180,60,0.7) 0%, transparent 100%);
            background-size:200% 200%;
            animation:embersFloat 8s ease-in-out infinite alternate;
        }
        @keyframes embersFloat {
            0%  { transform:translateY(0) translateX(0); }
            50% { transform:translateY(-15px) translateX(10px); }
            100%{ transform:translateY(-5px) translateX(-5px); }
        }
        .scanlines { position:fixed; inset:0; z-index:3; pointer-events:none; background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px); }
        .noise     { position:fixed; inset:0; z-index:4; pointer-events:none; opacity:.04; background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>"); }
        #confetti-canvas { position:fixed; inset:0; z-index:999; pointer-events:none; }

        #loading-overlay {
            display:none; position:fixed; inset:0; z-index:500;
            background:radial-gradient(ellipse at center,rgba(20,8,0,0.97) 0%,rgba(4,1,0,0.99) 100%);
            flex-direction:column; justify-content:center; align-items:center; gap:36px;
            animation:overlayIn .4s ease both;
            backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
        }
        #loading-overlay.show { display:flex; }
        @keyframes overlayIn { from{opacity:0} to{opacity:1} }

        .ov-brand { display:flex; flex-direction:column; align-items:center; gap:6px; }
        .ov-logo  { font-family:'Orbitron',sans-serif; font-size:1.5rem; font-weight:900; letter-spacing:8px; background:linear-gradient(180deg,#ffe0a0 0%,#ffaa33 30%,#ff6600 65%,#aa3300 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; filter:drop-shadow(0 0 24px rgba(255,140,0,0.7)); }
        .ov-tag   { font-size:.5rem; letter-spacing:6px; color:var(--orange-deep); text-transform:uppercase; }

        .ov-provider {
            font-size:.48rem; letter-spacing:3px; text-transform:uppercase; font-weight:600;
            padding:4px 12px; border-radius:20px; border:1px solid;
        }
        .ov-provider.lv { color:rgba(255,140,0,0.8); border-color:rgba(255,140,0,0.3); background:rgba(255,140,0,0.06); }
        .ov-provider.wi { color:rgba(30,210,130,0.8); border-color:rgba(30,210,130,0.3); background:rgba(30,210,130,0.06); }

        .ov-ring { width:88px; height:88px; position:relative; }
        .ov-ring::before,.ov-ring::after { content:""; position:absolute; inset:0; border-radius:50%; }
        .ov-ring::before { border:2px solid rgba(255,140,0,0.08); }
        .ov-ring::after  { border:2px solid transparent; border-top-color:var(--orange); border-right-color:rgba(255,140,0,0.5); animation:spin 1.1s cubic-bezier(.5,.1,.5,.9) infinite; filter:drop-shadow(0 0 8px var(--orange-glow)); }
        @keyframes spin  { to{transform:rotate(360deg)} }
        .ov-inner { position:absolute; inset:14px; border-radius:50%; border:1.5px solid transparent; border-bottom-color:rgba(255,170,50,0.6); border-left-color:rgba(255,140,0,0.25); animation:spinR .8s linear infinite reverse; }
        @keyframes spinR { to{transform:rotate(360deg)} }
        .ov-core  { position:absolute; inset:30px; border-radius:50%; background:radial-gradient(circle,rgba(255,200,100,0.15) 0%,transparent 70%); animation:coreP 2s ease-in-out infinite; }
        @keyframes coreP { 0%,100%{transform:scale(.85);opacity:.5} 50%{transform:scale(1.1);opacity:1} }

        #loading-overlay.wi .ov-ring::after  { border-top-color:#20cc88; border-right-color:rgba(30,210,130,0.5); filter:drop-shadow(0 0 8px rgba(30,210,130,0.45)); }
        #loading-overlay.wi .ov-inner        { border-bottom-color:rgba(50,230,150,0.6); border-left-color:rgba(30,210,130,0.25); }
        #loading-overlay.wi #ov-bar          { background:linear-gradient(90deg,#0a6640,#20cc88,#80ffcc); box-shadow:0 0 14px rgba(30,210,130,0.45); }
        #loading-overlay.wi #ov-status       { color:#50dda0; text-shadow:0 0 12px rgba(30,210,130,0.5); }

        .ov-content { text-align:center; display:flex; flex-direction:column; align-items:center; gap:18px; }
        #ov-status  { font-size:.78rem; letter-spacing:4px; text-transform:uppercase; color:var(--orange-bright); min-height:1.1em; text-shadow:0 0 12px rgba(255,170,50,0.5); font-weight:500; }
        .ov-track   { width:320px; max-width:80vw; height:2px; background:linear-gradient(90deg,transparent,rgba(255,140,0,0.15),transparent); border-radius:2px; overflow:hidden; }
        #ov-bar     { height:100%; width:0%; background:linear-gradient(90deg,var(--orange-deep),var(--orange),var(--gold)); border-radius:2px; transition:width .6s cubic-bezier(.2,.8,.3,1); box-shadow:0 0 14px var(--orange-glow); }
        #ov-substatus { font-size:.6rem; letter-spacing:2.5px; color:var(--dim); text-transform:uppercase; min-height:1em; font-weight:300; }

        .panel {
            position:relative; z-index:10;
            background:linear-gradient(180deg,rgba(20,8,0,0.96) 0%,rgba(8,3,0,0.96) 100%);
            border:1px solid rgba(255,140,0,0.18); border-radius:8px;
            padding:48px 42px 36px; width:92%; max-width:520px; text-align:center;
            box-shadow:0 0 0 1px rgba(0,0,0,0.95),0 12px 60px rgba(0,0,0,0.92),0 0 140px rgba(255,80,0,0.14),0 0 60px rgba(255,140,0,0.08),inset 0 1px 0 rgba(255,200,120,0.12),inset 0 -1px 0 rgba(0,0,0,0.5);
            backdrop-filter:blur(6px) saturate(1.1); -webkit-backdrop-filter:blur(6px) saturate(1.1);
            animation:panelIn .7s cubic-bezier(.22,1,.36,1) both;
        }
        @keyframes panelIn { from{opacity:0;transform:translateY(24px) scale(.96)} to{opacity:1;transform:none} }
        @media (max-width:480px) { .panel { padding:34px 22px 28px; } }
        .panel::before { content:""; position:absolute; inset:-1px; border-radius:8px; pointer-events:none; background:linear-gradient(135deg,rgba(255,140,0,0.4) 0%,transparent 30%,transparent 70%,rgba(255,140,0,0.25) 100%); -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0); -webkit-mask-composite:xor; mask-composite:exclude; padding:1px; opacity:.7; }

        .c { position:absolute; width:18px; height:18px; }
        .c-tl { top:-1px; left:-1px;   border-top:2px solid var(--orange-bright); border-left:2px solid var(--orange-bright);  border-radius:4px 0 0 0; filter:drop-shadow(0 0 4px var(--orange-glow)); }
        .c-tr { top:-1px; right:-1px;  border-top:2px solid var(--orange-bright); border-right:2px solid var(--orange-bright); border-radius:0 4px 0 0; filter:drop-shadow(0 0 4px var(--orange-glow)); }
        .c-bl { bottom:-1px; left:-1px;  border-bottom:2px solid var(--orange-bright); border-left:2px solid var(--orange-bright);  border-radius:0 0 0 4px; filter:drop-shadow(0 0 4px var(--orange-glow)); }
        .c-br { bottom:-1px; right:-1px; border-bottom:2px solid var(--orange-bright); border-right:2px solid var(--orange-bright); border-radius:0 0 4px 0; filter:drop-shadow(0 0 4px var(--orange-glow)); }

        .logo-wrap { position:relative; display:inline-block; }
        .logo-wrap::before { content:""; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:340px; height:90px; background:radial-gradient(ellipse at center,rgba(255,180,50,0.18) 0%,rgba(255,120,0,0.10) 40%,transparent 70%); border-radius:50%; pointer-events:none; z-index:-1; animation:auraOuter 3.5s ease-in-out infinite; filter:blur(8px); }
        .logo-wrap::after  { content:""; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:220px; height:55px; background:radial-gradient(ellipse at center,rgba(255,220,100,0.35) 0%,rgba(255,140,0,0.18) 45%,transparent 70%); border-radius:50%; pointer-events:none; z-index:-1; animation:auraInner 3.5s ease-in-out infinite; filter:blur(4px); }
        @keyframes auraOuter { 0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1)} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.12)} }
        @keyframes auraInner { 0%,100%{opacity:.8;transform:translate(-50%,-50%) scale(1)} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.08)} }
        .aura-ray { position:absolute; top:50%; left:50%; width:400px; height:2px; background:linear-gradient(90deg,transparent,rgba(255,210,120,0.12),transparent); transform:translate(-50%,-50%) rotate(-15deg); pointer-events:none; z-index:-1; animation:raySweep 6s ease-in-out infinite; }
        @keyframes raySweep { 0%,100%{opacity:0;transform:translate(-50%,-50%) rotate(-20deg) scaleX(.6)} 45%,55%{opacity:1;transform:translate(-50%,-50%) rotate(-15deg) scaleX(1)} }

        .logo-eyebrow { font-size:.55rem; letter-spacing:5px; color:var(--orange-deep); text-transform:uppercase; margin-bottom:12px; font-weight:500; }
        h1 { font-family:'Orbitron',sans-serif; font-size:2rem; font-weight:900; letter-spacing:6px; background:linear-gradient(180deg,#ffe0a0 0%,#ffaa33 30%,#ff6600 65%,#aa3300 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; filter:drop-shadow(0 0 24px rgba(255,140,0,0.6)); line-height:1.05; animation:logoBreath 4s ease-in-out infinite; }
        @keyframes logoBreath { 0%,100%{filter:drop-shadow(0 0 24px rgba(255,140,0,0.55))} 50%{filter:drop-shadow(0 0 36px rgba(255,170,50,0.9))} }
        .logo-sub { font-size:.52rem; letter-spacing:7px; color:var(--muted); text-transform:uppercase; margin-top:11px; margin-bottom:30px; }

        .divider { width:100%; height:1px; background:linear-gradient(90deg,transparent,rgba(255,140,0,0.3) 30%,rgba(255,140,0,0.5) 50%,rgba(255,140,0,0.3) 70%,transparent); margin-bottom:26px; position:relative; }
        .divider::after { content:""; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:6px; height:6px; border-radius:50%; background:var(--orange); box-shadow:0 0 10px var(--orange-glow); }

        #status { font-size:.7rem; letter-spacing:2.5px; text-transform:uppercase; color:var(--dim); margin-bottom:24px; display:flex; align-items:center; justify-content:center; gap:10px; transition:color .3s; min-height:1.1em; font-weight:500; }
        .sdot   { width:6px; height:6px; border-radius:50%; background:var(--muted); flex-shrink:0; animation:pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.85)} }
        #status.green .sdot { background:var(--green); box-shadow:0 0 12px var(--green-glow); }
        #status.green       { color:var(--green); }
        #status.red   .sdot { background:var(--red); box-shadow:0 0 12px var(--red-glow); animation:none; }
        #status.red         { color:var(--red); }
        #status.amber .sdot { background:var(--orange); box-shadow:0 0 12px var(--orange-glow); }
        #status.amber       { color:var(--orange-bright); }

        #key-box { display:none; }
        #key-box.show { display:block; animation:slideUp .65s cubic-bezier(.22,1,.36,1) both; }
        @keyframes slideUp { from{opacity:0;transform:translateY(18px) scale(.97)} to{opacity:1;transform:none} }
        .key-header { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:14px; }
        .key-icon   { width:14px; height:14px; border:1.5px solid var(--green); border-radius:50%; position:relative; box-shadow:0 0 10px var(--green-glow); }
        .key-icon::after { content:""; position:absolute; top:50%; left:50%; width:5px; height:5px; transform:translate(-50%,-50%); background:var(--green); border-radius:50%; box-shadow:0 0 6px var(--green-glow); }
        .key-label  { font-size:.55rem; letter-spacing:4px; color:var(--green); text-transform:uppercase; font-weight:600; text-shadow:0 0 8px var(--green-glow); }
        #key-value  { font-family:'Orbitron',sans-serif; font-size:1.1rem; font-weight:700; letter-spacing:3px; color:var(--green); word-break:break-all; text-shadow:0 0 16px var(--green-glow); margin-bottom:10px; user-select:all; cursor:text; padding:16px; border-radius:5px; background:linear-gradient(180deg,rgba(0,255,136,0.08) 0%,rgba(0,255,136,0.04) 100%); border:1px solid rgba(0,255,136,0.18); transition:all .25s; position:relative; box-shadow:inset 0 0 30px rgba(0,255,136,0.05),0 0 20px rgba(0,255,136,0.08); }
        #key-value::before { content:""; position:absolute; width:8px; height:8px; border:1.5px solid rgba(0,255,136,0.5); top:6px; left:6px; border-right:none; border-bottom:none; }
        #key-value::after  { content:""; position:absolute; width:8px; height:8px; border:1.5px solid rgba(0,255,136,0.5); bottom:6px; right:6px; border-left:none; border-top:none; }
        #key-value:hover   { background:linear-gradient(180deg,rgba(0,255,136,0.12) 0%,rgba(0,255,136,0.06) 100%); border-color:rgba(0,255,136,0.35); box-shadow:inset 0 0 30px rgba(0,255,136,0.08),0 0 30px rgba(0,255,136,0.15); }
        #key-expiry { font-size:.55rem; color:rgba(0,255,136,0.4); letter-spacing:1.5px; margin-bottom:18px; }
        #copy-btn { background:linear-gradient(180deg,rgba(0,255,136,0.06) 0%,rgba(0,255,136,0.02) 100%); border:1px solid rgba(0,255,136,0.25); color:rgba(0,255,136,0.7); font-family:'Orbitron',sans-serif; font-size:.65rem; letter-spacing:3px; text-transform:uppercase; padding:13px; width:100%; cursor:pointer; border-radius:3px; transition:all .25s cubic-bezier(.2,.8,.3,1); display:block; font-weight:600; position:relative; overflow:hidden; }
        #copy-btn::before { content:""; position:absolute; inset:0; background:linear-gradient(90deg,transparent,rgba(0,255,136,0.12),transparent); transform:translateX(-100%); transition:transform .5s; }
        #copy-btn:hover { background:linear-gradient(180deg,rgba(0,255,136,0.12) 0%,rgba(0,255,136,0.05) 100%); color:var(--green); border-color:rgba(0,255,136,0.5); transform:translateY(-1px); box-shadow:0 4px 16px rgba(0,255,136,0.18); }
        #copy-btn:hover::before { transform:translateX(100%); }
        #copy-btn.copied { color:var(--green); background:rgba(0,255,136,0.15); border-color:rgba(0,255,136,0.6); box-shadow:0 0 20px rgba(0,255,136,0.3); }

        #error-box { display:none; }
        #error-box.show { display:block; animation:slideUp .4s ease both; }
        .error-header { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:14px; }
        .error-icon   { width:16px; height:16px; border:1.5px solid var(--red); border-radius:50%; position:relative; box-shadow:0 0 10px var(--red-glow); }
        .error-icon::before,.error-icon::after { content:""; position:absolute; top:50%; left:50%; width:7px; height:1.5px; background:var(--red); transform:translate(-50%,-50%) rotate(45deg); }
        .error-icon::after { transform:translate(-50%,-50%) rotate(-45deg); }
        .error-label { font-size:.55rem; letter-spacing:4px; color:var(--red); text-transform:uppercase; font-weight:600; text-shadow:0 0 8px var(--red-glow); }
        #error-msg   { font-size:.68rem; color:rgba(255,140,150,0.95); letter-spacing:.5px; line-height:1.7; white-space:pre-line; background:linear-gradient(180deg,rgba(255,68,85,0.08) 0%,rgba(255,68,85,0.03) 100%); border:1px solid rgba(255,68,85,0.22); border-radius:4px; padding:18px; text-align:left; font-family:'JetBrains Mono',monospace; box-shadow:inset 0 0 20px rgba(255,68,85,0.04); }
        .error-cta   { display:block; margin-top:14px; background:transparent; border:1px solid rgba(255,140,0,0.3); color:rgba(255,140,0,0.7); padding:11px; font-family:'Orbitron',sans-serif; font-size:.6rem; letter-spacing:2.5px; text-transform:uppercase; font-weight:600; cursor:pointer; border-radius:3px; width:100%; transition:all .25s; text-decoration:none; text-align:center; }
        .error-cta:hover { background:rgba(255,140,0,0.08); color:var(--orange); border-color:rgba(255,140,0,0.55); }

        .footer { margin-top:28px; display:flex; justify-content:center; align-items:center; gap:12px; padding-top:18px; border-top:1px solid rgba(255,140,0,0.08); }
        .fi { font-size:.48rem; letter-spacing:2px; color:#28190d; text-transform:uppercase; font-weight:500; }
        .fd { width:3px; height:3px; border-radius:50%; background:#28190d; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="ov-brand">
        <div class="ov-logo">REZURXLAB</div>
        <div class="ov-tag">Verification Engine</div>
        <div class="ov-provider lv" id="ov-provider-badge">Linkvertise</div>
    </div>
    <div class="ov-ring"><div class="ov-inner"></div><div class="ov-core"></div></div>
    <div class="ov-content">
        <div id="ov-status">Initializing...</div>
        <div class="ov-track"><div id="ov-bar"></div></div>
        <div id="ov-substatus">Establishing secure connection</div>
    </div>
</div>

<canvas id="lava-canvas"></canvas>
<div class="atmos"></div>
<div class="vignette"></div>
<div class="lava-river"></div>
<div class="embers"></div>
<div class="scanlines"></div>
<div class="noise"></div>
<canvas id="confetti-canvas"></canvas>

<div class="panel">
    <div class="c c-tl"></div><div class="c c-tr"></div>
    <div class="c c-bl"></div><div class="c c-br"></div>

    <div class="logo-eyebrow">◆ Access Granted ◆</div>
    <div class="logo-wrap">
        <div class="aura-ray"></div>
        <h1>REZURXLAB</h1>
    </div>
    <div class="logo-sub">Premium Key System</div>
    <div class="divider"></div>

    <div id="status"><span class="sdot"></span><span id="status-txt">Verifying session...</span></div>

    <div id="key-box">
        <div class="key-header">
            <div class="key-icon"></div>
            <div class="key-label">Your Access Key</div>
        </div>
        <div id="key-value" tabindex="0"></div>
        <div id="key-expiry"></div>
        <button id="copy-btn" type="button">[ Copy to Clipboard ]</button>

    <div id="error-box">
        <div class="error-header">
            <div class="error-icon"></div>
            <div class="error-label">Verification Failed</div>

        <div id="error-msg"></div>
        <a href="https://rezurxshinn.github.io/RezurX-site/start.html" class="error-cta">[ ◂ Return to Start ]</a>
    </div>

    <div class="footer">
        <span class="fi">AES-256</span><div class="fd"></div>
        <span class="fi">HWID Locked</span><div class="fd"></div>
        <span class="fi">v4.2</span>
    </div>
</div>

<script>
(() => {
    'use strict';

    const API          = "https://rezurx-backend.onrender.com";
    const SESSION_KEY  = 'rzx_session_v3';
    const COOLDOWN_KEY = 'rzx_cooldown_v3';
    const HASH_RE      = /^[A-Za-z0-9_\-=.#]{6,512}$/;
    const WITOKEN_RE   = /^[A-Za-z0-9_\-]{4,256}$/;
    const TOKEN_RE     = /^[a-f0-9]{16,128}$/i;

    const overlay      = document.getElementById('loading-overlay');
    const ovStatus     = document.getElementById('ov-status');
    const ovBar        = document.getElementById('ov-bar');
    const ovSub        = document.getElementById('ov-substatus');
    const ovBadge      = document.getElementById('ov-provider-badge');
    const statusEl     = document.getElementById('status');
    const statusTx     = document.getElementById('status-txt');
    const keyBox       = document.getElementById('key-box');
    const keyVal       = document.getElementById('key-value');
    const keyExp       = document.getElementById('key-expiry');
    const copyBtn      = document.getElementById('copy-btn');
    const errorBox     = document.getElementById('error-box');
    const errorMsg     = document.getElementById('error-msg');

    let currentKey = '';

    /* ── Storage ── */
    function loadSession() {
        try {
            const raw = localStorage.getItem(SESSION_KEY);
            if (!raw) return null;
            const data = JSON.parse(raw);
            if (!data.token || !data.ts) return null;
            if (Date.now() - data.ts > 30 * 60 * 1000) {
                localStorage.removeItem(SESSION_KEY);
                return { expired: true };
            }
            return data;
        } catch (_) { return null; }
    }
    function clearSession()  { try { localStorage.removeItem(SESSION_KEY); }  catch (_) {} }
    function setCooldown()   { try { localStorage.setItem(COOLDOWN_KEY, JSON.stringify({ ts: Date.now() })); } catch (_) {} }

    /* ── Token recovery (multi-source) ── */
    function recoverToken() {
        // 1. localStorage
        const session = loadSession();
        if (session && !session.expired && TOKEN_RE.test(session.token)) {
            return { token: session.token, fp: session.fp || '', source: 'storage' };
        }

        // 2. URL fragment fallback (#token=...)
        const hash = window.location.hash;
        if (hash) {
            const m = hash.match(/token=([a-f0-9]{16,128})/i);
            if (m && TOKEN_RE.test(m[1])) {
                return { token: m[1], fp: '', source: 'fragment' };
            }
        }

        return { token: null, fp: '', source: null, expired: session?.expired };
    }

    /* ── UI helpers ── */
    function setStatus(msg, type = '') { statusTx.textContent = msg; statusEl.className = type; }
    function setOverlay(status, pct, sub) {
        ovStatus.textContent = status;
        ovBar.style.width    = pct + '%';
        ovSub.textContent    = sub || '';
    }
    function showOverlay(provider) {
        if (provider === 'workink') {
            overlay.classList.add('wi');
            ovBadge.textContent = 'Work.ink';
            ovBadge.className   = 'ov-provider wi';
        } else {
            overlay.classList.remove('wi');
            ovBadge.textContent = 'Linkvertise';
            ovBadge.className   = 'ov-provider lv';
        }
        overlay.classList.add('show');
    }
    function hideOverlay(cb) {
        overlay.style.transition = 'opacity .55s';
        overlay.style.opacity    = '0';
        setTimeout(() => {
            overlay.classList.remove('show', 'wi');
            overlay.style.opacity = '';
            overlay.style.transition = '';
            if (cb) cb();
        }, 600);
    }
    function showError(msg) {
        errorMsg.textContent = msg;
        errorBox.classList.add('show');
        setStatus('ERROR', 'red');
    }

    /* ── Fetch with timeout ── */
    async function fetchT(url, opts = {}, ms = 15000) {
        const ctrl = new AbortController();
        const tid  = setTimeout(() => ctrl.abort(), ms);
        try { return await fetch(url, { ...opts, signal: ctrl.signal, mode: 'cors', credentials: 'omit' }); }
        finally { clearTimeout(tid); }
    }

    /* ── Copy key ── */
    function copyKey() {
        if (!currentKey) return;
        const ok = () => {
            copyBtn.textContent = '[ ✓ Copied! ]';
            copyBtn.classList.add('copied');
            setTimeout(() => { copyBtn.textContent = '[ Copy to Clipboard ]'; copyBtn.classList.remove('copied'); }, 2500);
        };
        if (navigator.clipboard?.writeText) {
            navigator.clipboard.writeText(currentKey).then(ok).catch(fallback);
        } else { fallback(); }
        function fallback() {
            try {
                const ta = document.createElement('textarea');
                ta.value = currentKey; ta.style.cssText = 'position:fixed;opacity:0;';
                document.body.appendChild(ta); ta.select(); document.execCommand('copy');
                document.body.removeChild(ta); ok();
            } catch (_) { copyBtn.textContent = '[ Select text above to copy ]'; }
        }
    }
    copyBtn.addEventListener('click', copyKey);

    /* ════════════════════════════════════════════════════════════ */
    window.addEventListener('load', async () => {
        const params  = new URLSearchParams(window.location.search);
        const hash    = params.get('hash');
        const witoken = params.get('witoken');

        const recovered = recoverToken();
        const tokenOk   = !!recovered.token;
        const token     = recovered.token;

        const isLinkvertise = !!hash    && HASH_RE.test(hash);
        const isWorkInk     = !!witoken && WITOKEN_RE.test(witoken);
        const hasProvider   = isLinkvertise || isWorkInk;

        if (!hasProvider || !tokenOk) {
            let msg = '';
            if (!hasProvider && !tokenOk)
                msg = 'NO ACTIVE SESSION\n\nReturn to the start page and click a button to begin.';
            else if (!hasProvider)
                msg = 'VERIFICATION TOKEN MISSING\n\nDo not open this page directly.\nComplete an ad and you will be redirected here automatically.';
            else if (recovered.expired)
                msg = 'SESSION EXPIRED\n\nSessions last 30 minutes. Please start over.';
            else
                msg = 'INVALID SESSION\n\nThe session token is malformed. Please start over.';
            showError(msg);
            setStatus('SESSION INVALID', 'red');
            return;
        }

        const provider = isWorkInk ? 'workink' : 'linkvertise';
        console.log('[RezurX] Token source:', recovered.source, 'Provider:', provider);

        // Wipe URL params + fragment
        window.history.replaceState({}, '', window.location.pathname);

        showOverlay(provider);
        setOverlay('Establishing connection', 5, 'Reaching secure server');
        setStatus('VERIFYING...', 'amber');

        try {
            const h = await fetchT(API + '/health', { method: 'GET', cache: 'no-store' }, 30000);
            if (h.ok) setOverlay('Server online', 22, 'Connection secured');
        } catch (_) { setOverlay('Server slow', 18, 'Proceeding anyway'); }
        await new Promise(r => setTimeout(r, 350));

        const providerName = isWorkInk ? 'Work.ink' : 'Linkvertise';
        const steps = [
            { pct: 38, status: 'Validating ad completion',  sub: `Checking with ${providerName}` },
            { pct: 60, status: 'Running anti-bypass check', sub: 'Verifying authenticity' },
            { pct: 82, status: 'Generating access key',     sub: 'Almost there' },
        ];
        let si = 0;
        const stepTick = setInterval(() => {
            if (si < steps.length) { const s = steps[si++]; setOverlay(s.status, s.pct, s.sub); }
        }, 1300);

        try {
            const endpoint = isWorkInk ? API + '/api/verify-workink' : API + '/api/verify-linkvertise';
            const body     = isWorkInk
                ? { token, witoken, fp: recovered.fp || '' }
                : { token, hash,    fp: recovered.fp || '' };

            const res  = await fetchT(endpoint, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body:    JSON.stringify(body),
            }, 25000);

            clearInterval(stepTick);
            const data = await res.json().catch(() => ({}));

            if (res.status === 409) throw new Error('TOKEN ALREADY USED\nEach ad completion provides one key.\nPlease go through the ad again to receive a new key.');
            if (res.status === 400) throw new Error('INVALID REQUEST\nSomething went wrong with the session.\nPlease start over from the beginning.');
            if (res.status === 403) throw new Error(`AD NOT COMPLETED\nPlease finish the full ${providerName} offer\nwithout skipping or using bypassers.`);
            if (res.status === 429) throw new Error('TOO MANY ATTEMPTS\nPlease wait a few minutes before trying again.');
            if (res.status === 502) throw new Error(`${providerName.toUpperCase()} UNREACHABLE\nCould not contact the verification server.\nPlease try again in a moment.`);
            if (!res.ok)            throw new Error((data.error || 'Server error ' + res.status) + '\n\nPlease try again shortly.');
            if (!data.key)          throw new Error('Invalid server response. Please try again.');

            setOverlay('Access granted', 100, 'Revealing your key');
            await new Promise(r => setTimeout(r, 750));

            currentKey = data.key;
            clearSession();
            setCooldown();

            try { const bc = new BroadcastChannel('rzx_channel'); bc.postMessage('key_issued'); bc.close(); } catch (_) {}

            keyVal.textContent = currentKey;
            if (data.expiresAt) {
                const exp = new Date(data.expiresAt);
                keyExp.textContent = '◆ Expires ' + exp.toLocaleString('en-GB', { hour12: false }) + ' ◆';
            }

            hideOverlay(() => {
                keyBox.classList.add('show');
                setStatus('● Key Generated Successfully', 'green');
                launchConfetti();
                setTimeout(() => keyVal.focus(), 600);
            });

        } catch (err) {
            clearInterval(stepTick);
            const msg = err.name === 'AbortError'
                ? 'VERIFICATION TIMED OUT\nThe server took too long to respond.\nPlease try going through the ad again.'
                : (err.message || 'Verification failed. Please try again.');
            hideOverlay(() => { showError(msg); });
        }
    });

    /* ── Confetti ── */
    function launchConfetti() {
        const cv  = document.getElementById('confetti-canvas');
        const ctx = cv.getContext('2d');
        cv.width = innerWidth; cv.height = innerHeight;
        const pal    = ['#ff8c00','#ffb347','#ffd700','#00ff88','#ffffff','#ff6644','#ffcc33','#ff9920','#ffee80','#20cc88'];
        const shapes = ['rect','circle','line','triangle'];
        const pieces = Array.from({ length: 300 }, () => ({
            x: innerWidth*.5+(Math.random()-.5)*220, y: innerHeight*.45,
            vx:(Math.random()-.5)*20, vy:-(Math.random()*18+7), ay:.3+Math.random()*.2,
            color:pal[Math.floor(Math.random()*pal.length)], size:Math.random()*10+3,
            rot:Math.random()*Math.PI*2, rspd:(Math.random()-.5)*.3,
            alpha:1, decay:.008+Math.random()*.006,
            shape:shapes[Math.floor(Math.random()*shapes.length)]
        }));
        (function draw() {
            ctx.clearRect(0,0,cv.width,cv.height); let alive = false;
            for (const p of pieces) {
                if (p.alpha <= 0) continue; alive = true;
                ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = ctx.strokeStyle = p.color;
                ctx.translate(p.x, p.y); ctx.rotate(p.rot);
                if      (p.shape==='rect')     { ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2); }
                else if (p.shape==='circle')   { ctx.beginPath();ctx.arc(0,0,p.size/2.5,0,Math.PI*2);ctx.fill(); }
                else if (p.shape==='triangle') { ctx.beginPath();ctx.moveTo(0,-p.size/2);ctx.lineTo(p.size/2,p.size/2);ctx.lineTo(-p.size/2,p.size/2);ctx.closePath();ctx.fill(); }
                else                           { ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-p.size/2,0);ctx.lineTo(p.size/2,0);ctx.stroke(); }
                ctx.restore();
                p.x+=p.vx; p.y+=p.vy; p.vy+=p.ay; p.vx*=.99; p.rot+=p.rspd; p.alpha-=p.decay;
            }
            if (alive) requestAnimationFrame(draw);
            else ctx.clearRect(0,0,cv.width,cv.height);
        })();
    }
    window.addEventListener('resize', () => {
        const c = document.getElementById('confetti-canvas');
        c.width = innerWidth; c.height = innerHeight;
    });

    /* ── Lava background ── */
    (function () {
        const cv  = document.getElementById('lava-canvas');
        const ctx = cv.getContext('2d');
        function resize() { cv.width = innerWidth; cv.height = innerHeight; }
        resize(); window.addEventListener('resize', resize);
        const pal = [[255,80,0],[255,120,10],[255,60,0],[220,40,0],[255,155,20],[180,30,0],[255,140,0],[200,50,0],[255,100,5]];
        const rnd = (a, b) => a + Math.random() * (b - a);
        function mk(init) {
            const c = pal[Math.floor(Math.random()*pal.length)], sp = cv.width*.25;
            return { x:cv.width*.5+rnd(-sp,sp), y:init?rnd(-cv.height,0):rnd(-80,0), vy:rnd(1.5,3.8), vx:rnd(-.8,.8), radius:rnd(4,14), tail:[], maxTail:Math.floor(rnd(14,32)), r:c[0],g:c[1],b:c[2], alpha:rnd(.5,.95), wobble:rnd(0,Math.PI*2), wobbleSpd:rnd(.008,.05), wobbleAmp:rnd(.3,1.8) };
        }
        const drops = [];
        for (let i = 0; i < 110; i++) drops.push(mk(true));
        function drawDrop(d) {
            const {x,y,radius:rd,r,g,b,alpha,tail} = d;
            for (let i=0;i<tail.length;i++) { const t=tail[i],pct=i/tail.length,a=alpha*pct*.42,rad=rd*pct*.65; if(rad<.5||a<.01)continue; ctx.beginPath();ctx.arc(t.x,t.y,rad,0,Math.PI*2);ctx.fillStyle=`rgba(${r},${g},${b},${a})`;ctx.fill(); }
            const gr=ctx.createRadialGradient(x,y,0,x,y,rd*5.5); gr.addColorStop(0,`rgba(${r},${g},${b},${alpha*.48})`); gr.addColorStop(1,`rgba(${r},${g},${b},0)`); ctx.beginPath();ctx.arc(x,y,rd*5.5,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
            const gm=ctx.createRadialGradient(x-rd*.3,y-rd*.35,0,x,y,rd); gm.addColorStop(0,`rgba(255,230,160,${alpha*.92})`); gm.addColorStop(.35,`rgba(${r},${g},${b},${alpha})`); gm.addColorStop(1,`rgba(${Math.max(r-70,0)},${Math.max(g-50,0)},0,${alpha})`); ctx.beginPath();ctx.arc(x,y,rd,0,Math.PI*2);ctx.fillStyle=gm;ctx.fill();
            ctx.beginPath();ctx.arc(x-rd*.3,y-rd*.32,rd*.26,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,245,${alpha*.75})`;ctx.fill();
        }
        function animate() {
            ctx.clearRect(0,0,cv.width,cv.height);
            for (const d of drops) { d.wobble+=d.wobbleSpd; d.x+=Math.sin(d.wobble)*d.wobbleAmp+d.vx; d.y+=d.vy; d.tail.push({x:d.x,y:d.y}); if(d.tail.length>d.maxTail)d.tail.shift(); drawDrop(d); if(d.y-d.radius>cv.height+20){Object.assign(d,mk(false));d.tail=[];} }
            requestAnimationFrame(animate);
        }
        animate();
    })();
})();
</script>
</body>
</html>
