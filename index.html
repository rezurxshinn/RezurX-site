<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RezurX | Key System</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange:      #ff8c00;
            --orange-glow: rgba(255,140,0,0.4);
            --green:       #00ff88;
            --green-glow:  rgba(0,255,136,0.2);
            --red:         #ff4444;
            --bg:          #050505;
            --panel:       rgba(15,15,15,0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 40%, #1a1000, #050505 70%);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 1px,
                rgba(0,0,0,0.12) 1px, rgba(0,0,0,0.12) 2px
            );
            pointer-events: none;
            z-index: 100;
        }

        .panel {
            background: var(--panel);
            border: 1px solid rgba(255,140,0,0.25);
            border-radius: 4px;
            padding: 40px 35px;
            width: 90%;
            max-width: 460px;
            text-align: center;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.95);
        }

        .panel::before {
            content: "";
            position: absolute;
            top: -1px; left: -1px;
            width: 18px; height: 18px;
            border-top: 2px solid var(--orange);
            border-left: 2px solid var(--orange);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 6px;
            font-size: 1.6rem;
            color: var(--orange);
            text-shadow: 0 0 12px var(--orange-glow);
            margin-bottom: 30px;
        }

        /* SPINNER */
        .spinner {
            width: 44px; height: 44px;
            border: 3px solid rgba(255,140,0,0.15);
            border-top-color: var(--orange);
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* STATUS */
        #status {
            font-size: 0.78rem;
            color: #666;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 24px;
            min-height: 1.2em;
        }

        /* GET KEY BUTTON */
        #get-key-btn {
            background: transparent;
            border: 1px solid var(--orange);
            color: var(--orange);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            padding: 16px 24px;
            width: 100%;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.25s;
            border-radius: 2px;
        }
        #get-key-btn:hover:not(:disabled) {
            background: var(--orange);
            color: #000;
            box-shadow: 0 0 20px var(--orange-glow);
        }
        #get-key-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        /* KEY BOX */
        #key-box {
            display: none;
            margin-top: 20px;
            padding: 20px 16px 16px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--green);
            box-shadow: 0 0 20px var(--green-glow);
            border-radius: 2px;
        }
        .key-label {
            font-size: 0.62rem;
            color: rgba(0,255,136,0.5);
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        #key-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--green);
            letter-spacing: 3px;
            word-break: break-all;
            text-shadow: 0 0 8px var(--green-glow);
        }
        #copy-btn {
            margin-top: 14px;
            background: transparent;
            border: 1px solid rgba(0,255,136,0.3);
            color: rgba(0,255,136,0.6);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem;
            padding: 9px 16px;
            cursor: pointer;
            width: 100%;
            letter-spacing: 1px;
            transition: all 0.2s;
            border-radius: 2px;
        }
        #copy-btn:hover { background: rgba(0,255,136,0.08); color: var(--green); }
        #copy-btn.copied { color: var(--green); background: rgba(0,255,136,0.1); }

        /* GET ANOTHER KEY BUTTON */
        #reset-btn {
            display: none;
            margin-top: 12px;
            background: transparent;
            border: 1px solid #333;
            color: #555;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem;
            padding: 9px 16px;
            cursor: pointer;
            width: 100%;
            letter-spacing: 1px;
            transition: all 0.2s;
            border-radius: 2px;
        }
        #reset-btn:hover { border-color: var(--orange); color: var(--orange); }

        /* ERROR STATE */
        #error-box {
            display: none;
            margin-top: 16px;
            padding: 14px;
            border: 1px solid rgba(255,68,68,0.3);
            background: rgba(255,68,68,0.05);
            border-radius: 2px;
        }
        #error-msg {
            font-size: 0.72rem;
            color: var(--red);
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        #try-again-btn {
            background: transparent;
            border: 1px solid var(--red);
            color: var(--red);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
            border-radius: 2px;
        }
        #try-again-btn:hover { background: rgba(255,68,68,0.08); }

        .footer {
            margin-top: 28px;
            font-size: 0.58rem;
            color: #222;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
<div class="panel">
    <h1>REZURX</h1>

    <div class="spinner" id="spinner"></div>
    <div id="status">SYSTEM: READY</div>

    <!-- Default state: fresh visitor -->
    <button id="get-key-btn" onclick="startSession()">⚡ Get Key</button>

    <!-- Success state: key shown here on same page -->
    <div id="key-box">
        <div class="key-label">ACCESS KEY GENERATED</div>
        <div id="key-value"></div>
        <button id="copy-btn" onclick="copyKey()">[ CLICK TO COPY ]</button>
    </div>
    <button id="reset-btn" onclick="resetPage()">↩ Get Another Key</button>

    <!-- Error state -->
    <div id="error-box">
        <div id="error-msg"></div>
        <button id="try-again-btn" onclick="resetPage()">↩ TRY AGAIN</button>
    </div>

    <div class="footer">AES-256 SECURED &nbsp;|&nbsp; HWID_LOCK: ON &nbsp;|&nbsp; V4.2</div>
</div>

<script>
    const API_BASE        = "https://rezurx-backend.onrender.com";
    const LINKVERTISE_URL = "https://linkvertise.com/5011888/rezurxlab"; // 👈 your link

    const spinner     = document.getElementById('spinner');
    const statusEl    = document.getElementById('status');
    const getKeyBtn   = document.getElementById('get-key-btn');
    const keyBox      = document.getElementById('key-box');
    const keyValue    = document.getElementById('key-value');
    const copyBtn     = document.getElementById('copy-btn');
    const resetBtn    = document.getElementById('reset-btn');
    const errorBox    = document.getElementById('error-box');
    const errorMsg    = document.getElementById('error-msg');

    let keyToCopy = "";

    // ── BOOT: detect which state we're in ─────────────
    window.onload = async function () {
        const params = new URLSearchParams(window.location.search);
        const token  = params.get('token');
        const hash   = params.get('hash');

        if (token && hash) {
            // Returning from Linkvertise — verify automatically
            setLoading("VERIFYING AD COMPLETION...");
            await verifyKey(token, hash);
        } else {
            // Fresh visitor — show Get Key button
            setIdle();
        }
    };

    // ── STEP 1: Generate session → redirect to Linkvertise ──
    async function startSession() {
        getKeyBtn.disabled = true;
        setLoading("GENERATING SECURE TOKEN...");

        try {
            const res  = await fetch(`${API_BASE}/api/initiate-session`, { method: 'POST' });

            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();

            if (!data.token) throw new Error("No token returned");

            statusEl.innerText = "REDIRECTING TO VERIFICATION...";
            // Linkvertise will append ?hash=... and preserve ?token= when it redirects back
            window.location.href = `${LINKVERTISE_URL}?token=${data.token}`;

        } catch {
            showError("SERVER UNREACHABLE — Is Render awake? Wait 30s and try again.");
        }
    }

    // ── STEP 2: Verify with backend → show key on this page ──
    async function verifyKey(token, hash) {
        // Clean URL immediately so token/hash aren't visible
        window.history.replaceState({}, '', window.location.pathname);

        try {
            const res = await fetch(`${API_BASE}/api/verify-linkvertise`, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ token, hash })
            });

            const data = await res.json();

            if (res.status === 400) { showError("TOKEN ALREADY USED — Each ad completion gives one key."); return; }
            if (res.status === 403) { showError("AD NOT COMPLETED — Please finish the full Linkvertise offer."); return; }
            if (res.status === 404) { showError("SESSION EXPIRED — Please start over."); return; }
            if (!res.ok)            { showError(`SERVER ERROR (${res.status}) — Try again shortly.`); return; }

            if (data.key) {
                showSuccess(data.key);
            } else {
                showError(data.error ? data.error.toUpperCase() : "VERIFICATION FAILED — UNKNOWN REASON");
            }

        } catch {
            showError("CONNECTION LOST — Check your network and try again.");
        }
    }

    // ── UI STATES ──────────────────────────────────────
    function setLoading(msg) {
        spinner.style.display  = "block";
        statusEl.innerText     = msg;
        statusEl.style.color   = "#666";
        getKeyBtn.style.display = "none";
        keyBox.style.display   = "none";
        resetBtn.style.display = "none";
        errorBox.style.display = "none";
    }

    function setIdle() {
        spinner.style.display   = "none";
        statusEl.innerText      = "SYSTEM: READY";
        statusEl.style.color    = "#666";
        getKeyBtn.style.display = "block";
        getKeyBtn.disabled      = false;
        keyBox.style.display    = "none";
        resetBtn.style.display  = "none";
        errorBox.style.display  = "none";
    }

    function showSuccess(key) {
        keyToCopy = key;
        spinner.style.display   = "none";
        statusEl.innerText      = "ACCESS GRANTED";
        statusEl.style.color    = "var(--green)";
        getKeyBtn.style.display = "none";
        errorBox.style.display  = "none";
        keyValue.innerText      = key;
        keyBox.style.display    = "block";
        resetBtn.style.display  = "block";
    }

    function showError(msg) {
        spinner.style.display   = "none";
        statusEl.innerText      = "SYSTEM: ERROR";
        statusEl.style.color    = "var(--red)";
        getKeyBtn.style.display = "none";
        keyBox.style.display    = "none";
        resetBtn.style.display  = "none";
        errorMsg.innerText      = msg;
        errorBox.style.display  = "block";
    }

    function resetPage() {
        keyToCopy = "";
        setIdle();
    }

    // ── COPY KEY ───────────────────────────────────────
    function copyKey() {
        if (!keyToCopy) return;
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(keyToCopy).then(flashCopied).catch(fallbackCopy);
        } else {
            fallbackCopy();
        }
    }

    function fallbackCopy() {
        const ta = document.createElement('textarea');
        ta.value = keyToCopy;
        ta.style.cssText = "position:fixed;opacity:0;";
        document.body.appendChild(ta);
        ta.focus(); ta.select();
        try { document.execCommand('copy'); flashCopied(); }
        catch { copyBtn.innerText = "[ COPY MANUALLY ]"; }
        document.body.removeChild(ta);
    }

    function flashCopied() {
        copyBtn.innerText = "[ ✓ COPIED! ]";
        copyBtn.classList.add('copied');
        setTimeout(() => {
            copyBtn.innerText = "[ CLICK TO COPY ]";
            copyBtn.classList.remove('copied');
        }, 2500);
    }
</script>
</body>
</html>
