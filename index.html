<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0a0200">
    <title>RezurXLab | Claim Key</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange:      #ff8c00;
            --orange-dim:  #cc6600;
            --orange-glow: rgba(255,140,0,0.45);
            --green:       #00ff88;
            --green-glow:  rgba(0,255,136,0.35);
            --green-soft:  rgba(0,255,136,0.07);
            --red:         #ff4455;
            --red-glow:    rgba(255,68,85,0.35);
            --red-soft:    rgba(255,68,85,0.08);
            --bg:          #0a0200;
            --panel:       rgba(10,4,0,0.93);
            --muted:       #3a3028;
            --dim:         #6a5848;
        }

        *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
        html,body { height:100%; }
        body {
            background:var(--bg); color:#fff;
            font-family:'JetBrains Mono',monospace;
            display:flex; flex-direction:column;
            justify-content:center; align-items:center;
            min-height:100vh; overflow:hidden; position:relative;
            -webkit-font-smoothing:antialiased;
        }

        #lava-canvas     { position:fixed; inset:0; width:100%; height:100%; z-index:0; pointer-events:none; }
        .atmos {
            position:fixed; inset:0; z-index:1; pointer-events:none;
            background:
                radial-gradient(ellipse 90% 50% at 50% 0%, rgba(255,90,0,0.20) 0%, transparent 65%),
                radial-gradient(ellipse 100% 100% at 50% 50%, transparent 35%, rgba(0,0,0,0.72) 100%);
        }
        .scanlines {
            position:fixed; inset:0; z-index:2; pointer-events:none;
            background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.045) 3px,rgba(0,0,0,0.045) 4px);
        }
        #confetti-canvas { position:fixed; inset:0; width:100%; height:100%; z-index:999; pointer-events:none; }

        /* ══════════════════════════════════════════
           FULL-SCREEN LOADING OVERLAY
        ══════════════════════════════════════════ */
        #loading-overlay {
            display:none;
            position:fixed; inset:0; z-index:500;
            background:rgba(6,2,0,0.97);
            flex-direction:column;
            justify-content:center; align-items:center;
            gap:32px;
            animation:overlayIn .3s ease both;
        }
        #loading-overlay.show { display:flex; }
        @keyframes overlayIn { from{opacity:0;} to{opacity:1;} }

        .ov-logo {
            font-family:'Orbitron',sans-serif; font-size:1.3rem; font-weight:900; letter-spacing:6px;
            background:linear-gradient(180deg,#ffd080 0%,#ff9c20 35%,#ff6600 70%,#cc4400 100%);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
            filter:drop-shadow(0 0 20px rgba(255,140,0,0.6));
        }

        .ov-ring { width:72px; height:72px; position:relative; }
        .ov-ring::before, .ov-ring::after { content:""; position:absolute; inset:0; border-radius:50%; }
        .ov-ring::before { border:3px solid rgba(255,140,0,0.1); }
        .ov-ring::after  {
            border:3px solid transparent;
            border-top-color:var(--orange);
            border-right-color:rgba(255,140,0,0.4);
            animation:spin 1s linear infinite;
            filter:drop-shadow(0 0 6px var(--orange-glow));
        }
        @keyframes spin { to{transform:rotate(360deg);} }
        .ov-inner {
            position:absolute; inset:12px; border-radius:50%;
            border:2px solid transparent;
            border-bottom-color:rgba(255,120,0,0.5);
            border-left-color:rgba(255,120,0,0.2);
            animation:spinR .7s linear infinite reverse;
        }
        @keyframes spinR { to{transform:rotate(360deg);} }

        .ov-content { text-align:center; display:flex; flex-direction:column; align-items:center; gap:14px; }
        #ov-status  { font-size:.75rem; letter-spacing:3px; text-transform:uppercase; color:var(--orange); min-height:1.1em; transition:opacity .3s; }
        .ov-track   { width:280px; height:3px; background:rgba(255,140,0,0.1); border-radius:2px; overflow:hidden; }
        #ov-bar     {
            height:100%; width:0%;
            background:linear-gradient(90deg,var(--orange-dim),var(--orange),#ffb347);
            border-radius:2px; transition:width .5s ease;
            box-shadow:0 0 10px var(--orange-glow);
        }
        #ov-substatus { font-size:.58rem; letter-spacing:2px; color:var(--dim); text-transform:uppercase; min-height:1em; }

        /* ══════════════════════════════════════════
           PANEL
        ══════════════════════════════════════════ */
        .panel {
            position:relative; z-index:10;
            background:var(--panel);
            border:1px solid rgba(255,140,0,0.22);
            border-radius:6px; padding:42px 38px 34px;
            width:92%; max-width:480px; text-align:center;
            box-shadow:
                0 0 0 1px rgba(0,0,0,0.9),
                0 8px 40px rgba(0,0,0,0.85),
                0 0 100px rgba(255,80,0,0.10),
                inset 0 1px 0 rgba(255,180,80,0.09);
            backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px);
            animation:panelIn .55s cubic-bezier(0.22,1,0.36,1) both;
        }
        @keyframes panelIn { from{opacity:0;transform:translateY(18px) scale(0.97);} to{opacity:1;transform:none;} }
        @media (max-width:480px) { .panel { padding:32px 22px 26px; } }

        .c { position:absolute; width:14px; height:14px; }
        .c-tl { top:-1px; left:-1px;  border-top:2px solid var(--orange); border-left:2px solid var(--orange);  border-radius:3px 0 0 0; }
        .c-tr { top:-1px; right:-1px; border-top:2px solid var(--orange); border-right:2px solid var(--orange); border-radius:0 3px 0 0; }
        .c-bl { bottom:-1px; left:-1px;  border-bottom:2px solid var(--orange); border-left:2px solid var(--orange);  border-radius:0 0 0 3px; }
        .c-br { bottom:-1px; right:-1px; border-bottom:2px solid var(--orange); border-right:2px solid var(--orange); border-radius:0 0 3px 0; }

        .logo-eyebrow { font-size:.52rem; letter-spacing:4px; color:var(--muted); text-transform:uppercase; margin-bottom:10px; }
        h1 {
            font-family:'Orbitron',sans-serif; font-size:1.75rem; font-weight:900; letter-spacing:5px;
            background:linear-gradient(180deg,#ffd080 0%,#ff9c20 35%,#ff6600 70%,#cc4400 100%);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
            filter:drop-shadow(0 0 20px rgba(255,140,0,0.55)); line-height:1.1;
            animation:logoBreath 4s ease-in-out infinite;
        }
        @keyframes logoBreath { 0%,100%{filter:drop-shadow(0 0 20px rgba(255,140,0,0.55));} 50%{filter:drop-shadow(0 0 32px rgba(255,140,0,0.85));} }
        .logo-sub { font-size:.5rem; letter-spacing:5px; color:var(--muted); text-transform:uppercase; margin-top:9px; margin-bottom:28px; }
        .divider  { width:100%; height:1px; background:linear-gradient(90deg,transparent,rgba(255,140,0,0.22),transparent); margin-bottom:22px; }

        /* Status */
        #status {
            font-size:.68rem; letter-spacing:2px; text-transform:uppercase;
            color:var(--dim); margin-bottom:20px;
            display:flex; align-items:center; justify-content:center; gap:8px;
            transition:color .3s; min-height:1.1em;
        }
        .sdot { width:5px; height:5px; border-radius:50%; background:var(--muted); flex-shrink:0; animation:pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
        #status.green { color:var(--green); }
        #status.green .sdot { background:var(--green); box-shadow:0 0 8px var(--green-glow); }
        #status.red   { color:var(--red); }
        #status.red   .sdot { background:var(--red); box-shadow:0 0 8px var(--red-glow); animation:none; }
        #status.amber { color:var(--orange); }
        #status.amber .sdot { background:var(--orange); box-shadow:0 0 8px var(--orange-glow); }

        /* Key box */
        #key-box { display:none; }
        #key-box.show { display:block; animation:slideUp .55s cubic-bezier(0.22,1,0.36,1) both; }
        @keyframes slideUp { from{opacity:0;transform:translateY(14px) scale(.98);} to{opacity:1;transform:none;} }
        .key-label { font-size:.5rem; letter-spacing:3px; color:rgba(0,255,136,0.4); text-transform:uppercase; margin-bottom:12px; }
        #key-value {
            font-family:'Orbitron',sans-serif; font-size:1.05rem; font-weight:700; letter-spacing:3px;
            color:var(--green); word-break:break-all; text-shadow:0 0 14px var(--green-glow);
            margin-bottom:8px; user-select:all; cursor:text;
            padding:10px; border-radius:3px; background:var(--green-soft);
            border:1px solid rgba(0,255,136,0.12); transition:background .2s;
        }
        #key-value:hover { background:rgba(0,255,136,0.1); }
        #key-expiry { font-size:.52rem; color:rgba(0,255,136,0.3); letter-spacing:1px; margin-bottom:14px; }
        #copy-btn {
            background:transparent; border:1px solid rgba(0,255,136,0.2); color:rgba(0,255,136,0.55);
            font-family:'JetBrains Mono',monospace; font-size:.62rem; letter-spacing:2px; text-transform:uppercase;
            padding:10px; width:100%; cursor:pointer; border-radius:2px; transition:all .2s; display:block;
        }
        #copy-btn:hover  { background:rgba(0,255,136,0.05); color:var(--green); border-color:rgba(0,255,136,0.4); }
        #copy-btn.copied { color:var(--green); background:rgba(0,255,136,0.1); border-color:rgba(0,255,136,0.4); }

        /* Error */
        #error-box { display:none; }
        #error-box.show { display:block; animation:slideUp .35s ease both; }
        #error-msg {
            font-size:.65rem; color:var(--red); letter-spacing:.5px;
            line-height:1.65; white-space:pre-line;
            background:var(--red-soft); border:1px solid rgba(255,68,85,0.2);
            border-radius:4px; padding:16px;
        }

        .footer { margin-top:24px; display:flex; justify-content:center; align-items:center; gap:10px; }
        .fi { font-size:.45rem; letter-spacing:1.5px; color:#1a0e06; text-transform:uppercase; }
        .fd { width:2px; height:2px; border-radius:50%; background:#1a0e06; }
    </style>
</head>
<body>

<!-- Loading overlay — visible during auto-verification -->
<div id="loading-overlay">
    <div class="ov-logo">REZURXLAB</div>
    <div class="ov-ring"><div class="ov-inner"></div></div>
    <div class="ov-content">
        <div id="ov-status">Waking server...</div>
        <div class="ov-track"><div id="ov-bar"></div></div>
        <div id="ov-substatus">Please wait...</div>
    </div>
</div>

<canvas id="lava-canvas"></canvas>
<div class="atmos"></div>
<div class="scanlines"></div>
<canvas id="confetti-canvas"></canvas>

<div class="panel">
    <div class="c c-tl"></div><div class="c c-tr"></div>
    <div class="c c-bl"></div><div class="c c-br"></div>

    <div class="logo-eyebrow">Access Portal</div>
    <h1>REZURXLAB</h1>
    <div class="logo-sub">Key Generation System</div>
    <div class="divider"></div>

    <!-- Status line — shown while loading overlay is active -->
    <div id="status"><span class="sdot"></span><span id="status-txt">Verifying session...</span></div>

    <!-- Key — shown after successful verification -->
    <div id="key-box">
        <div class="key-label">▸ Your Access Key</div>
        <div id="key-value" tabindex="0"></div>
        <div id="key-expiry"></div>
        <button id="copy-btn" type="button">[ Copy Key ]</button>
    </div>

    <!-- Error — shown if session invalid or verification fails -->
    <div id="error-box">
        <div id="error-msg"></div>
    </div>

    <div class="footer">
        <span class="fi">AES-256</span><div class="fd"></div>
        <span class="fi">HWID Lock</span><div class="fd"></div>
        <span class="fi">V4.2</span>
    </div>
</div>

<script>
(() => {
    'use strict';

    /* ═══════════════════════════════════════
       CONFIG
    ═══════════════════════════════════════ */
    const API          = "https://rezurx-backend.onrender.com";
    const SESSION_KEY  = 'rzx_session_v3';       // same as start.html
    const COOLDOWN_KEY = 'rzx_cooldown_v3';      // same as start.html
    const COOLDOWN_MS  = 10 * 60 * 60 * 1000;     // 10 hours
    const BIND_SECRET  = 'rzx_fp_bind_9x2';      // same as start.html
    const HASH_RE      = /^[A-Za-z0-9_\-=.]{6,512}$/;

    /* ═══════════════════════════════════════
       DOM
    ═══════════════════════════════════════ */
    const overlay  = document.getElementById('loading-overlay');
    const ovStatus = document.getElementById('ov-status');
    const ovBar    = document.getElementById('ov-bar');
    const ovSub    = document.getElementById('ov-substatus');
    const statusEl = document.getElementById('status');
    const statusTx = document.getElementById('status-txt');
    const keyBox   = document.getElementById('key-box');
    const keyVal   = document.getElementById('key-value');
    const keyExp   = document.getElementById('key-expiry');
    const copyBtn  = document.getElementById('copy-btn');
    const errorBox = document.getElementById('error-box');
    const errorMsg = document.getElementById('error-msg');

    let currentKey = '';

    /* ═══════════════════════════════════════
       BROWSER FINGERPRINT (same as start.html)
    ═══════════════════════════════════════ */
    async function getFingerprint() {
        const nav = navigator;
        const scr = screen;
        let canvasHash = 'nc';
        try {
            const cv = document.createElement('canvas');
            cv.width = 180; cv.height = 40;
            const cx = cv.getContext('2d');
            cx.font = '13px Arial';
            cx.fillStyle = '#ff8c00';
            cx.fillText('RezurX🔥fp', 2, 20);
            cx.fillStyle = 'rgba(0,200,100,0.7)';
            cx.fillRect(8, 26, 60, 8);
            canvasHash = cv.toDataURL().slice(-48);
        } catch (_) {}

        const raw = [
            nav.userAgent,
            nav.language,
            nav.hardwareConcurrency || 0,
            nav.maxTouchPoints || 0,
            scr.colorDepth,
            scr.width + 'x' + scr.height,
            Intl.DateTimeFormat().resolvedOptions().timeZone,
            nav.platform || '',
            canvasHash,
            BIND_SECRET,
        ].join('|');

        const buf  = new TextEncoder().encode(raw);
        const hash = await crypto.subtle.digest('SHA-256', buf);
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    /* ═══════════════════════════════════════
       STORAGE
    ═══════════════════════════════════════ */
    function loadTokenData() {
        try {
            const raw = sessionStorage.getItem(SESSION_KEY);
            if (!raw) return null;
            const data = JSON.parse(raw);
            if (data.token && data.fp) return data; // { token, fp }
        } catch (_) {}
        return null;
    }
    function clearTokenData() {
        try { sessionStorage.removeItem(SESSION_KEY); } catch (_) {}
    }
    function setCooldown() {
        try {
            localStorage.setItem(COOLDOWN_KEY, JSON.stringify({ ts: Date.now() }));
        } catch (_) {}
    }

    /* ═══════════════════════════════════════
       UI HELPERS
    ═══════════════════════════════════════ */
    function setStatus(msg, type = '') { statusTx.textContent = msg; statusEl.className = type; }
    function setOverlay(status, pct, sub) {
        ovStatus.textContent = status;
        ovBar.style.width    = pct + '%';
        ovSub.textContent    = sub || '';
    }
    function showOverlay() { overlay.classList.add('show'); }
    function hideOverlay(cb) {
        overlay.style.transition = 'opacity .5s';
        overlay.style.opacity    = '0';
        setTimeout(() => {
            overlay.classList.remove('show');
            overlay.style.opacity = '';
            overlay.style.transition = '';
            if (cb) cb();
        }, 550);
    }
    function showError(msg) {
        errorMsg.textContent = msg;
        errorBox.classList.add('show');
        setStatus('ERROR', 'red');
    }

    /* ═══════════════════════════════════════
       FETCH WITH TIMEOUT
    ═══════════════════════════════════════ */
    async function fetchT(url, opts = {}, ms = 15000) {
        const ctrl = new AbortController();
        const tid  = setTimeout(() => ctrl.abort(), ms);
        try {
            return await fetch(url, { ...opts, signal: ctrl.signal, mode: 'cors', credentials: 'omit' });
        } finally { clearTimeout(tid); }
    }

    /* ═══════════════════════════════════════
       COPY KEY
    ═══════════════════════════════════════ */
    function copyKey() {
        if (!currentKey) return;
        const ok = () => {
            copyBtn.textContent = '[ ✓ Copied to clipboard! ]';
            copyBtn.classList.add('copied');
            setTimeout(() => { copyBtn.textContent = '[ Copy Key ]'; copyBtn.classList.remove('copied'); }, 2500);
        };
        if (navigator.clipboard?.writeText) {
            navigator.clipboard.writeText(currentKey).then(ok).catch(fallback);
        } else { fallback(); }
        function fallback() {
            try {
                const ta = document.createElement('textarea');
                ta.value = currentKey; ta.style.cssText = 'position:fixed;opacity:0;';
                document.body.appendChild(ta); ta.select(); document.execCommand('copy');
                document.body.removeChild(ta); ok();
            } catch (_) { copyBtn.textContent = '[ Select key text above to copy ]'; }
        }
    }
    copyBtn.addEventListener('click', copyKey);

    /* ═══════════════════════════════════════
       MAIN — auto-verify on page load
    ═══════════════════════════════════════ */
    window.addEventListener('load', async () => {
        const params   = new URLSearchParams(window.location.search);
        const hash     = params.get('hash');
        const tokenData = loadTokenData();

        if (!hash || !HASH_RE.test(hash) || !tokenData) {
            let msg = 'No active session found.\n\nTo get a key you must go through the Linkvertise ad from the beginning. Please return to the script and follow the link.';
            if (hash && !tokenData) msg = 'Session token missing or expired.\n\nSessions last 30 minutes. Please start over from the beginning.';
            else if (!hash) msg = 'Verification hash missing.\n\nDo not navigate to this page directly. Complete the Linkvertise ad and you will be redirected here automatically.';
            showError(msg);
            setStatus('SESSION INVALID', 'red');
            return;
        }

        // ✅ Valid hash + stored token data — compute fingerprint and check binding
        const currentFp = await getFingerprint();
        if (currentFp !== tokenData.fp) {
            showError('Session bound to another browser.\n\nThe token was created on a different device or browser. Please start over from the beginning.');
            clearTokenData();
            setStatus('BINDING FAILED', 'red');
            return;
        }

        // Clean URL immediately
        window.history.replaceState({}, '', window.location.pathname);

        showOverlay();
        setOverlay('Waking server...', 5, 'Connecting to Render...');
        setStatus('VERIFYING...', 'amber');

        // Step 1: Warmup ping
        try {
            const h = await fetchT(API + '/health', { method: 'GET', cache: 'no-store' }, 30000);
            if (h.ok) setOverlay('Server online', 20, 'Connected successfully');
        } catch (_) {
            setOverlay('Server slow...', 15, 'Proceeding anyway...');
        }
        await new Promise(r => setTimeout(r, 350));

        // Step 2: Animated status while fetching
        const steps = [
            { pct: 35, status: 'Verifying with Linkvertise...',  sub: 'Checking ad completion...' },
            { pct: 55, status: 'Confirming ad completion...',    sub: 'Anti-bypass check in progress...' },
            { pct: 75, status: 'Generating your key...',         sub: 'Almost done...' },
        ];
        let si = 0;
        const stepTick = setInterval(() => {
            if (si < steps.length) {
                const s = steps[si++];
                setOverlay(s.status, s.pct, s.sub);
            }
        }, 1300);

        // Step 3: Send token + hash to backend
        try {
            const res  = await fetchT(
                API + '/api/verify-linkvertise',
                {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body:    JSON.stringify({ token: tokenData.token, hash }),
                },
                25000
            );

            clearInterval(stepTick);
            const data = await res.json().catch(() => ({}));

            if (res.status === 400) throw new Error('TOKEN ALREADY USED\nEach ad completion gives one key. Please go through the ad again to get a new key.');
            if (res.status === 403) throw new Error('AD NOT COMPLETED\nPlease finish the full Linkvertise offer without skipping.');
            if (res.status === 404) throw new Error('SESSION EXPIRED\nSessions last 30 minutes. Please start over from the beginning.');
            if (!res.ok)            throw new Error((data.error || 'Server error ' + res.status) + '\n\nPlease try again shortly.');
            if (!data.key)          throw new Error('Invalid response from server.\nPlease try again.');

            // ── SUCCESS ───────────────────────────────────────
            setOverlay('Key generated!', 100, 'Opening your key...');
            await new Promise(r => setTimeout(r, 700));

            currentKey = data.key;
            clearTokenData();           // one-time use
            setCooldown();              // set cooldown in localStorage

            // Notify start.html (if it's still open) to update its cooldown UI
            try {
                const bc = new BroadcastChannel('rzx_channel');
                bc.postMessage('key_issued');
                bc.close();
            } catch (_) {}

            keyVal.textContent = currentKey;
            if (data.expiresAt) {
                keyExp.textContent = 'Expires: ' +
                    new Date(data.expiresAt).toLocaleString('en-GB', { hour12: false });
            }

            hideOverlay(() => {
                keyBox.classList.add('show');
                setStatus('✓ KEY GENERATED', 'green');
                launchConfetti();
                setTimeout(() => keyVal.focus(), 600);
            });

        } catch (err) {
            clearInterval(stepTick);
            const msg = err.name === 'AbortError'
                ? 'VERIFICATION TIMED OUT\nThe server took too long. Please go through the ad again.'
                : (err.message || 'Verification failed. Please try again.');
            hideOverlay(() => { showError(msg); });
        }
    });

    /* ═══════════════════════════════════════
       CONFETTI
    ═══════════════════════════════════════ */
    function launchConfetti() {
        const cv  = document.getElementById('confetti-canvas');
        const ctx = cv.getContext('2d');
        cv.width = innerWidth; cv.height = innerHeight;
        const pal    = ['#ff8c00','#ffb347','#ffd700','#00ff88','#ffffff','#ff6644','#ffcc33','#ff9920'];
        const shapes = ['rect','circle','line','triangle'];
        const pieces = Array.from({ length: 280 }, () => ({
            x: innerWidth*.5+(Math.random()-.5)*200, y: innerHeight*.45,
            vx:(Math.random()-.5)*18, vy:-(Math.random()*16+6), ay:.32+Math.random()*.18,
            color:pal[Math.floor(Math.random()*pal.length)], size:Math.random()*9+3,
            rot:Math.random()*Math.PI*2, rspd:(Math.random()-.5)*.28,
            alpha:1, decay:.009+Math.random()*.006,
            shape:shapes[Math.floor(Math.random()*shapes.length)]
        }));
        (function draw() {
            ctx.clearRect(0,0,cv.width,cv.height); let alive=false;
            for (const p of pieces) {
                if (p.alpha<=0) continue; alive=true;
                ctx.save(); ctx.globalAlpha=p.alpha; ctx.fillStyle=ctx.strokeStyle=p.color;
                ctx.translate(p.x,p.y); ctx.rotate(p.rot);
                if      (p.shape==='rect')     { ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2); }
                else if (p.shape==='circle')   { ctx.beginPath();ctx.arc(0,0,p.size/2.5,0,Math.PI*2);ctx.fill(); }
                else if (p.shape==='triangle') { ctx.beginPath();ctx.moveTo(0,-p.size/2);ctx.lineTo(p.size/2,p.size/2);ctx.lineTo(-p.size/2,p.size/2);ctx.closePath();ctx.fill(); }
                else                           { ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-p.size/2,0);ctx.lineTo(p.size/2,0);ctx.stroke(); }
                ctx.restore();
                p.x+=p.vx;p.y+=p.vy;p.vy+=p.ay;p.vx*=.99;p.rot+=p.rspd;p.alpha-=p.decay;
            }
            if (alive) requestAnimationFrame(draw);
            else ctx.clearRect(0,0,cv.width,cv.height);
        })();
    }
    window.addEventListener('resize', () => {
        const c = document.getElementById('confetti-canvas');
        c.width = innerWidth; c.height = innerHeight;
    });

    /* ═══════════════════════════════════════
       LAVA BACKGROUND (same as before)
    ═══════════════════════════════════════ */
    (function () {
        const cv  = document.getElementById('lava-canvas');
        const ctx = cv.getContext('2d');
        function resize() { cv.width = innerWidth; cv.height = innerHeight; }
        resize(); window.addEventListener('resize', resize);

        const pal = [[255,80,0],[255,120,10],[255,60,0],[220,40,0],[255,155,20],[180,30,0],[255,140,0],[200,50,0],[255,100,5]];
        const rnd = (a, b) => a + Math.random() * (b - a);

        function mk(init) {
            const c  = pal[Math.floor(Math.random() * pal.length)];
            const sp = cv.width * .25;
            return {
                x: cv.width * .5 + rnd(-sp, sp),
                y: init ? rnd(-cv.height, 0) : rnd(-80, 0),
                vy: rnd(1.5, 3.8), vx: rnd(-.8, .8),
                radius: rnd(4, 14), tail: [], maxTail: Math.floor(rnd(14, 32)),
                r: c[0], g: c[1], b: c[2], alpha: rnd(.5, .95),
                wobble: rnd(0, Math.PI * 2), wobbleSpd: rnd(.008, .05), wobbleAmp: rnd(.3, 1.8),
            };
        }

        const drops = [];
        for (let i = 0; i < 100; i++) drops.push(mk(true));

        function drawDrop(d) {
            const { x, y, radius: rd, r, g, b, alpha, tail } = d;
            for (let i = 0; i < tail.length; i++) {
                const t = tail[i], pct = i / tail.length;
                const a = alpha * pct * .4, rad = rd * pct * .65;
                if (rad < .5 || a < .01) continue;
                ctx.beginPath(); ctx.arc(t.x, t.y, rad, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${r},${g},${b},${a})`; ctx.fill();
            }
            const gr = ctx.createRadialGradient(x, y, 0, x, y, rd * 5);
            gr.addColorStop(0, `rgba(${r},${g},${b},${alpha * .45})`);
            gr.addColorStop(1, `rgba(${r},${g},${b},0)`);
            ctx.beginPath(); ctx.arc(x, y, rd * 5, 0, Math.PI * 2);
            ctx.fillStyle = gr; ctx.fill();

            const gm = ctx.createRadialGradient(x - rd * .3, y - rd * .35, 0, x, y, rd);
            gm.addColorStop(0,   `rgba(255,220,140,${alpha * .9})`);
            gm.addColorStop(.35, `rgba(${r},${g},${b},${alpha})`);
            gm.addColorStop(1,   `rgba(${Math.max(r-70,0)},${Math.max(g-50,0)},0,${alpha})`);
            ctx.beginPath(); ctx.arc(x, y, rd, 0, Math.PI * 2);
            ctx.fillStyle = gm; ctx.fill();
            ctx.beginPath(); ctx.arc(x - rd * .3, y - rd * .32, rd * .25, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,240,${alpha * .7})`; ctx.fill();
        }

        function animate() {
            ctx.clearRect(0, 0, cv.width, cv.height);
            for (const d of drops) {
                d.wobble += d.wobbleSpd;
                d.x += Math.sin(d.wobble) * d.wobbleAmp + d.vx;
                d.y += d.vy;
                d.tail.push({ x: d.x, y: d.y });
                if (d.tail.length > d.maxTail) d.tail.shift();
                drawDrop(d);
                if (d.y - d.radius > cv.height + 20) { Object.assign(d, mk(false)); d.tail = []; }
            }
            requestAnimationFrame(animate);
        }
        animate();
    })();

})();
</script>
</body>
</html>
