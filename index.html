<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#060100">
<meta http-equiv="X-Frame-Options" content="DENY">
<title>RezurXLab | Access Granted</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--orange:#ff8c00;--orange-bright:#ffaa33;--orange-deep:#aa4400;
  --orange-glow:rgba(255,140,0,.45);--gold:#ffd700;
  --green:#00ff88;--green-glow:rgba(0,255,136,.45);
  --teal:#20cc88;--purple:#a070ff;--purple-glow:rgba(160,112,255,.4);
  --red:#ff4455;--red-glow:rgba(255,68,85,.45);
  --bg:#060100;--panel:rgba(8,3,0,.92);--muted:#3a3028;--dim:#6a5848;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{background:var(--bg);color:#fff;font-family:'JetBrains Mono',monospace;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  min-height:100vh;overflow:hidden;position:relative;-webkit-font-smoothing:antialiased;}

#lava-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.atmos{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse 85% 50% at 50% 0%,rgba(255,90,0,.24) 0%,transparent 60%),
             radial-gradient(ellipse 70% 40% at 50% 100%,rgba(180,30,0,.20) 0%,transparent 60%),
             radial-gradient(ellipse 100% 100% at 50% 50%,transparent 30%,rgba(0,0,0,.80) 100%);}
.vignette{position:fixed;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,.6) 100%);}
.lava-river{position:fixed;bottom:0;left:0;right:0;height:32vh;z-index:1;pointer-events:none;
  background:linear-gradient(0deg,rgba(255,70,0,.18) 0%,rgba(255,100,0,.05) 40%,transparent 100%);
  animation:riverGlow 4s ease-in-out infinite;}
@keyframes riverGlow{0%,100%{opacity:.7}50%{opacity:1}}
.embers{position:fixed;inset:0;z-index:2;pointer-events:none;
  background-image:
    radial-gradient(2px 2px at 15% 85%,rgba(255,180,50,.7) 0%,transparent 100%),
    radial-gradient(3px 3px at 25% 90%,rgba(255,140,0,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 35% 80%,rgba(255,200,80,.5) 0%,transparent 100%),
    radial-gradient(2px 2px at 70% 88%,rgba(255,160,40,.6) 0%,transparent 100%),
    radial-gradient(3px 3px at 85% 82%,rgba(255,120,20,.5) 0%,transparent 100%);
  background-size:200% 200%;animation:embersFloat 8s ease-in-out infinite alternate;}
@keyframes embersFloat{0%{transform:translateY(0) translateX(0)}50%{transform:translateY(-15px) translateX(10px)}100%{transform:translateY(-5px) translateX(-5px)}}
.scanlines{position:fixed;inset:0;z-index:3;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px);}
#confetti-canvas{position:fixed;inset:0;z-index:999;pointer-events:none;}

#loading-overlay{display:none;position:fixed;inset:0;z-index:500;
  background:radial-gradient(ellipse at center,rgba(20,8,0,.97) 0%,rgba(4,1,0,.99) 100%);
  flex-direction:column;justify-content:center;align-items:center;gap:36px;
  animation:overlayIn .4s ease both;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
#loading-overlay.show{display:flex;}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}

.ov-brand{display:flex;flex-direction:column;align-items:center;gap:6px;}
.ov-logo{font-family:'Orbitron',sans-serif;font-size:1.5rem;font-weight:900;letter-spacing:8px;
  background:linear-gradient(180deg,#ffe0a0 0%,#ffaa33 30%,#ff6600 65%,#aa3300 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 24px rgba(255,140,0,.7));}
.ov-tag{font-size:.5rem;letter-spacing:6px;color:var(--orange-deep);text-transform:uppercase;}
.ov-provider{font-size:.48rem;letter-spacing:3px;text-transform:uppercase;font-weight:600;
  padding:4px 12px;border-radius:20px;border:1px solid;}
.ov-provider.lv{color:rgba(255,140,0,.85);border-color:rgba(255,140,0,.35);background:rgba(255,140,0,.06);}
.ov-provider.ll{color:rgba(160,112,255,.85);border-color:rgba(160,112,255,.35);background:rgba(160,112,255,.06);}
.ov-provider.wi{color:rgba(30,210,130,.85);border-color:rgba(30,210,130,.35);background:rgba(30,210,130,.06);}

.ov-ring{width:92px;height:92px;position:relative;}
.ov-ring::before,.ov-ring::after{content:"";position:absolute;inset:0;border-radius:50%;}
.ov-ring::before{border:2px solid rgba(255,140,0,.08);}
.ov-ring::after{border:2px solid transparent;border-top-color:var(--orange);
  border-right-color:rgba(255,140,0,.5);
  animation:spin 1.1s cubic-bezier(.5,.1,.5,.9) infinite;
  filter:drop-shadow(0 0 10px var(--orange-glow));}
@keyframes spin{to{transform:rotate(360deg)}}
.ov-inner{position:absolute;inset:14px;border-radius:50%;border:1.5px solid transparent;
  border-bottom-color:rgba(255,170,50,.6);border-left-color:rgba(255,140,0,.25);
  animation:spinR .8s linear infinite reverse;}
@keyframes spinR{to{transform:rotate(360deg)}}
.ov-core{position:absolute;inset:30px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,200,100,.18) 0%,transparent 70%);
  animation:coreP 2s ease-in-out infinite;}
@keyframes coreP{0%,100%{transform:scale(.85);opacity:.5}50%{transform:scale(1.12);opacity:1}}

#loading-overlay.wi .ov-ring::after{border-top-color:#20cc88;border-right-color:rgba(30,210,130,.5);filter:drop-shadow(0 0 10px rgba(30,210,130,.5));}
#loading-overlay.wi .ov-inner{border-bottom-color:rgba(50,230,150,.6);border-left-color:rgba(30,210,130,.25);}
#loading-overlay.wi #ov-bar{background:linear-gradient(90deg,#0a6640,#20cc88,#80ffcc);box-shadow:0 0 14px rgba(30,210,130,.5);}
#loading-overlay.wi #ov-status{color:#50dda0;text-shadow:0 0 12px rgba(30,210,130,.55);}
#loading-overlay.ll .ov-ring::after{border-top-color:#a070ff;border-right-color:rgba(160,112,255,.5);filter:drop-shadow(0 0 10px rgba(160,112,255,.5));}
#loading-overlay.ll .ov-inner{border-bottom-color:rgba(180,140,255,.6);border-left-color:rgba(160,112,255,.25);}
#loading-overlay.ll #ov-bar{background:linear-gradient(90deg,#3a1a80,#a070ff,#d4c0ff);box-shadow:0 0 14px rgba(160,112,255,.5);}
#loading-overlay.ll #ov-status{color:#c4a8ff;text-shadow:0 0 12px rgba(160,112,255,.55);}

.ov-content{text-align:center;display:flex;flex-direction:column;align-items:center;gap:18px;}
#ov-status{font-size:.78rem;letter-spacing:4px;text-transform:uppercase;
  color:var(--orange-bright);min-height:1.1em;
  text-shadow:0 0 12px rgba(255,170,50,.55);font-weight:500;}
.ov-track{width:340px;max-width:80vw;height:2px;
  background:linear-gradient(90deg,transparent,rgba(255,140,0,.18),transparent);
  border-radius:2px;overflow:hidden;}
#ov-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--orange-deep),var(--orange),var(--gold));
  border-radius:2px;transition:width .6s cubic-bezier(.2,.8,.3,1);box-shadow:0 0 14px var(--orange-glow);}
#ov-substatus{font-size:.6rem;letter-spacing:2.5px;color:var(--dim);text-transform:uppercase;
  min-height:1em;font-weight:300;}

.panel{position:relative;z-index:10;
  background:linear-gradient(180deg,rgba(22,9,1,.96) 0%,rgba(8,3,0,.96) 100%);
  border:1px solid rgba(255,140,0,.20);border-radius:10px;
  padding:50px 44px 38px;width:92%;max-width:540px;text-align:center;
  box-shadow:0 0 0 1px rgba(0,0,0,.95),0 14px 70px rgba(0,0,0,.92),
             0 0 150px rgba(255,80,0,.16),0 0 70px rgba(255,140,0,.09),
             inset 0 1px 0 rgba(255,200,120,.14),inset 0 -1px 0 rgba(0,0,0,.5);
  backdrop-filter:blur(7px) saturate(1.15);-webkit-backdrop-filter:blur(7px) saturate(1.15);
  animation:panelIn .75s cubic-bezier(.22,1,.36,1) both;}
@keyframes panelIn{from{opacity:0;transform:translateY(28px) scale(.95)}to{opacity:1;transform:none}}
@media (max-width:480px){.panel{padding:36px 22px 28px;}}
.panel::before{content:"";position:absolute;inset:-1px;border-radius:10px;pointer-events:none;
  background:linear-gradient(135deg,rgba(255,150,30,.45) 0%,transparent 30%,transparent 70%,rgba(255,140,0,.3) 100%);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;padding:1px;opacity:.85;}

.c{position:absolute;width:18px;height:18px;}
.c-tl{top:-1px;left:-1px;border-top:2px solid var(--orange-bright);border-left:2px solid var(--orange-bright);border-radius:5px 0 0 0;filter:drop-shadow(0 0 5px var(--orange-glow));}
.c-tr{top:-1px;right:-1px;border-top:2px solid var(--orange-bright);border-right:2px solid var(--orange-bright);border-radius:0 5px 0 0;filter:drop-shadow(0 0 5px var(--orange-glow));}
.c-bl{bottom:-1px;left:-1px;border-bottom:2px solid var(--orange-bright);border-left:2px solid var(--orange-bright);border-radius:0 0 0 5px;filter:drop-shadow(0 0 5px var(--orange-glow));}
.c-br{bottom:-1px;right:-1px;border-bottom:2px solid var(--orange-bright);border-right:2px solid var(--orange-bright);border-radius:0 0 5px 0;filter:drop-shadow(0 0 5px var(--orange-glow));}

.logo-eyebrow{font-size:.55rem;letter-spacing:5px;color:var(--orange-deep);text-transform:uppercase;margin-bottom:12px;font-weight:500;}
.logo-wrap{position:relative;display:inline-block;}
.logo-wrap::before{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:340px;height:90px;background:radial-gradient(ellipse at center,rgba(255,180,50,.20) 0%,rgba(255,120,0,.10) 40%,transparent 70%);
  border-radius:50%;pointer-events:none;z-index:-1;animation:auraOuter 3.8s ease-in-out infinite;filter:blur(8px);}
.logo-wrap::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:220px;height:55px;background:radial-gradient(ellipse at center,rgba(255,220,100,.4) 0%,rgba(255,140,0,.2) 45%,transparent 70%);
  border-radius:50%;pointer-events:none;z-index:-1;animation:auraInner 3.8s ease-in-out infinite;filter:blur(4px);}
@keyframes auraOuter{0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.14)}}
@keyframes auraInner{0%,100%{opacity:.8;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}}
h1{font-family:'Orbitron',sans-serif;font-size:2.05rem;font-weight:900;letter-spacing:7px;
   background:linear-gradient(180deg,#fff0c0 0%,#ffaa33 30%,#ff6600 65%,#aa3300 100%);
   -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
   filter:drop-shadow(0 0 26px rgba(255,140,0,.65));line-height:1.05;
   animation:logoBreath 4s ease-in-out infinite;}
@keyframes logoBreath{0%,100%{filter:drop-shadow(0 0 26px rgba(255,140,0,.55))}50%{filter:drop-shadow(0 0 42px rgba(255,170,50,.95))}}
.logo-sub{font-size:.52rem;letter-spacing:7px;color:var(--muted);text-transform:uppercase;margin-top:11px;margin-bottom:30px;}

.divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,140,0,.32) 30%,rgba(255,140,0,.55) 50%,rgba(255,140,0,.32) 70%,transparent);margin-bottom:26px;position:relative;}
.divider::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:7px;height:7px;border-radius:50%;background:var(--orange);box-shadow:0 0 12px var(--orange-glow);}

#status{font-size:.7rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--dim);
  margin-bottom:24px;display:flex;align-items:center;justify-content:center;gap:10px;
  transition:color .3s;min-height:1.1em;font-weight:500;}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.85)}}
#status.green .sdot{background:var(--green);box-shadow:0 0 12px var(--green-glow);}#status.green{color:var(--green);}
#status.red .sdot{background:var(--red);box-shadow:0 0 12px var(--red-glow);animation:none;}#status.red{color:var(--red);}
#status.amber .sdot{background:var(--orange);box-shadow:0 0 12px var(--orange-glow);}#status.amber{color:var(--orange-bright);}

#key-box{display:none;}
#key-box.show{display:block;animation:slideUp .7s cubic-bezier(.22,1,.36,1) both;}
@keyframes slideUp{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:none}}
.key-header{display:flex;align-items:center;justify-content:center;gap:11px;margin-bottom:14px;}
.key-icon{width:14px;height:14px;border:1.5px solid var(--green);border-radius:50%;
  position:relative;box-shadow:0 0 10px var(--green-glow);}
.key-icon::after{content:"";position:absolute;top:50%;left:50%;width:5px;height:5px;
  transform:translate(-50%,-50%);background:var(--green);border-radius:50%;
  box-shadow:0 0 6px var(--green-glow);}
.key-label{font-size:.55rem;letter-spacing:4px;color:var(--green);text-transform:uppercase;
  font-weight:600;text-shadow:0 0 8px var(--green-glow);}
#key-value{font-family:'Orbitron',sans-serif;font-size:1.15rem;font-weight:700;letter-spacing:3px;
  color:var(--green);word-break:break-all;text-shadow:0 0 18px var(--green-glow);
  margin-bottom:10px;user-select:all;cursor:text;padding:18px;border-radius:6px;
  background:linear-gradient(180deg,rgba(0,255,136,.10) 0%,rgba(0,255,136,.04) 100%);
  border:1px solid rgba(0,255,136,.22);transition:all .25s;position:relative;
  box-shadow:inset 0 0 30px rgba(0,255,136,.06),0 0 22px rgba(0,255,136,.10);}
#key-value::before{content:"";position:absolute;width:9px;height:9px;
  border:1.5px solid rgba(0,255,136,.55);top:6px;left:6px;border-right:none;border-bottom:none;}
#key-value::after{content:"";position:absolute;width:9px;height:9px;
  border:1.5px solid rgba(0,255,136,.55);bottom:6px;right:6px;border-left:none;border-top:none;}
#key-value:hover{background:linear-gradient(180deg,rgba(0,255,136,.14) 0%,rgba(0,255,136,.06) 100%);
  border-color:rgba(0,255,136,.4);box-shadow:inset 0 0 30px rgba(0,255,136,.10),0 0 30px rgba(0,255,136,.18);}
#key-expiry{font-size:.55rem;color:rgba(0,255,136,.45);letter-spacing:1.6px;margin-bottom:18px;text-transform:uppercase;}
#copy-btn{background:linear-gradient(180deg,rgba(0,255,136,.07) 0%,rgba(0,255,136,.02) 100%);
  border:1px solid rgba(0,255,136,.28);color:rgba(0,255,136,.78);
  font-family:'Orbitron',sans-serif;font-size:.65rem;letter-spacing:3px;text-transform:uppercase;
  padding:14px;width:100%;cursor:pointer;border-radius:4px;transition:all .25s;
  display:block;font-weight:600;position:relative;overflow:hidden;}
#copy-btn::before{content:"";position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(0,255,136,.14),transparent);
  transform:translateX(-100%);transition:transform .55s;}
#copy-btn:hover{background:linear-gradient(180deg,rgba(0,255,136,.14) 0%,rgba(0,255,136,.05) 100%);
  color:var(--green);border-color:rgba(0,255,136,.55);transform:translateY(-1px);
  box-shadow:0 4px 18px rgba(0,255,136,.22);}
#copy-btn:hover::before{transform:translateX(100%);}
#copy-btn.copied{color:var(--green);background:rgba(0,255,136,.18);
  border-color:rgba(0,255,136,.65);box-shadow:0 0 22px rgba(0,255,136,.32);}

#error-box{display:none;}
#error-box.show{display:block;animation:slideUp .4s ease both;}
.error-header{display:flex;align-items:center;justify-content:center;gap:11px;margin-bottom:14px;}
.error-icon{width:16px;height:16px;border:1.5px solid var(--red);border-radius:50%;
  position:relative;box-shadow:0 0 10px var(--red-glow);}
.error-icon::before,.error-icon::after{content:"";position:absolute;top:50%;left:50%;
  width:7px;height:1.5px;background:var(--red);transform:translate(-50%,-50%) rotate(45deg);}
.error-icon::after{transform:translate(-50%,-50%) rotate(-45deg);}
.error-label{font-size:.55rem;letter-spacing:4px;color:var(--red);text-transform:uppercase;
  font-weight:600;text-shadow:0 0 8px var(--red-glow);}
#error-msg{font-size:.68rem;color:rgba(255,140,150,.95);letter-spacing:.5px;line-height:1.7;
  white-space:pre-line;background:linear-gradient(180deg,rgba(255,68,85,.08) 0%,rgba(255,68,85,.03) 100%);
  border:1px solid rgba(255,68,85,.24);border-radius:5px;padding:18px;text-align:left;
  font-family:'JetBrains Mono',monospace;box-shadow:inset 0 0 22px rgba(255,68,85,.05);}
.error-cta{display:block;margin-top:14px;background:transparent;
  border:1px solid rgba(255,140,0,.32);color:rgba(255,140,0,.75);padding:12px;
  font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:2.5px;
  text-transform:uppercase;font-weight:600;cursor:pointer;border-radius:4px;
  width:100%;transition:all .25s;text-decoration:none;text-align:center;}
.error-cta:hover{background:rgba(255,140,0,.1);color:var(--orange);border-color:rgba(255,140,0,.6);}

.footer{margin-top:28px;display:flex;justify-content:center;align-items:center;gap:12px;
  padding-top:18px;border-top:1px solid rgba(255,140,0,.10);}
.fi{font-size:.48rem;letter-spacing:2.2px;color:#28190d;text-transform:uppercase;font-weight:500;}
.fd{width:3px;height:3px;border-radius:50%;background:#28190d;}
</style>
</head>
<body>

<div id="loading-overlay">
<div class="ov-brand">
<div class="ov-logo">REZURXLAB</div>
<div class="ov-tag">Verification Engine</div>
<div class="ov-provider lv" id="ov-provider-badge">Linkvertise</div>
</div>
<div class="ov-ring"><div class="ov-inner"></div><div class="ov-core"></div></div>
<div class="ov-content">
<div id="ov-status">Initializing...</div>
<div class="ov-track"><div id="ov-bar"></div></div>
<div id="ov-substatus">Establishing secure connection</div>
</div>
</div>

<canvas id="lava-canvas"></canvas>
<div class="atmos"></div>
<div class="vignette"></div>
<div class="lava-river"></div>
<div class="embers"></div>
<div class="scanlines"></div>
<canvas id="confetti-canvas"></canvas>

<div class="panel">
<div class="c c-tl"></div><div class="c c-tr"></div>
<div class="c c-bl"></div><div class="c c-br"></div>

<div class="logo-eyebrow">◆ Access Granted ◆</div>
<div class="logo-wrap"><h1>REZURXLAB</h1></div>
<div class="logo-sub">Premium Key System</div>

<span class="fi">AES-256</span><div class="fd"></div>
<span class="fi">Anti-Bypass</span><div class="fd"></div>
<span class="fi">v3.1</span>
</div>
</div>

<script>
(() => {
'use strict';

const API         = "https://rezurx-backend.onrender.com";
const SESSION_KEY = 'rzx_session_v5';
const CSRF_KEY    = 'rzx_csrf_v5';
const SBLOB_KEY   = 'rzx_sblob_v5';
const HASH_RE     = /^[A-Za-z0-9_\-=.#/+]{6,512}$/;
const WITOKEN_RE  = /^[A-Za-z0-9_\-=+/]{4,512}$/;
const LLTOKEN_RE  = /^[A-Za-z0-9_\-=+/.]{4,512}$/;
const TOKEN_RE    = /^[a-f0-9]{16,128}$/i;

if (top !== self) { try { top.location = self.location; } catch(_) { document.body.innerHTML=''; } }

const overlay  = document.getElementById('loading-overlay');
const ovStatus = document.getElementById('ov-status');
const ovBar    = document.getElementById('ov-bar');
const ovSub    = document.getElementById('ov-substatus');
const ovBadge  = document.getElementById('ov-provider-badge');
const statusEl = document.getElementById('status');
const statusTx = document.getElementById('status-txt');
const keyBox   = document.getElementById('key-box');
const keyVal   = document.getElementById('key-value');
const keyExp   = document.getElementById('key-expiry');
const copyBtn  = document.getElementById('copy-btn');
const errorBox = document.getElementById('error-box');
const errorMsg = document.getElementById('error-msg');

let currentKey='';

function loadSession(){
  try{const raw=localStorage.getItem(SESSION_KEY);if(!raw) return null;
    const d=JSON.parse(raw);if(!d.token||!d.ts) return null;
    if(Date.now()-d.ts > 30*60*1000) return{expired:true};
    return d;
  }catch(_){return null;}
}
function loadCsrf(){try{return localStorage.getItem(CSRF_KEY);}catch(_){return null;}}
function loadSblob(){try{return localStorage.getItem(SBLOB_KEY);}catch(_){return null;}}
function clearAll(){try{localStorage.removeItem(SESSION_KEY);localStorage.removeItem(CSRF_KEY);localStorage.removeItem(SBLOB_KEY);}catch(_){}}

function recoverToken(){
  const s=loadSession();
  if(s && !s.expired && TOKEN_RE.test(s.token)) return{token:s.token,fp:s.fp||'',source:'storage'};
  const h=location.hash;
  if(h){const m=h.match(/token=([a-f0-9]{16,128})/i);if(m && TOKEN_RE.test(m[1])) return{token:m[1],fp:'',source:'fragment'};}
  return{token:null,expired:s?.expired};
}

function setStatus(m,t=''){statusTx.textContent=m;statusEl.className=t;}
function setOverlay(s,p,sub){ovStatus.textContent=s;ovBar.style.width=p+'%';ovSub.textContent=sub||'';}
function showOverlay(provider){
  overlay.classList.remove('wi','ll');
  if(provider==='workink'){overlay.classList.add('wi');ovBadge.textContent='Work.ink';ovBadge.className='ov-provider wi';}
  else if(provider==='lootlabs'){overlay.classList.add('ll');ovBadge.textContent='LootLabs';ovBadge.className='ov-provider ll';}
  else{ovBadge.textContent='Linkvertise';ovBadge.className='ov-provider lv';}
  overlay.classList.add('show');
}
function hideOverlay(cb){
  overlay.style.transition='opacity .55s';overlay.style.opacity='0';
  setTimeout(()=>{overlay.classList.remove('show','wi','ll');overlay.style.opacity='';overlay.style.transition='';if(cb)cb();},600);
}
function showError(m){errorMsg.textContent=m;errorBox.classList.add('show');setStatus('ERROR','red');}

async function fetchT(url,opts={},ms=25000){
  const ctrl=new AbortController();const tid=setTimeout(()=>ctrl.abort(),ms);
  try{return await fetch(url,{...opts,signal:ctrl.signal,mode:'cors',credentials:'omit'});}
  finally{clearTimeout(tid);}
}

function copyKey(){
  if(!currentKey) return;
  const ok=()=>{copyBtn.textContent='[ ✓ Copied! ]';copyBtn.classList.add('copied');
    setTimeout(()=>{copyBtn.textContent='[ Copy to Clipboard ]';copyBtn.classList.remove('copied');},2500);};
  if(navigator.clipboard?.writeText){navigator.clipboard.writeText(currentKey).then(ok).catch(fb);}else fb();
  function fb(){
    try{const ta=document.createElement('textarea');ta.value=currentKey;ta.style.cssText='position:fixed;opacity:0;';
      document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);ok();
    }catch(_){copyBtn.textContent='[ Select text above ]';}
  }
}
copyBtn.addEventListener('click',copyKey);

addEventListener('load',async()=>{
  const params=new URLSearchParams(location.search);
  const hash    = params.get('hash');
  const witoken = params.get('witoken');
  const lltoken = params.get('lltoken') || params.get('token_ll') || params.get('lt');

  const recovered=recoverToken();
  const tokenOk=!!recovered.token;
  const token=recovered.token;
  const csrf=loadCsrf();
  const sblob=loadSblob();

  const isLv=!!hash    && HASH_RE.test(hash);
  const isWi=!!witoken && WITOKEN_RE.test(witoken);
  const isLl=!!lltoken && LLTOKEN_RE.test(lltoken);
  const hasProvider=isLv||isWi||isLl;

  if(!hasProvider||!tokenOk||!csrf||!sblob){
    let msg;
    if(!hasProvider && !tokenOk) msg='NO ACTIVE SESSION\n\nReturn to the start page and click a button to begin.';
    else if(!hasProvider) msg='VERIFICATION TOKEN MISSING\n\nDo not open this page directly.\nComplete an ad to be redirected here.';
    else if(!csrf||!sblob) msg='SECURITY HANDSHAKE MISSING\n\nPlease start over from the beginning.';
    else if(recovered.expired) msg='SESSION EXPIRED\n\nSessions last 30 minutes. Please start over.';
    else msg='INVALID SESSION\n\nThe session token is malformed. Please start over.';
    showError(msg);setStatus('SESSION INVALID','red');
    return;
  }

  const provider=isWi?'workink':isLl?'lootlabs':'linkvertise';
  history.replaceState({},'',location.pathname);

  showOverlay(provider);
  setOverlay('Establishing connection',5,'Reaching secure server');
  setStatus('VERIFYING...','amber');

  try{
    const h=await fetchT(API+'/health',{method:'GET',cache:'no-store'},30000);
    if(h.ok)setOverlay('Server online',22,'Connection secured');
  }catch(_){setOverlay('Server slow',18,'Proceeding anyway');}
  await new Promise(r=>setTimeout(r,300));

  const providerName=isWi?'Work.ink':isLl?'LootLabs':'Linkvertise';
  const steps=[
    {pct:38,status:'Validating ad completion',sub:`Checking with ${providerName}`},
    {pct:60,status:'Running anti-bypass check',sub:'Verifying authenticity'},
    {pct:82,status:'Generating access key',sub:'Almost there'},
  ];
  let si=0;
  const tick=setInterval(()=>{if(si<steps.length){const s=steps[si++];setOverlay(s.status,s.pct,s.sub);}},1300);

  try{
    const endpoint=isWi?'/api/verify-workink':isLl?'/api/verify-lootlabs':'/api/verify-linkvertise';
    const body=isWi?{token,witoken,fp:recovered.fp||''}
              :isLl?{token,lltoken,fp:recovered.fp||''}
                   :{token,hash,fp:recovered.fp||''};
    const r=await fetchT(API+endpoint,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Accept':'application/json',
        'x-csrf-token':csrf,
        'x-rzx-session':sblob,
      },
      body:JSON.stringify(body)
    },25000);
    clearInterval(tick);
    const data=await r.json().catch(()=>({}));

    if(r.status===409) throw new Error('TOKEN ALREADY USED\nEach ad completion provides one key.\nPlease go through the ad again.');
    if(r.status===400) throw new Error('INVALID REQUEST\nSomething went wrong with the session.\nPlease start over.');
    if(r.status===403) throw new Error(data.error?.includes('quickly')
      ? 'AD COMPLETED TOO FAST\nBypass detected. Please complete the full ad.'
      : `AD NOT COMPLETED OR BLOCKED\nFinish the full ${providerName} offer\nwithout skipping or using bypassers.`);
    if(r.status===429) throw new Error('TOO MANY ATTEMPTS\nPlease wait before trying again.');
    if(r.status===502) throw new Error(`${providerName.toUpperCase()} UNREACHABLE\nPlease try again in a moment.`);
    if(!r.ok) throw new Error((data.error||'Server error '+r.status)+'\n\nPlease try again shortly.');
    if(!data.key) throw new Error('Invalid server response. Please try again.');

    setOverlay('Access granted',100,'Revealing your key');
    await new Promise(r=>setTimeout(r,700));

    currentKey=data.key;
    clearAll();

    keyVal.textContent=currentKey;
    if(data.expiresAt){
      const exp=new Date(data.expiresAt);
      const hrs=data.durationHours?` • ${data.durationHours}h key`:'';
      keyExp.textContent='◆ Expires '+exp.toLocaleString('en-GB',{hour12:false})+hrs+' ◆';
    }
    hideOverlay(()=>{
      keyBox.classList.add('show');
      setStatus('● Key Generated Successfully','green');
      launchConfetti();
      setTimeout(()=>keyVal.focus(),600);
    });

  }catch(err){
    clearInterval(tick);
    const msg=err.name==='AbortError'
      ? 'VERIFICATION TIMED OUT\nThe server took too long.\nPlease try the ad again.'
      : (err.message||'Verification failed.');
    hideOverlay(()=>{showError(msg);});
  }
});

/* Confetti */
function launchConfetti(){
  const cv=document.getElementById('confetti-canvas');const ctx=cv.getContext('2d');
  cv.width=innerWidth;cv.height=innerHeight;
  const pal=['#ff8c00','#ffb347','#ffd700','#00ff88','#ffffff','#ff6644','#ffcc33','#a070ff','#ffee80','#20cc88'];
  const shapes=['rect','circle','line','triangle'];
  const pieces=Array.from({length:300},()=>({
    x:innerWidth*.5+(Math.random()-.5)*220,y:innerHeight*.45,
    vx:(Math.random()-.5)*20,vy:-(Math.random()*18+7),ay:.3+Math.random()*.2,
    color:pal[Math.floor(Math.random()*pal.length)],size:Math.random()*10+3,
    rot:Math.random()*Math.PI*2,rspd:(Math.random()-.5)*.3,
    alpha:1,decay:.008+Math.random()*.006,
    shape:shapes[Math.floor(Math.random()*shapes.length)]
  }));
  (function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);let alive=false;
    for(const p of pieces){
      if(p.alpha<=0)continue;alive=true;
      ctx.save();ctx.globalAlpha=p.alpha;ctx.fillStyle=ctx.strokeStyle=p.color;
      ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      if(p.shape==='rect'){ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);}
      else if(p.shape==='circle'){ctx.beginPath();ctx.arc(0,0,p.size/2.5,0,Math.PI*2);ctx.fill();}
      else if(p.shape==='triangle'){ctx.beginPath();ctx.moveTo(0,-p.size/2);ctx.lineTo(p.size/2,p.size/2);ctx.lineTo(-p.size/2,p.size/2);ctx.closePath();ctx.fill();}
      else{ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-p.size/2,0);ctx.lineTo(p.size/2,0);ctx.stroke();}
      ctx.restore();
      p.x+=p.vx;p.y+=p.vy;p.vy+=p.ay;p.vx*=.99;p.rot+=p.rspd;p.alpha-=p.decay;
    }
    if(alive)requestAnimationFrame(draw);else ctx.clearRect(0,0,cv.width,cv.height);
  })();
}
addEventListener('resize',()=>{const c=document.getElementById('confetti-canvas');c.width=innerWidth;c.height=innerHeight;});

/* Lava */
(function(){
  const cv=document.getElementById('lava-canvas');const ctx=cv.getContext('2d');
  function resize(){cv.width=innerWidth;cv.height=innerHeight;}
  resize();addEventListener('resize',resize);
  const pal=[[255,80,0],[255,120,10],[255,60,0],[220,40,0],[255,155,20],[180,30,0],[255,140,0],[200,50,0],[255,100,5]];
  const rnd=(a,b)=>a+Math.random()*(b-a);
  function mk(init){
    const c=pal[Math.floor(Math.random()*pal.length)],sp=cv.width*.27;
    return{x:cv.width*.5+rnd(-sp,sp),y:init?rnd(-cv.height,0):rnd(-80,0),
           vy:rnd(1.5,3.8),vx:rnd(-.8,.8),radius:rnd(4,15),tail:[],
           maxTail:Math.floor(rnd(15,33)),r:c[0],g:c[1],b:c[2],
           alpha:rnd(.55,.95),wobble:rnd(0,Math.PI*2),
           wobbleSpd:rnd(.008,.05),wobbleAmp:rnd(.3,1.8)};
  }
  const drops=[];for(let i=0;i<115;i++)drops.push(mk(true));
  function drawDrop(d){
    const{x,y,radius:rd,r,g,b,alpha,tail}=d;
    for(let i=0;i<tail.length;i++){
      const t=tail[i],pct=i/tail.length,a=alpha*pct*.45,rad=rd*pct*.7;
      if(rad<.5||a<.01)continue;
      ctx.beginPath();ctx.arc(t.x,t.y,rad,0,Math.PI*2);
      ctx.fillStyle=`rgba(${r},${g},${b},${a})`;ctx.fill();
    }
    const gr=ctx.createRadialGradient(x,y,0,x,y,rd*5.8);
    gr.addColorStop(0,`rgba(${r},${g},${b},${alpha*.5})`);
    gr.addColorStop(1,`rgba(${r},${g},${b},0)`);
    ctx.beginPath();ctx.arc(x,y,rd*5.8,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
    const gm=ctx.createRadialGradient(x-rd*.3,y-rd*.35,0,x,y,rd);
    gm.addColorStop(0,`rgba(255,235,170,${alpha*.95})`);
    gm.addColorStop(.35,`rgba(${r},${g},${b},${alpha})`);
    gm.addColorStop(1,`rgba(${Math.max(r-70,0)},${Math.max(g-50,0)},0,${alpha})`);
    ctx.beginPath();ctx.arc(x,y,rd,0,Math.PI*2);ctx.fillStyle=gm;ctx.fill();
    ctx.beginPath();ctx.arc(x-rd*.3,y-rd*.32,rd*.27,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,250,${alpha*.78})`;ctx.fill();
  }
  function animate(){
    ctx.clearRect(0,0,cv.width,cv.height);
    for(const d of drops){
      d.wobble+=d.wobbleSpd;
      d.x+=Math.sin(d.wobble)*d.wobbleAmp+d.vx;
      d.y+=d.vy;d.tail.push({x:d.x,y:d.y});
      if(d.tail.length>d.maxTail)d.tail.shift();
      drawDrop(d);
      if(d.y-d.radius>cv.height+20){Object.assign(d,mk(false));d.tail=[];}
    }
    requestAnimationFrame(animate);
  }
  animate();
})();
})();
